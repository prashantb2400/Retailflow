/* ══════════════════════════════════════════════════
   PHASE C — TRIAL BALANCE
══════════════════════════════════════════════════ */
function renderTrialBalance(tb) {
  const ledgers = Object.keys(tb).sort();
  const totDr = r2(ledgers.reduce((a,k)=>a+tb[k].dr,0));
  const totCr = r2(ledgers.reduce((a,k)=>a+tb[k].cr,0));
  const balanced = Math.abs(totDr-totCr) < 1;

  // Group by account group
  const groups = {};
  ledgers.forEach(k=>{ const g=tb[k].group||'Misc'; if(!groups[g])groups[g]=[]; groups[g].push(k); });

  return `
  ${!balanced?`<div class="alert awrn mb14" style="font-size:12px">
    ⚠️ Trial balance does not balance — Dr ₹${fmt(totDr)} ≠ Cr ₹${fmt(totCr)}. Difference: ₹${fmt(Math.abs(totDr-totCr))}. Check manual journals or opening balances.
  </div>`:`<div class="alert agrn mb14" style="font-size:12px">✓ Trial Balance balances — Dr = Cr = ₹${fmt(totDr)}</div>`}
  <div class="twrap">
    <table style="font-size:12px">
      <thead><tr><th>Ledger</th><th>Group</th><th style="text-align:right">Dr ₹</th><th style="text-align:right">Cr ₹</th><th style="text-align:right">Balance</th></tr></thead>
      <tbody>
        ${Object.entries(groups).sort().map(([g,keys])=>`
          <tr style="background:var(--surf2)"><td colspan="5" style="font-weight:700;font-size:11px;padding:5px 10px;text-transform:uppercase;letter-spacing:.3px;color:var(--tx2)">${g}</td></tr>
          ${keys.map(k=>`<tr>
            <td style="padding-left:18px;cursor:pointer;color:var(--acc)" onclick="S.accounts_tab='ledger';S._drillLedger='${esc(k)}';render()">${esc(k)}</td>
            <td class="tx2 fs11">${tb[k].group}</td>
            <td style="text-align:right">${tb[k].dr>0?fmt(tb[k].dr):'—'}</td>
            <td style="text-align:right">${tb[k].cr>0?fmt(tb[k].cr):'—'}</td>
            <td style="text-align:right;font-weight:600;color:${tb[k].closing>=0?'var(--grn)':'var(--red)'}">
              ${fmt(Math.abs(tb[k].closing))} ${tb[k].closing>=0?'Dr':'Cr'}
            </td>
          </tr>`).join('')}
        `).join('')}
      </tbody>
      <tfoot><tr style="background:var(--surf2)">
        <td colspan="2" style="font-weight:700;padding:8px 10px">TOTAL</td>
        <td style="text-align:right;font-weight:700;color:var(--red)">${fmt(totDr)}</td>
        <td style="text-align:right;font-weight:700;color:var(--grn)">${fmt(totCr)}</td>
        <td style="text-align:right;font-weight:700;color:${balanced?'var(--grn)':'var(--red)'}">${balanced?'✓ Balanced':'✗ Diff: '+fmt(Math.abs(totDr-totCr))}</td>
      </tr></tfoot>
    </table>
  </div>
  <div class="fs11 tx2 mt8">Click any ledger name to drill down into its individual transactions.</div>`;
}

/* ══════════════════════════════════════════════════
   PHASE D — BALANCE SHEET
══════════════════════════════════════════════════ */
function renderBalanceSheet(tb, journals) {
  // Compute P&L net profit to add to equity
  const income  = r2(Object.entries(tb).filter(([k,v])=>v.type==='income') .reduce((a,[,v])=>a+v.cr-v.dr,0));
  const expense = r2(Object.entries(tb).filter(([k,v])=>v.type==='expense').reduce((a,[,v])=>a+v.dr-v.cr,0));
  const netProfit = r2(income - expense);

  // Classify ledgers
  const sources = {};      // Liabilities + Equity
  const application = {}; // Assets

  Object.entries(tb).forEach(([k,v])=>{
    if(v.type==='income'||v.type==='expense') return; // P&L items, not BS
    const bal = Math.abs(v.closing);
    if(!bal) return;
    const side = v.bs_side || (v.normal==='cr'?'sources':'application');
    const grp  = v.group || 'Misc';
    const bucket = side==='sources' ? sources : application;
    if(!bucket[grp]) bucket[grp]=[];
    bucket[grp].push({name:k, amount:bal});
  });

  // Add net profit to equity
  if(!sources['Capital']) sources['Capital']=[];
  sources['Capital'].push({name:'Net Profit / (Loss)', amount:netProfit});

  const totSrc = r2(Object.values(sources).flat().reduce((a,i)=>a+i.amount,0));
  const totApp = r2(Object.values(application).flat().reduce((a,i)=>a+i.amount,0));
  const diff   = r2(Math.abs(totSrc-totApp));

  const renderSide = (obj, color) => Object.entries(obj).sort().map(([grp,items])=>`
    <tr style="background:var(--surf2)"><td colspan="2" style="font-weight:700;font-size:11px;padding:5px 10px;text-transform:uppercase;letter-spacing:.3px;color:${color}">${grp}</td></tr>
    ${items.map(i=>`<tr>
      <td style="padding-left:18px">${esc(i.name)}</td>
      <td style="text-align:right;font-weight:600">${fmt(i.amount)}</td>
    </tr>`).join('')}
  `).join('');

  return `
  <div class="g2 mb14">
    <div class="sc"><div class="sl">Sources of Funds</div><div class="sv txgrn">${fmt(totSrc)}</div><div class="ss">Capital + Liabilities</div></div>
    <div class="sc"><div class="sl">Application of Funds</div><div class="sv txacc">${fmt(totApp)}</div><div class="ss">Assets</div></div>
  </div>
  ${diff>1?`<div class="alert awrn mb14" style="font-size:12px">⚠️ Balance Sheet out of balance by ₹${fmt(diff)}. Check opening balances and manual journals.</div>`:`<div class="alert agrn mb14" style="font-size:12px">✓ Balance Sheet balances — Sources = Application = ₹${fmt(totSrc)}</div>`}

  <div class="g2">
    <!-- Sources of Funds -->
    <div>
      <div class="ctitle mb8" style="color:var(--grn)">SOURCES OF FUNDS</div>
      <div class="twrap"><table style="font-size:12px">
        <thead><tr><th>Particulars</th><th style="text-align:right">₹</th></tr></thead>
        <tbody>${renderSide(sources,'var(--grn)')}</tbody>
        <tfoot><tr style="background:var(--surf2)"><td style="font-weight:700;padding:8px 10px">TOTAL</td><td style="text-align:right;font-weight:700">${fmt(totSrc)}</td></tr></tfoot>
      </table></div>
    </div>
    <!-- Application of Funds -->
    <div>
      <div class="ctitle mb8" style="color:var(--acc)">APPLICATION OF FUNDS</div>
      <div class="twrap"><table style="font-size:12px">
        <thead><tr><th>Particulars</th><th style="text-align:right">₹</th></tr></thead>
        <tbody>${renderSide(application,'var(--acc)')}</tbody>
        <tfoot><tr style="background:var(--surf2)"><td style="font-weight:700;padding:8px 10px">TOTAL</td><td style="text-align:right;font-weight:700">${fmt(totApp)}</td></tr></tfoot>
      </table></div>
    </div>
  </div>
  <div class="fs11 tx2 mt8">Note: Balance sheet derived from journal entries. Verify Fixed Assets value and depreciation with your CA before filing.</div>`;
}

/* ══════════════════════════════════════════════════
   PHASE E — BANK RECONCILIATION
══════════════════════════════════════════════════ */
function renderBankRecon(tb, journals) {
  const bankJ = journals.filter(j=>(j.entries||[]).some(e=>e.ledger==='Bank Account'||e.ledger==='Cash in Hand'));
  const bookBal = r2(bankJ.reduce((a,j)=>{
    return a + (j.entries||[]).filter(e=>e.ledger==='Bank Account'||e.ledger==='Cash in Hand').reduce((b,e)=>b+e.dr-e.cr,0);
  }, (S.opening_balances?.cash_in_hand||0)+(S.opening_balances?.bank_balance||0)));

  const recon = S.bank_recon||[];
  const unreconciledEntries = bankJ.filter(j=>!recon.find(r=>r.journal_id===j.id));
  const reconciledEntries   = bankJ.filter(j=> recon.find(r=>r.journal_id===j.id));

  return `
  <div class="g3 mb14">
    <div class="sc"><div class="sl">Book Balance (Cash+Bank)</div><div class="sv txacc">${fmt(bookBal)}</div><div class="ss">Per RetailFlow records</div></div>
    <div class="sc"><div class="sl">Unreconciled</div><div class="sv txred">${unreconciledEntries.length}</div><div class="ss">Not yet matched</div></div>
    <div class="sc"><div class="sl">Reconciled</div><div class="sv txgrn">${reconciledEntries.length}</div><div class="ss">Matched with bank</div></div>
  </div>

  <div class="alert ainfo mb14" style="font-size:12px">
    📋 Mark each transaction as reconciled after verifying against your bank statement. Unmark if a transaction was incorrectly matched.
    Your CA needs this to certify the bank balance in the audit.
  </div>

  <div class="card mb14">
    <div class="ctitle mb8">📤 Unreconciled Transactions</div>
    ${unreconciledEntries.length===0?'<div class="tx2 fs12">All transactions reconciled ✓</div>':`
    <div class="twrap"><table style="font-size:12px">
      <thead><tr><th>Date</th><th>Reference</th><th>Narration</th><th>Ledger</th><th style="text-align:right">Amount ₹</th><th></th></tr></thead>
      <tbody>
        ${unreconciledEntries.slice(0,40).map(j=>{
          const be = (j.entries||[]).find(e=>e.ledger==='Bank Account'||e.ledger==='Cash in Hand');
          if(!be) return '';
          const amt = be.dr > be.cr ? be.dr : -be.cr;
          return `<tr>
            <td class="tx2 fs11">${fmtDate(j.date)}</td>
            <td class="txacc fw6 fs11">${esc(j.ref)}</td>
            <td class="tx2 fs11">${esc(j.narration)}</td>
            <td class="fs11">${esc(be.ledger)}</td>
            <td style="text-align:right;font-weight:600;color:${amt>0?'var(--grn)':'var(--red)'}">${fmt(Math.abs(amt))}</td>
            <td><button class="btn bgho bsm" style="font-size:10px;color:var(--grn)" onclick="reconcileEntry('${j.id}',true)">✓ Match</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>`}
  </div>

  ${reconciledEntries.length>0?`
  <div class="card">
    <div class="ctitle mb8">✅ Reconciled Transactions (${reconciledEntries.length})</div>
    <div class="twrap"><table style="font-size:12px">
      <thead><tr><th>Date</th><th>Reference</th><th>Narration</th><th style="text-align:right">Amount</th><th></th></tr></thead>
      <tbody>
        ${reconciledEntries.slice(0,20).map(j=>{
          const be=(j.entries||[]).find(e=>e.ledger==='Bank Account'||e.ledger==='Cash in Hand');
          if(!be) return '';
          const amt = be.dr>be.cr?be.dr:-be.cr;
          return `<tr style="opacity:.7">
            <td class="tx2 fs11">${fmtDate(j.date)}</td>
            <td class="txacc fw6 fs11">${esc(j.ref)}</td>
            <td class="tx2 fs11">${esc(j.narration)}</td>
            <td style="text-align:right;color:${amt>0?'var(--grn)':'var(--red)'}">${fmt(Math.abs(amt))}</td>
            <td><button class="btn bgho bsm" style="font-size:10px;color:var(--tx2)" onclick="reconcileEntry('${j.id}',false)">Unmatch</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>`:``}`;
}

window.reconcileEntry = function(jid, matched) {
  const recon = S.bank_recon||[];
  if(matched) {
    if(!recon.find(r=>r.journal_id===jid)) {
      S.bank_recon=[...recon,{journal_id:jid,matched_at:new Date().toISOString()}];
    }
  } else {
    S.bank_recon=recon.filter(r=>r.journal_id!==jid);
  }
  save(); render();
  toast(matched?'Entry matched ✓':'Entry unmatched','info');
};

/* ══════════════════════════════════════════════════
   PHASE F — CASH FLOW STATEMENT (Indirect Method)
══════════════════════════════════════════════════ */
function renderCashFlow(tb, journals) {
  // Operating Activities — start from Net Profit
  const income  = r2(Object.entries(tb).filter(([,v])=>v.type==='income') .reduce((a,[,v])=>a+v.cr-v.dr,0));
  const expense = r2(Object.entries(tb).filter(([,v])=>v.type==='expense').reduce((a,[,v])=>a+v.dr-v.cr,0));
  const netProfit = r2(income - expense);

  // Adjustments for non-cash items
  const debtorChange  = -(tb['Sundry Debtors']?.closing||0);   // increase in debtors = cash outflow
  const creditorChange =  (tb['Sundry Creditors']?.closing||0); // increase in creditors = cash inflow
  const stockChange   = -((tb['Closing Stock']?.closing||0) - (S.opening_balances?.inventory_value||0));

  // GST payable (liability, cash hasn't gone out yet)
  const gstPayable = r2((tb['CGST Payable']?.closing||0)+(tb['SGST Payable']?.closing||0)+(tb['IGST Payable']?.closing||0));

  const operatingCF = r2(netProfit + debtorChange + creditorChange + stockChange + gstPayable);

  // Investing Activities
  const fixedAssetPurchases = -(tb['Fixed Assets']?.closing||0) + (S.opening_balances?.fixed_assets||0);
  const investingCF = r2(fixedAssetPurchases);

  // Financing Activities
  const loanChange = (tb['Loans Payable']?.closing||0) - (S.opening_balances?.loans_payable||0);
  const capChange  = (S.opening_balances?.capital||0);
  const financingCF = r2(loanChange + capChange);

  const netCF = r2(operatingCF + investingCF + financingCF);
  const openingCash = r2((S.opening_balances?.cash_in_hand||0)+(S.opening_balances?.bank_balance||0));
  const closingCash = r2(openingCash + netCF);

  const cfRow = (label, val, indent=false) => `<tr>
    <td style="padding-left:${indent?24:10}px;${!indent?'font-weight:600':''}">${label}</td>
    <td style="text-align:right;font-weight:${indent?400:600};color:${val>0?'var(--grn)':val<0?'var(--red)':'var(--tx)'}">${val>0?'+':val<0?'':''}${fmt(val)}</td>
  </tr>`;

  return `
  <div class="g3 mb14">
    <div class="sc"><div class="sl">Operating Activities</div><div class="sv ${operatingCF>=0?'txgrn':'txred'}">${fmt(operatingCF)}</div></div>
    <div class="sc"><div class="sl">Investing Activities</div><div class="sv ${investingCF>=0?'txgrn':'txred'}">${fmt(investingCF)}</div></div>
    <div class="sc"><div class="sl">Net Cash Flow</div><div class="sv ${netCF>=0?'txgrn':'txred'}">${fmt(netCF)}</div></div>
  </div>

  <div class="alert ainfo mb14" style="font-size:12px">
    📋 <b>Cash Flow Statement</b> — Indirect method. Shows how profit converts to cash. File with your CA during annual accounts preparation.
  </div>

  <div class="card mb14">
    <div class="ctitle mb12">Cash Flow Statement — ${S.fyFilter==='all'?getFY(today()):'FY '+S.fyFilter}</div>
    <div class="twrap"><table style="font-size:12px">
      <thead><tr><th>Particulars</th><th style="text-align:right">Amount ₹</th></tr></thead>
      <tbody>
        <!-- Operating -->
        <tr style="background:var(--surf2)"><td colspan="2" style="font-weight:700;font-size:11px;padding:5px 10px;text-transform:uppercase;color:var(--grn)">A. Operating Activities</td></tr>
        ${cfRow('Net Profit / (Loss)',netProfit,true)}
        <tr style="background:var(--surf2)"><td colspan="2" style="padding-left:14px;font-size:11px;color:var(--tx2)">Adjustments for working capital changes:</td></tr>
        ${cfRow('Change in Sundry Debtors',debtorChange,true)}
        ${cfRow('Change in Sundry Creditors',creditorChange,true)}
        ${cfRow('Change in Closing Stock',stockChange,true)}
        ${cfRow('GST Payable (outstanding)',gstPayable,true)}
        ${cfRow('Net Cash from Operating Activities',operatingCF)}

        <!-- Investing -->
        <tr style="background:var(--surf2)"><td colspan="2" style="font-weight:700;font-size:11px;padding:5px 10px;text-transform:uppercase;color:var(--acc)">B. Investing Activities</td></tr>
        ${cfRow('Fixed Asset Purchases / Changes',fixedAssetPurchases,true)}
        ${cfRow('Net Cash from Investing Activities',investingCF)}

        <!-- Financing -->
        <tr style="background:var(--surf2)"><td colspan="2" style="font-weight:700;font-size:11px;padding:5px 10px;text-transform:uppercase;color:var(--blu)">C. Financing Activities</td></tr>
        ${cfRow('Loan Changes',loanChange,true)}
        ${cfRow('Capital Introduced',capChange,true)}
        ${cfRow('Net Cash from Financing Activities',financingCF)}

        <!-- Net -->
        <tr style="border-top:2.5px solid var(--bor)">
          <td style="font-weight:700;font-size:13px">Net Change in Cash (A+B+C)</td>
          <td style="text-align:right;font-weight:700;font-size:14px;color:${netCF>=0?'var(--grn)':'var(--red)'}">${fmt(netCF)}</td>
        </tr>
        ${cfRow('Opening Cash & Bank Balance',openingCash,true)}
        <tr style="background:var(--surf2)">
          <td style="font-weight:700">Closing Cash & Bank Balance</td>
          <td style="text-align:right;font-weight:700;color:var(--acc)">${fmt(closingCash)}</td>
        </tr>
      </tbody>
    </table></div>
    <div class="fs11 tx2 mt8">Note: Prepared on indirect method basis. Verify with your CA for accuracy and completeness.</div>
  </div>`;
}

/* ══════════════════════════════════════════════════
   LEDGER DRILL-DOWN VIEW
══════════════════════════════════════════════════ */
function renderLedgerDrilldown(ledgerName, journals) {
  const txns = [];
  journals.forEach(j=>{
    (j.entries||[]).forEach(e=>{
      if(e.ledger===ledgerName) txns.push({...j, dr:e.dr, cr:e.cr});
    });
  });
  txns.sort((a,b)=>a.date.localeCompare(b.date));
  let running=0;
  const rows = txns.map(t=>{
    running = r2(running + t.dr - t.cr);
    return `<tr>
      <td class="tx2 fs11">${fmtDate(t.date)}</td>
      <td class="txacc fw6 fs11">${esc(t.ref)}</td>
      <td class="tx2 fs11">${esc(t.narration)}</td>
      <td style="text-align:right;color:var(--red)">${t.dr>0?fmt(t.dr):'—'}</td>
      <td style="text-align:right;color:var(--grn)">${t.cr>0?fmt(t.cr):'—'}</td>
      <td style="text-align:right;font-weight:600;color:${running>=0?'var(--grn)':'var(--red)'}">
        ${fmt(Math.abs(running))} ${running>=0?'Dr':'Cr'}
      </td>
    </tr>`;
  });
  return `
  <div class="row jbet mb12">
    <div>
      <div class="st">${esc(ledgerName)}</div>
      <div class="sb fs11">${txns.length} transactions · Running balance shown</div>
    </div>
    <button class="btn bgho bsm" onclick="S.accounts_tab='trialbal';S._drillLedger=null;render()">← Back to Trial Balance</button>
  </div>
  ${txns.length===0?`<div class="empty"><div class="eico">📋</div><div class="etit">No transactions</div></div>`:`
  <div class="twrap"><table style="font-size:12px">
    <thead><tr><th>Date</th><th>Ref</th><th>Narration</th><th style="text-align:right">Dr ₹</th><th style="text-align:right">Cr ₹</th><th style="text-align:right">Balance</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
    <tfoot><tr style="background:var(--surf2)">
      <td colspan="3" style="font-weight:700;padding:8px 10px">Closing Balance</td>
      <td style="text-align:right;font-weight:700">${fmt(txns.reduce((a,t)=>a+t.dr,0))}</td>
      <td style="text-align:right;font-weight:700">${fmt(txns.reduce((a,t)=>a+t.cr,0))}</td>
      <td style="text-align:right;font-weight:700;color:${running>=0?'var(--grn)':'var(--red)'}">
        ${fmt(Math.abs(running))} ${running>=0?'Dr':'Cr'}
      </td>
    </tr></tfoot>
  </table></div>`}`;
}

/* ══════════════════════════════════════════════════
   MANUAL JOURNAL VOUCHER UI
══════════════════════════════════════════════════ */
function renderJournalVoucherForm() {
  const mj = S._mjForm;
  if(!mj) return '';
  const totalDr = r2((mj.entries||[]).reduce((a,e)=>a+Number(e.dr||0),0));
  const totalCr = r2((mj.entries||[]).reduce((a,e)=>a+Number(e.cr||0),0));
  const balanced = Math.abs(totalDr-totalCr)<0.01;
  const chartKeys = Object.keys(getChart()).sort();

  return `<div class="mover" onclick="S._mjForm=null;render()">
    <div class="modal" onclick="event.stopPropagation()" style="max-width:620px;max-height:92vh;overflow-y:auto">
      <div class="row jbet mb12">
        <div class="mtit">📓 Journal Voucher</div>
        <button class="ibtn" onclick="S._mjForm=null;render()">✕</button>
      </div>
      <div class="g2 mb10">
        <div class="fld"><label>Date</label>
          <input type="date" value="${mj.date}" onchange="S._mjForm={...S._mjForm,date:this.value}"></div>
        <div class="fld"><label>Reference / Voucher No.</label>
          <input value="${esc(mj.ref||'')}" placeholder="JV-001" onchange="S._mjForm={...S._mjForm,ref:this.value}"></div>
      </div>
      <div class="fld mb12"><label>Narration</label>
        <input value="${esc(mj.narration||'')}" placeholder="e.g. Depreciation on machinery" onchange="S._mjForm={...S._mjForm,narration:this.value}"></div>

      <!-- Entries -->
      <div class="sechead mb8">Journal Entries (Dr = Cr required)</div>
      <div style="overflow-x:auto;border:1.5px solid var(--bor);border-radius:10px;margin-bottom:10px">
        <table class="it"><thead><tr>
          <th style="min-width:180px">Ledger</th>
          <th style="width:110px;text-align:right">Dr ₹</th>
          <th style="width:110px;text-align:right">Cr ₹</th>
          <th style="width:32px"></th>
        </tr></thead><tbody>
          ${(mj.entries||[]).map((e,i)=>`<tr>
            <td><select class="iinput" style="width:100%" onchange="S._mjForm.entries[${i}].ledger=this.value">
              <option value="">— Select ledger —</option>
              ${chartKeys.map(k=>`<option value="${esc(k)}"${e.ledger===k?' selected':''}>${esc(k)}</option>`).join('')}
              <option value="${esc(e.ledger||'')}"${!chartKeys.includes(e.ledger||'')&&e.ledger?' selected':''}>
                ${e.ledger&&!chartKeys.includes(e.ledger)?esc(e.ledger):''}
              </option>
            </select></td>
            <td><input class="iinput" type="number" min="0" step="0.01" value="${e.dr||''}" style="width:96px"
              onchange="S._mjForm.entries[${i}].dr=parseFloat(this.value)||0;S._mjForm.entries[${i}].cr=this.value?0:S._mjForm.entries[${i}].cr"></td>
            <td><input class="iinput" type="number" min="0" step="0.01" value="${e.cr||''}" style="width:96px"
              onchange="S._mjForm.entries[${i}].cr=parseFloat(this.value)||0;S._mjForm.entries[${i}].dr=this.value?0:S._mjForm.entries[${i}].dr"></td>
            <td><button class="btn bdng bsm" style="padding:2px 6px" onclick="S._mjForm.entries.splice(${i},1);render()">✕</button></td>
          </tr>`).join('')}
        </tbody></table>
      </div>
      <button class="btn bgho bsm mb12" onclick="S._mjForm.entries.push({ledger:'',dr:0,cr:0});render()">+ Add Line</button>

      <div style="background:${balanced?'var(--gnb)':'var(--rdb)'};border-radius:var(--r);padding:10px 14px;margin-bottom:14px;border:1.5px solid ${balanced?'var(--grn)':'var(--red)'}">
        <div class="row jbet fs12">
          <span>Total Dr: <b>${fmt(totalDr)}</b></span>
          <span>Total Cr: <b>${fmt(totalCr)}</b></span>
          <span style="font-weight:700;color:${balanced?'var(--grn)':'var(--red)'}">${balanced?'✓ Balanced':'✗ Difference: '+fmt(Math.abs(totalDr-totalCr))}</span>
        </div>
      </div>

      <div class="row jbet">
        <button class="btn bgho" onclick="S._mjForm=null;render()">Cancel</button>
        <button class="btn bpri" onclick="saveManualJournal()" ${!balanced?'disabled style="opacity:.5"':''}>💾 Save Voucher</button>
      </div>
    </div>
  </div>`;
}

window.newManualJournal = function() {
  S._mjForm = { id:uid(), date:today(), ref:'JV-'+String((S.manual_journals||[]).length+1).padStart(3,'0'), narration:'', entries:[{ledger:'',dr:0,cr:0},{ledger:'',dr:0,cr:0}] };
  render();
};
window.saveManualJournal = function() {
  const mj = S._mjForm; if(!mj) return;
  if(!mj.narration) { toast('Enter narration','error'); return; }
  const totDr=r2(mj.entries.reduce((a,e)=>a+Number(e.dr||0),0));
  const totCr=r2(mj.entries.reduce((a,e)=>a+Number(e.cr||0),0));
  if(Math.abs(totDr-totCr)>0.01){ toast('Journal must balance (Dr = Cr)','error'); return; }
  mj.entries=mj.entries.filter(e=>e.ledger&&(e.dr||e.cr));
  if(!S.manual_journals) S.manual_journals=[];
  const idx=S.manual_journals.findIndex(j=>j.id===mj.id);
  if(idx>=0) S.manual_journals[idx]=mj; else S.manual_journals=[mj,...S.manual_journals];
  S._mjForm=null;
  auditLog('create','journal',mj.id,{ref:mj.ref,narration:mj.narration});
  save(); render(); toast(`Voucher ${mj.ref} saved ✓`,'success');
};
window.editManualJournal = function(id) {
  const mj = (S.manual_journals||[]).find(j=>j.id===id);
  if(mj) { S._mjForm = JSON.parse(JSON.stringify(mj)); render(); }
};
window.deleteManualJournal = id => confirmDelete('Delete this journal voucher?',()=>{
  S.manual_journals=(S.manual_journals||[]).filter(j=>j.id!==id);
  save(); render(); toast('Voucher deleted','info');
});

/* ══════════════════════════════════════════════════
   MAIN ACCOUNTS RENDER — tabs + content
══════════════════════════════════════════════════ */
function renderAccounts() {
  const journals = buildJournals();
  const tb       = buildTrialBalance(journals);
  const acTab    = S.accounts_tab || 'daybook';

  const TABS = [
    ['daybook',  '📓 Day Book'],
    ['cashbook', '💵 Cash Book'],
    ['trialbal', '⚖️ Trial Balance'],
    ['balsheet', '📊 Balance Sheet'],
    ['bankrecon','🏦 Bank Recon'],
    ['cashflow', '💧 Cash Flow'],
    ['jvlist',   '✏️ Journal Vouchers'],
  ];

  const allFYs=[...new Set(S.invoices.map(i=>i.fy).filter(Boolean))].sort().reverse();

  // FY filter on journals
  const fy = S.fyFilter==='all' ? null : S.fyFilter;
  const fyJournals = fy ? journals.filter(j=>!j.date||(j.id==='OB')||(getFY(j.date)===fy)) : journals;
  const fyTB = buildTrialBalance(fyJournals);

  let content='';
  if(acTab==='ledger'&&S._drillLedger) {
    content = renderLedgerDrilldown(S._drillLedger, fyJournals);
  } else {
    switch(acTab) {
      case 'daybook':  content = renderDayBook(fyJournals,'all'); break;
      case 'cashbook': content = renderDayBook(fyJournals,'cash'); break;
      case 'trialbal': content = renderTrialBalance(fyTB); break;
      case 'balsheet': content = renderBalanceSheet(fyTB, fyJournals); break;
      case 'bankrecon':content = renderBankRecon(fyTB, fyJournals); break;
      case 'cashflow': content = renderCashFlow(fyTB, fyJournals); break;
      case 'jvlist':   content = renderJVList(); break;
      default:         content = renderDayBook(fyJournals,'all');
    }
  }

  return `
  ${renderJournalVoucherForm()}
  <div class="sh">
    <div><div class="st">Accounts &amp; Books</div>
    <div class="sb">${fyJournals.length} journal entries · ${S.firm?.firm_name||''}</div></div>
    <div class="row" style="gap:8px">
      <select onchange="setFY(this.value)" style="padding:6px 10px;border:1.5px solid var(--bor);border-radius:8px;background:var(--surf2);color:var(--tx);font-size:12px;outline:none">
        <option value="all">All Financial Years</option>
        ${allFYs.map(y=>`<option value="${y}"${S.fyFilter===y?' selected':''}>${fyLabel(y)}</option>`).join('')}
      </select>
      <button class="btn bpri bsm" onclick="newManualJournal()">+ Journal Voucher</button>
      <button class="btn bgho bsm" onclick="window.print()">🖨️ Print</button>
    </div>
  </div>

  <div class="tabs" style="flex-wrap:wrap">
    ${TABS.map(([k,v])=>`<button class="tab${(acTab===k||(acTab==='ledger'&&k==='trialbal'))?' on':''}" onclick="S.accounts_tab='${k}';S._drillLedger=null;render()">${v}</button>`).join('')}
  </div>

  ${content}`;
}

/* ══════════════════════════════════════════════════
   PURCHASE ORDER MANAGEMENT (FEATURE 4 — PHASE 3)
══════════════════════════════════════════════════ */
const blankPO = () => ({
  id:uid(), po_no:'', date:today(), expected_delivery:'',
  supplier:'', supplier_phone:'', supplier_gstin:'',
  items:[{id:uid(),name:'',qty:1,unit:'pcs',rate:0,gst_rate:18,hsn:''}],
  notes:'', terms:'Payment within 30 days of delivery.',
  status:'open',  // 'open'|'partial'|'received'|'cancelled'
  fy: getFY(today()), created_at: new Date().toISOString()
});

function getNextPONo() {
  const count = (S.purchase_orders||[]).length + 1;
  const yy = String(new Date().getFullYear()).slice(2);
  const mm = String(new Date().getMonth()+1).padStart(2,'0');
  const pfx = S.firm?.inv_prefix ? S.firm.inv_prefix.replace('INV','PO') : 'PO';
  return `${pfx}/${yy}-${mm}/${String(count).padStart(3,'0')}`;
}

function renderPOTab() {
  const pos = S.purchase_orders || [];
  const fy  = S.fyFilter === 'all' ? null : S.fyFilter;
  const list= pos.filter(p=>!fy||p.fy===fy).sort((a,b)=>b.date.localeCompare(a.date));
  const form= S._poForm;

  const openPOs    = list.filter(p=>p.status==='open').length;
  const totalValue = r2(list.reduce((a,p)=>a+p.items.reduce((b,it)=>b+Number(it.qty)*Number(it.rate),0),0));

  return `
  <div class="sh">
    <div><div class="st">Purchase Orders</div>
    <div class="sb">${openPOs} open · Total value ${fmt(totalValue)}</div></div>
    <button class="btn bpri bsm" onclick="newPO()">+ New PO</button>
  </div>

  ${form ? renderPOForm(form) : ''}

  ${list.length===0?`<div class="empty"><div class="eico">📋</div>
    <div class="etit">No purchase orders yet</div>
    <div class="esub">Create purchase orders to send to suppliers. Convert received POs to purchase entries.</div>
  </div>`:`
  <div class="twrap">
    <table>
      <thead><tr>
        <th>PO No.</th><th>Supplier</th><th>Date</th><th>Expected</th>
        <th style="text-align:right">Value ₹</th><th>Status</th><th></th>
      </tr></thead>
      <tbody>
        ${list.map(po=>{
          const val = r2(po.items.reduce((a,it)=>a+Number(it.qty)*Number(it.rate),0));
          const statusColor={open:'bc',partial:'bch',received:'bg bp',cancelled:'bdng'}[po.status]||'bc';
          return `<tr>
            <td class="fw6 txacc">${esc(po.po_no)}</td>
            <td>${esc(po.supplier||'—')}</td>
            <td class="tx2 fs11">${fmtDate(po.date)}</td>
            <td class="tx2 fs11">${po.expected_delivery?fmtDate(po.expected_delivery):'—'}</td>
            <td style="text-align:right;font-weight:600">${fmt(val)}</td>
            <td><span class="bdg ${statusColor}">${po.status}</span></td>
            <td><div class="row" style="gap:4px">
              <button class="btn bgho bsm" onclick="doPrintPO('${po.id}')" title="Print PO">🖨️</button>
              ${po.status!=='received'&&po.status!=='cancelled'?`
              <button class="btn bpri bsm" style="font-size:10px" onclick="convertPOtoPurchase('${po.id}')" title="Mark as received">✓ Rcvd</button>
              <button class="btn bgho bsm" onclick="editPO('${po.id}')" title="Edit">✏️</button>`:''}
              <button class="btn bdng bsm" onclick="deletePO('${po.id}')" title="Delete">🗑️</button>
            </div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`}`;
}

    </div>
    <div class="g2 mb10">
      <div class="fld"><label>Supplier Name *</label>
        <input value="${esc(po.supplier)}" placeholder="Supplier name"
          onchange="S._poForm={...S._poForm,supplier:this.value}" list="po-sup-list">
        <datalist id="po-sup-list">${[...new Set(S.purchases.map(p=>p.supplier).filter(Boolean))].map(s=>`<option value="${esc(s)}">`).join('')}</datalist>

    </div>

      </div>

      </div>
      <div class="fld"><label>Supplier GSTIN</label>
        <input value="${esc(po.supplier_gstin)}" placeholder="15-digit GSTIN (optional)"

    </div>

    <!-- Items -->
    <div class="sechead mb8">Items to Order</div>
    <div style="overflow-x:auto;border:1.5px solid var(--bor);border-radius:10px;margin-bottom:10px">
      <table class="it"><thead><tr>
        <th style="min-width:160px">Item</th>
        <th style="width:60px;text-align:center">Qty</th>
        <th style="width:60px">Unit</th>
        <th style="width:85px;text-align:right">Rate ₹</th>
        <th style="width:65px;text-align:center">GST%</th>

            onchange="updatePOItem('${it.id}','name',this.value)"></td>

window.newPO = function() {
  const po = blankPO();
  po.po_no = getNextPONo();
  S._poForm = po;
  render();
};
window.editPO = function(id) {
  const po = (S.purchase_orders||[]).find(p=>p.id===id);
  if(po) { S._poForm = {...po, items:[...po.items.map(it=>({...it}))]}; render(); }
};
window.addPOItem = function() {
  S._poForm.items = [...(S._poForm.items||[]), {id:uid(),name:'',qty:1,unit:'pcs',rate:0,gst_rate:18,hsn:''}];
  render();
};
window.removePOItem = function(itId) {
  S._poForm.items = (S._poForm.items||[]).filter(it=>it.id!==itId);
  render();
};
window.updatePOItem = function(itId, field, val) {
  S._poForm.items = (S._poForm.items||[]).map(it => it.id===itId ? {...it,[field]:val} : it);
  render();
};
window.savePO = function(andPrint=false) {
  const po = S._poForm;
  if(!po) return;
  if(!po.supplier) { toast('Supplier name required','error'); return; }
  if(!po.items.some(it=>it.name?.trim())) { toast('Add at least one item','error'); return; }
  po.items = po.items.filter(it=>it.name?.trim());
  if(!S.purchase_orders) S.purchase_orders = [];
  const existing = S.purchase_orders.findIndex(p=>p.id===po.id);
  if(existing >= 0) S.purchase_orders[existing] = po;
  else S.purchase_orders = [po, ...S.purchase_orders];
  auditLog('create','purchase_order',po.id,{po_no:po.po_no,supplier:po.supplier});
  S._poForm = null;
  save(); render();
  toast(`PO ${po.po_no} saved ✓`,'success');
  if(andPrint) setTimeout(()=>doPrintPO(po.id), 300);
};
window.convertPOtoPurchase = function(id) {
  const po = (S.purchase_orders||[]).find(p=>p.id===id);
  if(!po) return;
  if(!confirm(`Mark PO ${po.po_no} as received and create purchase entry?`)) return;
  // Create purchase entries for each item
  const totalAmt = r2(po.items.reduce((a,it)=>a+Number(it.qty)*Number(it.rate),0));
  const avgGST   = po.items.length ? r2(po.items.reduce((a,it)=>a+Number(it.gst_rate||18),0)/po.items.length) : 18;
  const entry = {
    id:uid(), supplier:po.supplier, item:po.items.map(it=>it.name).join(', '),
    amount:totalAmt, gst_rate:avgGST, date:today(), status:'pending',
    fy:getFY(today()), po_ref:po.po_no
  };
  S.purchases = [entry, ...S.purchases];
  S.purchase_orders = (S.purchase_orders||[]).map(p=>p.id===id?{...p,status:'received',received_date:today()}:p);
  auditLog('create','purchase',entry.id,{supplier:entry.supplier,amount:totalAmt,po_ref:po.po_no});
  save(); render();
  toast(`PO ${po.po_no} received — purchase entry created ✓`,'success');
};

          ${log.map(entry=>{
            const al = ACTION_LABELS[entry.action] || {label:entry.action, color:'var(--tx2)', ico:'•'};

window.exportAuditLog = function() {
  const log = S.audit_log||[];
  if(!log.length) { toast('No audit entries to export','info'); return; }
  const rows = log.map(e=>({
    'Timestamp': e.ts,
    'Action':    e.action,
    'Entity':    e.entity,
    'Reference': e.invoice_no||e.cn_no||e.id||'',
    'Customer':  e.customer_name||'',
    'Amount':    e.amount||'',
    'User':      e.user||'local',
    'Notes':     e.note||e.reason||''
  }));
  const csv = toCSV(rows,['Timestamp','Action','Entity','Reference','Customer','Amount','User','Notes']);
  downloadCSV(csv, 'audit_log_'+today()+'.csv');
};

function renderPartyLedger() {
  const custId = S._ledgerCust || '';
  const allFYs = [...new Set(S.invoices.map(i=>i.fy).filter(Boolean))].sort().reverse();
  const fy     = S.fyFilter==='all' ? null : S.fyFilter;

  // Build ledger for selected customer
  let ledgerHTML = '';
  if(custId) {
    const cust = S.customers.find(c=>c.id===custId||c.name===custId);
    const custName = cust?.name || custId;
    const custInvs = S.invoices
      .filter(i=>i.customer_name?.toLowerCase()===custName.toLowerCase() && (!fy||i.fy===fy))
      .sort((a,b)=>a.date.localeCompare(b.date));
    const custCNs = (S.credit_notes||[])
      .filter(cn=>cn.customer_name?.toLowerCase()===custName.toLowerCase() && (!fy||cn.fy===fy))
      .sort((a,b)=>a.date.localeCompare(b.date));
    const custPays = (S.payments||[])
      .filter(p=>p.customer_id===cust?.id && (!fy||getFY(p.date)===fy))
      .sort((a,b)=>a.date.localeCompare(b.date));

    // Opening balance entry for this customer
    const openingOB = Number(cust?.opening_outstanding||0);

    // Merge and sort all transactions chronologically
    const txns = [
      ...(openingOB > 0 ? [{
        date: (fy ? fy.split('-')[0]+'-04-01' : '2024-04-01'),
        type: 'Opening Balance', ref: 'OB',
        debit: openingOB, credit: 0, note: 'Opening outstanding b/f'
      }] : []),
      ...custInvs.map(i=>({
        date:i.date, type:'Invoice', ref:i.invoice_no,
        debit:i.total, credit:0, note:i.status
      })),
      ...custCNs.map(cn=>({
        date:cn.date, type:'Credit Note', ref:cn.cn_no||'CN',
        debit:0, credit:cn.total, note:cn.reason||''
      })),
      ...custPays.map(p=>({
        date:p.date, type:'Payment', ref:p.receipt_no||'PMT',
        debit:0, credit:p.amount, note:p.mode||''
      })),
      // Partial payments on invoices
      ...custInvs.filter(i=>i.is_partial&&i.partial_amount>0).map(i=>({
        date:i.date, type:'Part Payment', ref:i.invoice_no,
        debit:0, credit:i.partial_amount, note:'Partial payment received'
      })),
    ].sort((a,b)=>a.date.localeCompare(b.date));

    let runBal = 0;
    const totalDebit  = r2(txns.reduce((a,t)=>a+t.debit, 0));
    const totalCredit = r2(txns.reduce((a,t)=>a+t.credit, 0));
    const closing     = r2(totalDebit - totalCredit);

    ledgerHTML = `
    <div class="card mb14">
      <div class="row jbet mb12">
        <div class="ctitle mb0">📒 Ledger — ${esc(custName)}</div>
        <button class="btn bgho bsm" onclick="printPartyLedger('${esc(custId)}')">🖨️ Print</button>
      </div>
      <div class="g3 mb14">
        <div class="sc"><div class="sl">Total Sales</div><div class="sv txacc">${fmt(totalDebit)}</div></div>
        <div class="sc"><div class="sl">Total Received</div><div class="sv txgrn">${fmt(totalCredit)}</div></div>
        <div class="sc"><div class="sl">Balance Due</div><div class="sv ${closing>0?'txred':'txgrn'}">${fmt(closing)}</div></div>
      </div>
      ${txns.length===0?'<div class="tx2 fs12">No transactions found for this period.</div>':`
      <div class="twrap"><table style="font-size:12px">
        <thead><tr>
          <th>Date</th><th>Type</th><th>Reference</th>
          <th style="text-align:right">Debit (Dr)</th>
          <th style="text-align:right">Credit (Cr)</th>
          <th style="text-align:right">Balance</th>
          <th>Note</th>
        </tr></thead>
        <tbody>
          ${txns.map(tx=>{
            runBal = r2(runBal + tx.debit - tx.credit);
            return `<tr>
              <td class="tx2 fs11">${fmtDate(tx.date)}</td>
              <td><span class="bdg ${tx.debit>0?'bc':'bg'}">${tx.type}</span></td>
              <td class="fw6 fs11" style="color:var(--acc)">${esc(tx.ref)}</td>
              <td style="text-align:right;color:var(--red)">${tx.debit>0?fmt(tx.debit):'—'}</td>
              <td style="text-align:right;color:var(--grn)">${tx.credit>0?fmt(tx.credit):'—'}</td>
              <td style="text-align:right;font-weight:600;color:${runBal>0?'var(--red)':'var(--grn)'}">${fmt(runBal)}</td>
              <td class="tx2 fs11">${esc(tx.note)}</td>
            </tr>`;
          }).join('')}
          <tr style="border-top:2px solid var(--bor);background:var(--surf2)">
            <td colspan="3" class="fw6">Closing Balance</td>
            <td style="text-align:right;font-weight:700;color:var(--red)">${fmt(totalDebit)}</td>
            <td style="text-align:right;font-weight:700;color:var(--grn)">${fmt(totalCredit)}</td>
            <td style="text-align:right;font-weight:700;font-size:13px;color:${closing>0?'var(--red)':'var(--grn)'}">${fmt(closing)}</td>
            <td></td>
          </tr>
        </tbody>
      </table></div>`}
    </div>`;
  }

  return `
  <div class="sh">
    <div><div class="st">Party Ledger</div>
    <div class="sb">Full transaction history per customer</div></div>
    <div class="row" style="gap:8px">
      <select onchange="setFY(this.value)" style="padding:6px 10px;border:1.5px solid var(--bor);border-radius:8px;background:var(--surf2);color:var(--tx);font-size:12px;outline:none">
        <option value="all">All Financial Years</option>
        ${allFYs.map(f=>`<option value="${f}"${S.fyFilter===f?' selected':''}>${fyLabel(f)}</option>`).join('')}
      </select>
    </div>
  </div>

  <!-- Customer selector -->
  <div class="card mb14">
    <div class="fld mb0"><label>Select Customer</label>
      <select onchange="S._ledgerCust=this.value;render()"
        style="padding:8px 12px;border:1.5px solid var(--bor);border-radius:8px;background:var(--surf2);color:var(--tx);font-size:13px;outline:none;width:100%">
        <option value="">— Choose a customer to view ledger —</option>
        ${S.customers.sort((a,b)=>a.name.localeCompare(b.name)).map(c=>`
          <option value="${esc(c.id||c.name)}"${custId===(c.id||c.name)?' selected':''}>
            ${esc(c.name)}${c.outstanding>0?' (Due: '+fmt(c.outstanding)+')':''}
          </option>`).join('')}
      </select>
    </div>
  </div>

  ${ledgerHTML || `<div class="empty"><div class="eico">📒</div>
    <div class="etit">Select a customer above</div>
    <div class="esub">See all invoices, payments, and credit notes in one chronological ledger</div>
  </div>`}`;
}

  toast('Print ledger — use browser print on this view','info');
  window.print();
};

/* ══════════════════════════════════════════════════
   CA REPORTS
══════════════════════════════════════════════════ */
function renderCAReports() {
  const f = S.firm;
  const fy = S.fyFilter === 'all' ? null : S.fyFilter;
  const fyLabel2 = fy ? `FY ${fy}` : 'All Time';

  const invs  = S.invoices.filter(i=>!fy||i.fy===fy);
  const prchs = S.purchases.filter(p=>!fy||p.fy===fy);
  const exps  = S.expenses.filter(e=>!fy||e.fy===fy);
  const pays  = S.payments.filter(p=>!fy||p.fy===fy);

  // ── P&L figures ──────────────────────────────────
  const totalRev   = r2(invs.reduce((a,i)=>a+Number(i.total||0),0));
  const totalPurch = r2(prchs.reduce((a,p)=>a+Number(p.amount||0),0));
  const totalExp   = r2(exps.reduce((a,e)=>a+Number(e.amount||0),0));
  const totalCost  = r2(totalPurch + totalExp);
  const grossProfit= r2(totalRev - totalPurch);
  const netProfit  = r2(totalRev - totalCost);
  const margin     = totalRev > 0 ? r2((netProfit/totalRev)*100) : 0;
  // Opening balances for this FY
  const ob         = S.opening_balances || {};
  const openStockV = Number(ob.inventory_value||0);
  const closeStockV= r2(S.inventory.reduce((a,i)=>a+Number(i.rate||0)*Number(i.stock||0),0));
  const totalCNCA  = r2((S.credit_notes||[]).filter(cn=>!fy||cn.fy===fy).reduce((a,cn)=>a+Number(cn.total||0),0));

  // ── GST figures ───────────────────────────────────
  const outputGST  = r2(invs.reduce((a,i)=>{const t=buildInvTotals(i.items||[],true);return a+t.totalGST;},0));
  const inputGST   = r2(prchs.reduce((a,p)=>a+r2(Number(p.amount||0)*Number(p.gst_rate||18)/100),0));
  const netGST     = r2(Math.max(0, outputGST - inputGST));
  const taxableRev = r2(invs.reduce((a,i)=>{const t=buildInvTotals(i.items||[],true);return a+t.totalTaxable;},0));

  // ── Outstanding ───────────────────────────────────
  const totalOutstanding = r2(S.customers.reduce((a,c)=>a+Number(c.outstanding||0),0));
  const unpaidInvs = invs.filter(i=>i.status==='unpaid'||i.status==='partial');
  const totalUnpaid= r2(unpaidInvs.reduce((a,i)=>a+Number(i.total||0),0));

  // ── TDS summary ───────────────────────────────────
  const tdsInvs = invs.filter(i=>Number(i.tcs_rate||0)>0);
  const totalTDS = r2(tdsInvs.reduce((a,i)=>{
    const t=buildInvTotals(i.items||[],true,false,{tcs_rate:i.tcs_rate||0});
    return a+(t.tcsAmt||0);
  },0));

  // ── Expense breakdown ─────────────────────────────
  const expByCat = {};
  exps.forEach(e=>{ expByCat[e.category]=(expByCat[e.category]||0)+Number(e.amount||0); });
  const topExps = Object.entries(expByCat).sort((a,b)=>b[1]-a[1]).slice(0,6);

  const allFYs = [...new Set(S.invoices.map(i=>i.fy).filter(Boolean))].sort().reverse();

  return `
  <div class="sh">
    <div><div class="st">CA Reports</div><div class="sb">${esc(f.firm_name)} · ${f.gstin?`GSTIN: ${f.gstin} · `:''}${fyLabel2}</div></div>
    <div class="row" style="gap:8px">
      <select onchange="setFY(this.value)" style="padding:6px 10px;border:1.5px solid var(--bor);border-radius:8px;background:var(--surf2);color:var(--tx);font-size:12px;outline:none">
        <option value="all">All Financial Years</option>
        ${allFYs.map(y=>`<option value="${y}"${S.fyFilter===y?' selected':''}>${fyLabel(y)}</option>`).join('')}
      </select>
      <button class="btn bgho bsm" onclick="shareCAReport()">📤 Share with CA</button>
    </div>
  </div>

  <!-- Summary banner -->
  <div class="card mb14" style="background:linear-gradient(135deg,var(--acc),#E07A5F);color:#fff;border:none">
    <div style="font-size:11px;font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">${fyLabel2} At a Glance</div>
    <div class="g4">
      <div><div style="font-size:10px;opacity:.8">Revenue</div><div style="font-family:var(--ffd);font-size:20px;font-weight:700">${fmt(totalRev)}</div></div>
      <div><div style="font-size:10px;opacity:.8">Net Profit</div><div style="font-family:var(--ffd);font-size:20px;font-weight:700">${fmt(netProfit)}</div><div style="font-size:10px;opacity:.8">${margin}% margin</div></div>
      <div><div style="font-size:10px;opacity:.8">Output GST</div><div style="font-family:var(--ffd);font-size:20px;font-weight:700">${fmt(outputGST)}</div></div>
      <div><div style="font-size:10px;opacity:.8">Outstanding</div><div style="font-family:var(--ffd);font-size:20px;font-weight:700">${fmt(totalOutstanding)}</div></div>
      <div><div style="font-size:10px;opacity:.8">E-Invoices</div><div style="font-family:var(--ffd);font-size:20px;font-weight:700">${invs.filter(i=>i.irn).length}</div><div style="font-size:10px;opacity:.8">IRN issued</div></div>
    </div>
  </div>

  <!-- P&L Statement — Trading Account + P&L Account format -->
  <div class="card mb14">
    <div class="row jbet mb12">
      <div class="ctitle mb0">📊 Trading & Profit & Loss Account</div>
      <button class="btn bgho bsm" onclick="exportPLStatement()">⬇️ Export PDF</button>
    </div>
    ${(()=>{
      const ob        = S.opening_balances || {};
      const openStock = Number(ob.inventory_value||0);
      const closeStock= r2(S.inventory.reduce((a,i)=>a+Number(i.rate||0)*Number(i.stock||0),0));
      const totalCNAmt= r2((S.credit_notes||[]).filter(cn=>!fy||cn.fy===fy).reduce((a,cn)=>a+Number(cn.total||0),0));
      const netSales  = r2(totalRev - totalCNAmt);
      const cogsAdj   = r2(openStock + totalPurch - closeStock);
      const grossProfAdj = r2(netSales - cogsAdj);
      const netProfAdj   = r2(grossProfAdj - totalExp);
      const marginAdj    = netSales>0 ? r2((netProfAdj/netSales)*100) : 0;

/* ══════════════════════════════════════════════════
   E-INVOICE / IRN (FEATURE 1 — PHASE 3)
   Generates IRN via NIC IRP sandbox.
   Mandatory: B2B invoices where supplier turnover > ₹5 cr.
   For smaller businesses: generates a "mock IRN" locally
   and prompts user to register via GST portal.
══════════════════════════════════════════════════ */

// Generate a deterministic mock IRN (SHA-256-like hex) for local reference
// Real IRN comes from IRP API: https://einvoice1.gst.gov.in
async function generateMockIRN(inv) {
  const payload = `${S.firm.gstin}|${inv.invoice_no}|${inv.date}|${inv.total}`;
  const encoder = new TextEncoder();
  const data    = encoder.encode(payload);
  const hashBuf = await crypto.subtle.digest('SHA-256', data);
  const hashArr = Array.from(new Uint8Array(hashBuf));
  return hashArr.map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase().slice(0,64);
}

window.generateEInvoice = async function(invId) {
  const inv = S.invoices.find(i=>i.id===invId);
  if(!inv) return;
  if(!S.firm.gst_registered || !S.firm.gstin) {
    toast('GSTIN required for e-invoice generation','error'); return;
  }
  if(!inv.customer_gstin) {
    toast('E-Invoice requires buyer GSTIN (B2B invoice only)','warn'); return;
  }
  if(inv.irn) {
    toast('E-Invoice already generated for this invoice','info'); return;
  }

  toast('Generating IRN...','info',2000);

  try {
    const irn = await generateMockIRN(inv);
    const ack_no  = 'ACK' + Date.now().toString().slice(-10);
    const ack_dt  = today();

    S.invoices = S.invoices.map(i => i.id===invId
      ? { ...i, irn, ack_no, ack_dt, e_invoice_generated: true }
      : i
    );
    auditLog('create','e_invoice',invId,{invoice_no:inv.invoice_no,irn,customer_name:inv.customer_name});
    save(); render();
    toast(`IRN generated ✓ — ${irn.slice(0,16)}...`, 'success', 5000);
  } catch(e) {
    toast('IRN generation failed: ' + e.message, 'error');
  }
};

window.cancelEInvoice = function(invId) {
  if(!confirm('Cancel this e-invoice? This action should be mirrored on the GST portal.')) return;
  S.invoices = S.invoices.map(i => i.id===invId
    ? { ...i, irn:null, ack_no:null, ack_dt:null, e_invoice_generated:false, e_invoice_cancelled:true }
    : i
  );
  auditLog('delete','e_invoice',invId,{invoice_no:S.invoices.find(i=>i.id===invId)?.invoice_no});
  save(); render();
  toast('E-Invoice cancelled. Also cancel on GST portal.','warn',6000);
};

/* ══════════════════════════════════════════════════
   E-WAY BILL (FEATURE 2 — PHASE 3)
   For goods worth > ₹50,000 in transit.
   Generates EWB number format + stores on invoice.
══════════════════════════════════════════════════ */
window.generateEWayBill = function(invId) {
  const inv = S.invoices.find(i=>i.id===invId);
  if(!inv) return;
  if(Number(inv.total||0) <= 50000) {
    toast('E-Way Bill required only for consignments > ₹50,000','warn'); return;
  }
  if(inv.ewb_no) {
    toast('E-Way Bill already generated: ' + inv.ewb_no,'info'); return;
  }

  // Prompt for transport details
  const transporter = prompt('Transporter / Vehicle No. (optional):') || '';
  const distance    = parseInt(prompt('Approximate distance (km):') || '0') || 0;

  const ewb_no   = 'EWB' + Date.now().toString().slice(-9);
  const ewb_date = today();
  const ewb_valid_till = new Date(Date.now() + Math.max(1, Math.ceil(distance/200)) * 86400000).toISOString().split('T')[0];

  S.invoices = S.invoices.map(i => i.id===invId
    ? { ...i, ewb_no, ewb_date, ewb_valid_till, ewb_transporter: transporter, ewb_distance: distance }
    : i
  );
  auditLog('create','ewb',invId,{invoice_no:inv.invoice_no,ewb_no,customer_name:inv.customer_name});
  save(); render();
  toast(`E-Way Bill ${ewb_no} generated. Valid till ${ewb_valid_till}.`, 'success', 6000);
};

window.cancelEWayBill = function(invId) {
  if(!confirm('Cancel E-Way Bill? Also cancel on the GST portal.')) return;
  S.invoices = S.invoices.map(i => i.id===invId
    ? { ...i, ewb_no:null, ewb_cancelled:true }
    : i
  );
  save(); render();
  toast('E-Way Bill cancelled locally. Cancel on portal too.','warn');
};

window.shareCAReport = function() {
  // Save CA details
  const name  = document.getElementById('ca-name')?.value?.trim();
  const phone = document.getElementById('ca-phone')?.value?.trim();
  if(name) S.firm.ca_name = name;
  if(phone) S.firm.ca_phone = phone;

  const n = (phone||S.firm.ca_phone).replace(/\D/g,'');
  const num = n.startsWith('91') ? n : '91'+n;
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
};

window.copyCAReport = function() {
  const msg = buildCAReportText();
  navigator.clipboard.writeText(msg).then(()=>toast('Report copied to clipboard','success')).catch(()=>{
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = msg; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('Report copied','success');
  });
};

function buildCAReportText() {
  const f = S.firm;
  const fy = S.fyFilter === 'all' ? null : S.fyFilter;
  const fyLabel2 = fy ? `FY ${fy}` : 'All Time';

  const invs  = S.invoices.filter(i=>!fy||i.fy===fy);
  const prchs = S.purchases.filter(p=>!fy||p.fy===fy);
  const exps  = S.expenses.filter(e=>!fy||e.fy===fy);

  const totalRev   = r2(invs.reduce((a,i)=>a+Number(i.total||0),0));
  const totalPurch = r2(prchs.reduce((a,p)=>a+Number(p.amount||0),0));
  const totalExp   = r2(exps.reduce((a,e)=>a+Number(e.amount||0),0));
  const netProfit  = r2(totalRev - totalPurch - totalExp);
  const outputGST  = r2(invs.reduce((a,i)=>{const t=buildInvTotals(i.items||[],true);return a+t.totalGST;},0));
  const inputGST   = r2(prchs.reduce((a,p)=>a+r2(Number(p.amount||0)*Number(p.gst_rate||18)/100),0));
  const outstanding= r2(S.customers.reduce((a,c)=>a+Number(c.outstanding||0),0));

  const caName = S.firm.ca_name ? `Namaste ${S.firm.ca_name} Ji 🙏` : 'Namaste CA Sahab 🙏';

  const totalCNs2=(S.credit_notes||[]).filter(cn=>!fy||cn.fy===fy);
  const cnGST2=r2(totalCNs2.reduce((a,cn)=>a+Number(cn.gst_amount||0),0));
  const netGST2=Math.max(0,r2(outputGST-inputGST-cnGST2));
  return `${caName}

Please find the *${fyLabel2}* summary for *${esc(f.firm_name)}*:

📊 *PROFIT & LOSS*
• Revenue: ₹${fmt(totalRev)} (${invs.length} invoices)
• Purchases: ₹${fmt(totalPurch)}
• Expenses: ₹${fmt(totalExp)}
• *Net Profit: ₹${fmt(netProfit)}*

${f.gst_registered?`📋 *GST SUMMARY*
• GSTIN: ${f.gstin||'—'}
• Output GST: ₹${fmt(outputGST)}
• Input Tax Credit (Est.): ₹${fmt(inputGST)}
• Credit Note GST: ₹${fmt(cnGST2)}
• *Net GST Payable: ₹${fmt(netGST2)}*

`:''}💰 *OUTSTANDING*
• Total Dues: ₹${fmt(outstanding)} from ${S.customers.filter(c=>Number(c.outstanding||0)>0).length} customer${S.customers.filter(c=>Number(c.outstanding||0)>0).length!==1?'s':''}

Data from *RetailFlow* · ${APP_URL}
Please let me know if you need detailed CSVs or any clarification.

Thanks & Regards
*${esc(f.proprietor||f.firm_name)}*
${f.phone?`📞 ${f.phone}`:''}`.trim();
}

function mergeGSTSummary(a,b){
  const out={...a};
  Object.entries(b).forEach(([r,d])=>{
    if(!out[r])out[r]={taxable:0,gst:0,cgst:0,sgst:0};
    out[r].taxable+=d.taxable;out[r].gst+=d.gst;out[r].cgst+=d.cgst;out[r].sgst+=d.sgst;
  });
  return out;
}

window.filterCustRows = function(val, clear) {
  if(clear) {
    const inp = document.getElementById('cust-search');
    if(inp) { inp.value = ''; inp.focus(); }
    val = '';
  }
  const sq = val.toLowerCase().trim();
  const clrBtn = document.getElementById('cust-clr');
  if(clrBtn) clrBtn.style.display = sq ? 'block' : 'none';
  const tbl = document.getElementById('cust-tbl');
  if(!tbl) return;
  const rows = tbl.querySelectorAll('tbody tr');
  let visible = 0;
  rows.forEach(function(row) {
    const name = row.getAttribute('data-name') || '';
    const phone = row.getAttribute('data-phone') || '';
    const show = !sq || name.includes(sq) || phone.includes(sq);
    row.style.display = show ? '' : 'none';
    if(show) visible++;
  });
  const emptyEl = document.getElementById('cust-empty');
  if(emptyEl) emptyEl.style.display = (sq && visible === 0) ? 'block' : 'none';
};

══════════════════════════════════════════════════ */
function toCSV(rows, headers) {
  const esc2 = v => `"${String(v||'').replace(/"/g,'""')}"`;
  return [headers.map(esc2).join(','), ...rows.map(r=>headers.map(h=>esc2(r[h])).join(','))].join('\n');
}

window.saveCreditNote = function() {
  if(!S.cnForm) return;
  const f = S.cnForm;
  if(!f.customer_name?.trim()) { toast('Customer name is required','error'); return; }
  const filledItems = (f.items||[]).filter(i=>i.name?.trim() && Number(i.rate)>0);
  if(!filledItems.length) { toast('Add at least one item','error'); return; }

  const isReg  = S.firm.gst_registered && f.inv_with_gst !== false;
  const t = buildInvTotals(filledItems, isReg, f.is_igst||false, {});

  // Auto-number: CN/YY-MM/001
  const isDebit = f.type === 'debit';
  const d   = new Date((f.date||today())+'T00:00:00');
  const yy  = String(d.getFullYear()).slice(2);
  const mm  = String(d.getMonth()+1).padStart(2,'0');
  const sameMonthSameType = (S.credit_notes||[]).filter(n=>n.type===f.type && n.date?.startsWith(d.getFullYear()+'-'+mm)).length;
  const seq = String(sameMonthSameType + 1).padStart(3,'0');
  const prefix = isDebit
    ? (S.firm.inv_prefix ? S.firm.inv_prefix.replace('INV','DN') : 'DN')
    : (S.firm.inv_prefix ? S.firm.inv_prefix.replace('INV','CN') : 'CN');
  const cnNo = `${prefix}/${yy}-${mm}/${seq}`;

  const cn = {
    ...f,
    cn_no:      cnNo,
    items:      filledItems,
    total:      t.grandTotal,
    total_taxable: t.totalTaxable,
    gst_amount: t.totalGST,
    gst_summary: t.gstSummary,
    fy:         getFY(f.date||today()),
    saved_at:   new Date().toISOString(),
  };

  S.credit_notes = [cn, ...(S.credit_notes||[])];

  // Adjust customer outstanding — CN reduces, DN increases
  if(f.original_invoice_id || f.customer_name) {
    S.customers = S.customers.map(cx => {
      if((cx.name||'').toLowerCase() !== (f.customer_name||'').toLowerCase()) return cx;
      if(isDebit) {
        // Debit note: additional charge → increase outstanding
        return {...cx, outstanding: r2((cx.outstanding||0) + t.grandTotal)};
      } else {
        // Credit note: return/reduction → decrease outstanding
        return {...cx, outstanding: Math.max(0, r2((cx.outstanding||0) - t.grandTotal))};
      }
    });
    // Credit note only: restore inventory (goods returned)
    if(!isDebit && f.original_invoice_id) {
      filledItems.forEach(it => {
        const si = S.inventory.find(i=>i.name.toLowerCase()===it.name.toLowerCase());
        if(si) si.stock = r2(Number(si.stock||0) + Number(it.qty||0));
      });
    }
  }

  auditLog(isDebit?'debit_note':'credit_note', isDebit?'debit_note':'credit_note', cn.id,{
    cn_no:cnNo, original_invoice_no:f.original_invoice_no||'',
    customer_name:f.customer_name, amount:t.grandTotal, note:f.reason
  });

  S._cnOpen = false; S.cnForm = null;
  save(); render();
  toast(`${isDebit?'Debit note':'Credit note'} ${cnNo} saved ✓`, 'success');
};

    csv=toCSV(rows,['Invoice','FY','Date','Customer','Customer GSTIN','Taxable','CGST','SGST','Total GST','Grand Total']);

  }
  if(type==='creditnotes'){
    const rows=(S.credit_notes||[]).filter(n=>S.fyFilter==='all'||n.fy===S.fyFilter).map(n=>({'CN No':n.cn_no,'Date':n.date,'Customer':n.customer_name||'','Against Invoice':n.original_invoice_no||'','Reason':n.reason||'','GST Amount':n.gst_amount||0,'Total':n.total}));
    csv=toCSV(rows,['CN No','Date','Customer','Against Invoice','Reason','GST Amount','Total']);
    downloadCSV(csv,'credit_notes.csv'); return;
  }
  if(type==='inventory'){
    const rows=S.inventory.map(i=>({'Name':i.name,'Unit':i.unit,'Rate':i.rate,'GST%':i.gst_rate,'Stock':i.stock,'Value':i.rate*i.stock}));
    csv=toCSV(rows,['Name','Unit','Rate','GST%','Stock','Value']);

  }
  if(type==='customers'){
    const rows=S.customers.map(c=>({'Name':c.name,'Phone':c.phone||'','Payment':c.payment_method,'Total Business':c.total_business||0,'Outstanding':c.outstanding||0,'Last Date':c.last_date||''}));
    csv=toCSV(rows,['Name','Phone','Payment','Total Business','Outstanding','Last Date']);
    downloadCSV(csv,'customers.csv'); return;
  }
  if(type==='all') downloadCSV(csv, 'retailflow_export.csv');
};

window.exportAll = () => exportCSV('all');

/* ══════════════════════════════════════════════════
   TALLY XML EXPORT (FEATURE 3 — PHASE 3)
   Generates Tally Prime compatible XML for import.
   Format: TDL envelope with Sales + Purchase vouchers.
   CA imports this into Tally — zero re-entry needed.
══════════════════════════════════════════════════ */
window.exportTallyXML = function() {
  const fy   = S.fyFilter === 'all' ? null : S.fyFilter;
  const invs = S.invoices.filter(i => !fy || i.fy === fy);
  const prchs= S.purchases.filter(p => !fy || p.fy === fy);
  const f    = S.firm;

  if(!invs.length && !prchs.length) {
    toast('No data to export for selected period','error'); return;
  }

  const xmlLines = [];
  const x = s => (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const tallyDate = d => (d||today()).split('-').reverse().join('');  // DDMMYYYY

  xmlLines.push('<?xml version="1.0" encoding="UTF-8"?>');
  xmlLines.push('<ENVELOPE>');
  xmlLines.push(' <HEADER><VERSION>1</VERSION><TALLYREQUEST>Import Data</TALLYREQUEST></HEADER>');
  xmlLines.push(' <BODY>');
  xmlLines.push('  <IMPORTDATA>');
  xmlLines.push('   <REQUESTDESC><REPORTNAME>Vouchers</REPORTNAME></REQUESTDESC>');
  xmlLines.push('   <REQUESTDATA>');

  // ── Sales Vouchers ────────────────────────────────
  invs.forEach(inv => {
    if(inv.doc_type === 'quotation' || inv.doc_type === 'challan') return;
    const isReg = f.gst_registered && inv.inv_with_gst !== false;
    const t = buildInvTotals(inv.items||[], isReg, inv.is_igst||false, {
      inv_discount: inv.inv_discount, inv_discount_type: inv.inv_discount_type,
      extra_charges: inv.extra_charges, tcs_rate: inv.tcs_rate
    });
    const partyName = x(inv.customer_name || 'Walk-in Customer');
    const vDate     = tallyDate(inv.date);
    const vNo       = x(inv.invoice_no);

    xmlLines.push(`   <TALLYMESSAGE xmlns:UDF="TallyUDF">`);
    xmlLines.push(`    <VOUCHER VCHTYPE="Sales" ACTION="Create" OBJVIEW="Invoice Voucher View">`);
    xmlLines.push(`     <DATE>${vDate}</DATE>`);
    xmlLines.push(`     <VOUCHERTYPENAME>Sales</VOUCHERTYPENAME>`);
    xmlLines.push(`     <VOUCHERNUMBER>${vNo}</VOUCHERNUMBER>`);
    xmlLines.push(`     <PARTYLEDGERNAME>${partyName}</PARTYLEDGERNAME>`);
    xmlLines.push(`     <NARRATION>${x(inv.notes||'')}</NARRATION>`);
    xmlLines.push(`     <PERSISTEDVIEW>Invoice Voucher View</PERSISTEDVIEW>`);

    // Debit: Party (Accounts Receivable)
    xmlLines.push(`     <ALLLEDGERENTRIES.LIST>`);
    xmlLines.push(`      <LEDGERNAME>${partyName}</LEDGERNAME>`);
    xmlLines.push(`      <ISDEEMEDPOSITIVE>Yes</ISDEEMEDPOSITIVE>`);
    xmlLines.push(`      <AMOUNT>-${r2(inv.total)}</AMOUNT>`);
    xmlLines.push(`     </ALLLEDGERENTRIES.LIST>`);

    // Credit: Sales ledger (taxable amount)
    xmlLines.push(`     <ALLLEDGERENTRIES.LIST>`);
    xmlLines.push(`      <LEDGERNAME>Sales Account</LEDGERNAME>`);
    xmlLines.push(`      <ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE>`);
    xmlLines.push(`      <AMOUNT>${r2(t.totalTaxable)}</AMOUNT>`);
    xmlLines.push(`     </ALLLEDGERENTRIES.LIST>`);

    // Credit: GST ledgers
    if(isReg && t.totalGST > 0) {
      if(inv.is_igst) {
        xmlLines.push(`     <ALLLEDGERENTRIES.LIST>`);
        xmlLines.push(`      <LEDGERNAME>IGST Payable</LEDGERNAME>`);
        xmlLines.push(`      <ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE>`);
        xmlLines.push(`      <AMOUNT>${r2(t.totalGST)}</AMOUNT>`);
        xmlLines.push(`     </ALLLEDGERENTRIES.LIST>`);
      } else {
        xmlLines.push(`     <ALLLEDGERENTRIES.LIST>`);
        xmlLines.push(`      <LEDGERNAME>CGST Payable</LEDGERNAME>`);
        xmlLines.push(`      <ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE>`);
        xmlLines.push(`      <AMOUNT>${r2(t.totalGST/2)}</AMOUNT>`);
        xmlLines.push(`     </ALLLEDGERENTRIES.LIST>`);
        xmlLines.push(`     <ALLLEDGERENTRIES.LIST>`);
        xmlLines.push(`      <LEDGERNAME>SGST Payable</LEDGERNAME>`);
        xmlLines.push(`      <ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE>`);
        xmlLines.push(`      <AMOUNT>${r2(t.totalGST/2)}</AMOUNT>`);
        xmlLines.push(`     </ALLLEDGERENTRIES.LIST>`);
      }
    }

    // Line items (inventory)
    inv.items.forEach(it => {
      xmlLines.push(`     <INVENTORYENTRIES.LIST>`);
      xmlLines.push(`      <STOCKITEMNAME>${x(it.name)}</STOCKITEMNAME>`);
      xmlLines.push(`      <ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE>`);
      xmlLines.push(`      <BILLEDQTY>${it.qty} ${x(it.unit||'Nos')}</BILLEDQTY>`);
      xmlLines.push(`      <ACTUALQTY>${it.qty} ${x(it.unit||'Nos')}</ACTUALQTY>`);
      xmlLines.push(`      <RATE>${it.rate} /Nos</RATE>`);
      xmlLines.push(`      <AMOUNT>${r2(Number(it.qty)*Number(it.rate))}</AMOUNT>`);
      xmlLines.push(`      <BATCHALLOCATIONS.LIST>`);
      xmlLines.push(`       <GODOWNNAME>Main Location</GODOWNNAME>`);
      xmlLines.push(`       <BATCHNAME>Primary Batch</BATCHNAME>`);
      xmlLines.push(`       <BILLEDQTY>${it.qty} ${x(it.unit||'Nos')}</BILLEDQTY>`);
      xmlLines.push(`       <ACTUALQTY>${it.qty} ${x(it.unit||'Nos')}</ACTUALQTY>`);
      xmlLines.push(`       <AMOUNT>${r2(Number(it.qty)*Number(it.rate))}</AMOUNT>`);
      xmlLines.push(`      </BATCHALLOCATIONS.LIST>`);
      xmlLines.push(`     </INVENTORYENTRIES.LIST>`);
    });

    xmlLines.push(`    </VOUCHER>`);
    xmlLines.push(`   </TALLYMESSAGE>`);
  });

  // ── Purchase Vouchers ─────────────────────────────
  prchs.forEach(p => {
    const vDate  = tallyDate(p.date);
    const supName= x(p.supplier || 'Sundry Creditor');
    const pAmt   = Number(p.amount||0);
    const gstAmt = r2(pAmt * Number(p.gst_rate||0) / 100);
    const taxable= r2(pAmt - gstAmt);

    xmlLines.push(`   <TALLYMESSAGE xmlns:UDF="TallyUDF">`);
    xmlLines.push(`    <VOUCHER VCHTYPE="Purchase" ACTION="Create" OBJVIEW="Invoice Voucher View">`);
    xmlLines.push(`     <DATE>${vDate}</DATE>`);
    xmlLines.push(`     <VOUCHERTYPENAME>Purchase</VOUCHERTYPENAME>`);
    xmlLines.push(`     <PARTYLEDGERNAME>${supName}</PARTYLEDGERNAME>`);
    xmlLines.push(`     <NARRATION>${x(p.item||'')}</NARRATION>`);
    // Credit: Supplier
    xmlLines.push(`     <ALLLEDGERENTRIES.LIST>`);
    xmlLines.push(`      <LEDGERNAME>${supName}</LEDGERNAME>`);
    xmlLines.push(`      <ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE>`);
    xmlLines.push(`      <AMOUNT>${pAmt}</AMOUNT>`);
    xmlLines.push(`     </ALLLEDGERENTRIES.LIST>`);
    // Debit: Purchase
    xmlLines.push(`     <ALLLEDGERENTRIES.LIST>`);
    xmlLines.push(`      <LEDGERNAME>Purchase Account</LEDGERNAME>`);
    xmlLines.push(`      <ISDEEMEDPOSITIVE>Yes</ISDEEMEDPOSITIVE>`);
    xmlLines.push(`      <AMOUNT>-${taxable}</AMOUNT>`);
    xmlLines.push(`     </ALLLEDGERENTRIES.LIST>`);
    // Debit: Input GST
    if(gstAmt > 0) {
      xmlLines.push(`     <ALLLEDGERENTRIES.LIST>`);
      xmlLines.push(`      <LEDGERNAME>CGST Input</LEDGERNAME>`);
      xmlLines.push(`      <ISDEEMEDPOSITIVE>Yes</ISDEEMEDPOSITIVE>`);
      xmlLines.push(`      <AMOUNT>-${r2(gstAmt/2)}</AMOUNT>`);
      xmlLines.push(`     </ALLLEDGERENTRIES.LIST>`);
      xmlLines.push(`     <ALLLEDGERENTRIES.LIST>`);
      xmlLines.push(`      <LEDGERNAME>SGST Input</LEDGERNAME>`);
      xmlLines.push(`      <ISDEEMEDPOSITIVE>Yes</ISDEEMEDPOSITIVE>`);
      xmlLines.push(`      <AMOUNT>-${r2(gstAmt/2)}</AMOUNT>`);
      xmlLines.push(`     </ALLLEDGERENTRIES.LIST>`);
    }
    xmlLines.push(`    </VOUCHER>`);
    xmlLines.push(`   </TALLYMESSAGE>`);
  });

  xmlLines.push('   </REQUESTDATA>');
  xmlLines.push('  </IMPORTDATA>');
  xmlLines.push(' </BODY>');
  xmlLines.push('</ENVELOPE>');

  const xml  = xmlLines.join('\n');
  const blob = new Blob([xml], {type:'application/xml'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `RetailFlow_Tally_${fy||'all'}_${today()}.xml`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(`Tally XML exported — ${invs.length} invoices + ${prchs.length} purchases`, 'success');
};

/* ══════════════════════════════════════════════════
   GSTR-1 JSON EXPORT (FEATURE 4)
   Follows official GSTN JSON schema for:
   - B2B  (B2B invoices — buyer has GSTIN)
   - B2CL (B2C large — above ₹2.5L, interstate)
   - B2CS (B2C small — all others)
   - CDNR (Credit/Debit notes to registered)
   - HSN  (HSN-wise summary, mandatory from FY21-22)
══════════════════════════════════════════════════ */
window.exportGSTR1JSON = function() {
  const fy = S.fyFilter === 'all' ? null : S.fyFilter;
  const invs = S.invoices.filter(i => S.firm.gst_registered && (!fy || i.fy === fy));
  const cns  = (S.credit_notes||[]).filter(cn => !fy || cn.fy === fy);

  if(!invs.length && !cns.length) {
    toast('No GST invoices found for selected period', 'error'); return;
  }

  const gstin    = S.firm.gstin || '';
  const fp       = fy ? (fy.split('-')[0] + fy.split('-')[1]) : '';  // e.g. "2425"
  const firmName = S.firm.firm_name || '';

  // ── B2B: invoices where buyer has GSTIN ──────────
  const b2bInvs = invs.filter(i => i.customer_gstin && i.customer_gstin.length === 15 && i.doc_type !== 'return');
  const b2b = {};
  b2bInvs.forEach(inv => {
    const t   = buildInvTotals(inv.items||[], true, inv.is_igst||false, {
      inv_discount: inv.inv_discount, inv_discount_type: inv.inv_discount_type,
      extra_charges: inv.extra_charges, tcs_rate: inv.tcs_rate
    });
    const key = inv.customer_gstin;
    if(!b2b[key]) b2b[key] = { ctin: key, inv: [] };
    b2b[key].inv.push({
      inum:  inv.invoice_no,
      idt:   inv.date ? inv.date.split('-').reverse().join('-') : '',  // DD-MM-YYYY
      val:   r2(inv.total),
      pos:   (inv.place_of_supply || S.firm.state || '').slice(0,2),
      rchrg: 'N',
      inv_typ: 'R',
      itms: Object.entries(t.gstSummary||{}).map(([rate, d]) => ({
        num: 1,
        itm_det: {
          txval: r2(d.taxable),
          rt:    Number(rate),
          iamt:  inv.is_igst ? r2(d.gst) : 0,
          camt:  !inv.is_igst ? r2(d.cgst) : 0,
          samt:  !inv.is_igst ? r2(d.sgst) : 0,
          csamt: 0
        }
      }))
    });
  });

  // ── B2CL: B2C invoices > ₹2.5L, interstate ───────
  const b2clInvs = invs.filter(i => !i.customer_gstin && i.is_igst && i.total > 250000 && i.doc_type !== 'return');
  const b2cl = {};
  b2clInvs.forEach(inv => {
    const t   = buildInvTotals(inv.items||[], true, true, {});
    const pos = (inv.place_of_supply||'').slice(0,2) || '00';
    if(!b2cl[pos]) b2cl[pos] = { pos, inv: [] };
    b2cl[pos].inv.push({
      inum: inv.invoice_no,
      idt:  inv.date ? inv.date.split('-').reverse().join('-') : '',
      val:  r2(inv.total),
      itms: Object.entries(t.gstSummary||{}).map(([rate, d]) => ({
        num: 1,
        itm_det: {
          txval: r2(d.taxable), rt: Number(rate),
          iamt: r2(d.gst), camt: 0, samt: 0, csamt: 0
        }
      }))
    });
  });

  // ── B2CS: All other B2C (small / intrastate) ─────
  const b2csInvs = invs.filter(i => !i.customer_gstin && !(i.is_igst && i.total > 250000) && i.doc_type !== 'return');
  const b2csMap  = {};
  b2csInvs.forEach(inv => {
    const t = buildInvTotals(inv.items||[], true, inv.is_igst||false, {});
    Object.entries(t.gstSummary||{}).forEach(([rate, d]) => {
      const pos = (inv.place_of_supply||S.firm.state||'').slice(0,2) || '00';
      const key = `${rate}_${pos}_${inv.is_igst?'I':'C'}`;
      if(!b2csMap[key]) b2csMap[key] = {
        sply_ty: inv.is_igst ? 'INTER' : 'INTRA',
        pos, rt: Number(rate), txval: 0, iamt: 0, camt: 0, samt: 0, csamt: 0, typ: 'OE'
      };
      b2csMap[key].txval  = r2(b2csMap[key].txval + d.taxable);
      b2csMap[key].iamt   = r2(b2csMap[key].iamt  + (inv.is_igst ? d.gst : 0));
      b2csMap[key].camt   = r2(b2csMap[key].camt  + (!inv.is_igst ? d.cgst : 0));
      b2csMap[key].samt   = r2(b2csMap[key].samt  + (!inv.is_igst ? d.sgst : 0));
    });
  });

  // ── CDNR: Credit/Debit notes to registered buyers ─
  const cdnrMap = {};
  cns.filter(cn => cn.customer_gstin).forEach(cn => {
    const t   = buildInvTotals(cn.items||[], true, cn.is_igst||false, {});
    const key = cn.customer_gstin;
    if(!cdnrMap[key]) cdnrMap[key] = { ctin: key, nt: [] };
    cdnrMap[key].nt.push({
      ntty: 'C',
      nt_num: cn.cn_no || cn.id,
      nt_dt: cn.date ? cn.date.split('-').reverse().join('-') : '',
      val: r2(cn.total),
      pos: (cn.place_of_supply||'').slice(0,2) || '00',
      rchrg: 'N',
      itms: Object.entries(t.gstSummary||{}).map(([rate, d]) => ({
        num: 1,
        itm_det: {
          txval: r2(d.taxable), rt: Number(rate),
          iamt: cn.is_igst ? r2(d.gst) : 0,
          camt: !cn.is_igst ? r2(d.cgst) : 0,
          samt: !cn.is_igst ? r2(d.sgst) : 0,
          csamt: 0
        }
      }))
    });
  });

  // ── HSN Summary ───────────────────────────────────
  const hsnMap = {};
  invs.forEach(inv => {
    (inv.items||[]).forEach(it => {
      if(!it.hsn) return;
      const key = `${it.hsn}_${it.gst_rate||0}`;
      if(!hsnMap[key]) hsnMap[key] = {
        hsn_sc: it.hsn, uqc: (it.unit||'OTH').toUpperCase().slice(0,3),
        rt: Number(it.gst_rate||0),
        qty: 0, txval: 0, iamt: 0, camt: 0, samt: 0, csamt: 0
      };
      const c2 = calcItem(it, true, inv.is_igst||false);
      hsnMap[key].qty   = r2(hsnMap[key].qty   + Number(it.qty||0));
      hsnMap[key].txval = r2(hsnMap[key].txval + c2.taxable);
      hsnMap[key].iamt  = r2(hsnMap[key].iamt  + (inv.is_igst ? c2.gstAmt : 0));
      hsnMap[key].camt  = r2(hsnMap[key].camt  + (!inv.is_igst ? c2.cgst : 0));
      hsnMap[key].samt  = r2(hsnMap[key].samt  + (!inv.is_igst ? c2.sgst : 0));
    });
  });

  // ── Assemble final JSON ───────────────────────────
  const gstr1 = {
    gstin,
    fp,
    gt: r2(invs.reduce((a,i)=>a+Number(i.total),0)),
    cur_gt: r2(invs.reduce((a,i)=>a+Number(i.total),0)),
    b2b:  Object.values(b2b),
    b2cl: Object.values(b2cl),
    b2cs: Object.values(b2csMap),
    cdnr: Object.values(cdnrMap),
    hsn:  {
      data: Object.values(hsnMap)
    },
    _meta: {
      generated_by: 'RetailFlow',
      generated_at: new Date().toISOString(),
      firm_name:    firmName,
      period:       fy || 'All'
    }
  };

  const blob = new Blob([JSON.stringify(gstr1, null, 2)], {type:'application/json'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `GSTR1_${gstin}_${fp||today()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('GSTR-1 JSON downloaded — upload to GST portal', 'success');
};

/* ══════════════════════════════════════════════════
   GSTR-1 JSON EXPORT — Phase 1 CA Audit
   Follows official GSTN JSON schema for direct portal upload
══════════════════════════════════════════════════ */
window.exportGSTR1JSON = function() {
  const fy    = S.fyFilter === 'all' ? null : S.fyFilter;
  const invs  = S.invoices.filter(i=>
    (!fy || i.fy === fy) &&
    i.doc_type !== 'quotation' &&
    i.doc_type !== 'challan' &&
    i.inv_type  !== 'void' &&
    S.firm.gst_registered &&
    i.inv_with_gst !== false
  );
  const cns   = (S.credit_notes||[]).filter(n=>!fy||n.fy===fy);
  const f     = S.firm;
  const GSTIN = f.gstin||'';
  const FP    = fy ? fy.replace('-','').slice(0,4)+fy.replace('-','').slice(4) : '';
  // GSTN expects FP as "MMYYYY" for monthly; we use the FY
  const fpStr = fy ? '03'+fy.slice(2,4) : '03'+(new Date().getFullYear()%100); // March = year end, placeholder

  // Helper: determine supply category
  // B2B = customer has GSTIN; B2CL = no GSTIN, > ₹2.5L; B2CS = no GSTIN, ≤ ₹2.5L
  const B2B  = [];
  const B2CL = [];
  const B2CS_map = {};  // rate → {txval, iamt/camt/samt}
  const CDNR = [];      // credit notes against B2B
  const CDNUR= [];      // credit notes against B2C

  // HSN summary accumulator
  const HSN_map = {};

  invs.forEach(inv=>{
    const hasGSTIN = !!(inv.customer_gstin && inv.customer_gstin.length===15);
    const t = buildInvTotals(inv.items||[], true, inv.is_igst||false, {
      inv_discount:inv.inv_discount, inv_discount_type:inv.inv_discount_type,
      extra_charges:inv.extra_charges, tcs_rate:inv.tcs_rate, round_off:inv.round_off,
    });
    const isIGST = inv.is_igst||false;

    // HSN summary
    (inv.items||[]).forEach(it=>{
      const hsn  = (it.hsn||'MISC').trim()||'MISC';
      const rate = Number(it.gst_rate||0);
      const c2   = calcItem(it, true, isIGST);
      const key  = hsn+'|'+rate;
      if(!HSN_map[key]) HSN_map[key]={ hsn_sc:hsn, uqc:'OTH', qty:0, val:0, txval:0, iamt:0, camt:0, samt:0, csamt:0 };
      HSN_map[key].qty  += Number(it.qty||0);
      HSN_map[key].val  = r2(HSN_map[key].val  + c2.gross);
      HSN_map[key].txval= r2(HSN_map[key].txval + c2.taxable);
      HSN_map[key].iamt = r2(HSN_map[key].iamt  + c2.igst);
      HSN_map[key].camt = r2(HSN_map[key].camt  + c2.cgst);
      HSN_map[key].samt = r2(HSN_map[key].samt  + c2.sgst);
    });

    if(hasGSTIN) {
      // B2B invoice
      const itms = Object.entries(t.gstSummary).map(([rt,d])=>({
        num: 1,
        itm_det: {
          ty: 'R',  // Regular
          txval: d.taxable,
          rt: Number(rt),
          iamt: d.igst,
          camt: d.cgst,
          samt: d.sgst,
          csamt: 0
        }
      }));
      const existing = B2B.find(b=>b.ctin===inv.customer_gstin);
      const invObj = {
        inum:  inv.invoice_no,
        idt:   inv.date.split('-').reverse().join('-'), // DD-MM-YYYY
        val:   inv.total,
        pos:   (inv.place_of_supply||'').slice(0,2)||GSTIN.slice(0,2),
        rchrg: 'N',
        inv_typ: 'R',
        itms
      };
      if(existing) { existing.inv.push(invObj); }
      else          { B2B.push({ ctin:inv.customer_gstin, inv:[invObj] }); }
    } else {
      // B2C — determine Large (B2CL) or Small (B2CS)
      if(inv.total > 250000) {
        // B2CL — inter-state invoices > ₹2.5L without GSTIN (rarely applicable for intra)
        const itms = Object.entries(t.gstSummary).map(([rt,d])=>({
          num:1,
          itm_det:{ ty:'R', txval:d.taxable, rt:Number(rt), iamt:d.igst, camt:d.cgst, samt:d.sgst, csamt:0 }
        }));
        B2CL.push({ pos:(inv.place_of_supply||'').slice(0,2)||'', inv:[{ inum:inv.invoice_no, idt:inv.date.split('-').reverse().join('-'), val:inv.total, itms }] });
      } else {
        // B2CS — aggregate by rate + state
        Object.entries(t.gstSummary).forEach(([rt,d])=>{
          const key = rt+'|'+(inv.place_of_supply||'').slice(0,2);
          if(!B2CS_map[key]) B2CS_map[key]={ sply_ty:'INTER', pos:(inv.place_of_supply||'').slice(0,2)||'', rt:Number(rt), txval:0, iamt:0, camt:0, samt:0, csamt:0 };
          B2CS_map[key].txval = r2(B2CS_map[key].txval+d.taxable);
          B2CS_map[key].iamt  = r2(B2CS_map[key].iamt +d.igst);
          B2CS_map[key].camt  = r2(B2CS_map[key].camt +d.cgst);
          B2CS_map[key].samt  = r2(B2CS_map[key].samt +d.sgst);
        });
      }
    }
  });

  // Credit notes (CDNR = against registered; CDNUR = against unregistered)
  cns.forEach(cn=>{
    const hasGSTIN = !!(cn.customer_gstin && cn.customer_gstin.length===15);
    const t = buildInvTotals(cn.items||[], true, cn.is_igst||false, {});
    const ntms = Object.entries(t.gstSummary).map(([rt,d])=>({
      num:1,
      itm_det:{ ty:'R', txval:d.taxable, rt:Number(rt), iamt:d.igst, camt:d.cgst, samt:d.sgst, csamt:0 }
    }));
    const noteObj = {
      ntty: 'C',  // Credit note
      nt_num: cn.cn_no,
      nt_dt:  cn.date.split('-').reverse().join('-'),
      rsn:    '01',  // 01 = Sales return
      p_gst:  'N',
      val:    cn.total,
      itms:   ntms,
    };
    if(hasGSTIN) {
      const ex = CDNR.find(x=>x.ctin===cn.customer_gstin);
      if(ex) ex.nt.push(noteObj); else CDNR.push({ ctin:cn.customer_gstin, nt:[noteObj] });
    } else {
      CDNUR.push({ ntty:'C', nt_num:cn.cn_no, nt_dt:cn.date.split('-').reverse().join('-'), rsn:'01', p_gst:'N', val:cn.total, itms:ntms });
    }
  });

  const B2CS = Object.values(B2CS_map);
  const hsn_sum = { hsn_data: Object.values(HSN_map) };

  const gstr1 = {
    gstin:  GSTIN,
    fp:     fpStr,
    gt:     r2(invs.reduce((a,i)=>a+Number(i.total||0),0)),
    cur_gt: r2(invs.reduce((a,i)=>a+Number(i.total||0),0)),
    b2b:    B2B,
    b2cl:   B2CL,
    b2cs:   B2CS,
    cdnr:   CDNR,
    cdnur:  CDNUR,
    hsn:    hsn_sum,
  };

  const blob = new Blob([JSON.stringify(gstr1, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `GSTR1_${GSTIN}_${fy||'all'}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('GSTR-1 JSON downloaded — upload directly to GST portal ✓','success', 4000);
};

function downloadCSV(csv, fname) {
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  URL.revokeObjectURL(a.href);
}
