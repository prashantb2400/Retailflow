<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetailFlow — Smart Invoicing</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F3EE;--surf:#FFF;--surf2:#EDEAE3;--bor:#DDD8CF;
  --tx:#1C1915;--tx2:#7A746C;--acc:#BF4A2B;--acc2:#E07A5F;
  --grn:#2B6E4A;--gnb:#E8F4EE;--ylw:#9A6D1E;--ylb:#FBF4E4;
  --red:#BF4A2B;--rdb:#FAEDEA;--blu:#2655A0;--blb:#EAF0FB;
  --pur:#6B3FA0;--pub:#F0EAF8;
  --sh:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
  --shlg:0 12px 40px rgba(0,0,0,.12);
  --r:13px;--ff:'Sora',sans-serif;--ffd:'Playfair Display',serif;
}
[data-dark]{
  --bg:#131110;--surf:#1D1A17;--surf2:#232019;--bor:#302C27;
  --tx:#F0EDE6;--tx2:#9A948C;--acc:#E07A5F;--acc2:#BF4A2B;
  --gnb:#152618;--ylb:#221B0C;--rdb:#261511;--blb:#111B2B;--pub:#1e1528;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:var(--bg);color:var(--tx);min-height:100vh;transition:background .25s,color .25s}
button,input,select,textarea,datalist{font-family:var(--ff)}
.topbar{position:sticky;top:0;z-index:99;height:56px;background:var(--surf);border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:8px}

/* Keyboard shortcut hints */
.kb-hint{position:fixed;bottom:18px;right:18px;background:var(--surf);border:1.5px solid var(--bor);border-radius:10px;padding:10px 14px;box-shadow:var(--shlg);font-size:11px;color:var(--tx2);z-index:300;display:none}
.kb-hint.show{display:block}
.kb-hint kbd{background:var(--surf2);border:1px solid var(--bor);border-radius:4px;padding:1px 5px;font-size:10px;color:var(--tx);font-family:monospace}
.logo{font-family:var(--ffd);font-size:18px;color:var(--acc);letter-spacing:-.4px;white-space:nowrap;flex-shrink:0}
.logo b{color:var(--tx)}
.mtog{display:flex;background:var(--surf2);border:1.5px solid var(--bor);border-radius:9px;padding:3px;gap:2px;overflow-x:auto;max-width:100%}
.mbtn{border:none;background:transparent;padding:4px 10px;border-radius:7px;font-size:11px;font-weight:500;color:var(--tx2);transition:all .18s;white-space:nowrap;cursor:pointer}
.mbtn.on{background:var(--acc);color:#fff}
.tbr{display:flex;align-items:center;gap:5px;flex-shrink:0}
.wrap{max-width:1080px;margin:0 auto;padding:22px 16px}
.card{background:var(--surf);border:1.5px solid var(--bor);border-radius:var(--r);box-shadow:var(--sh);padding:20px}
.ctitle{font-family:var(--ffd);font-size:17px;margin-bottom:14px;color:var(--tx)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:11px}
@media(max-width:720px){.g2,.g3,.g4,.g5{grid-template-columns:1fr 1fr}}
@media(max-width:420px){.g2,.g3{grid-template-columns:1fr}}
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.fld label{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.55px}
.fld input,.fld select,.fld textarea{padding:8px 12px;border:1.5px solid var(--bor);border-radius:8px;background:var(--surf2);color:var(--tx);font-size:13px;outline:none;transition:border .18s;width:100%}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(191,74,43,.10)}
.fld textarea{resize:vertical}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:none;font-size:13px;font-weight:500;transition:all .18s;cursor:pointer}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.bpri{background:var(--acc);color:#fff}.bpri:hover{background:var(--acc2);transform:translateY(-1px)}
.bgho{background:transparent;color:var(--tx2);border:1.5px solid var(--bor)}.bgho:hover{background:var(--surf2);color:var(--tx)}
.bdng{background:var(--rdb);color:var(--red);border:1.5px solid transparent}.bdng:hover{background:var(--red);color:#fff}
.bwa{background:#25D366;color:#fff;border:none}.bwa:hover{background:#1fb558}
.bgrn{background:var(--grn);color:#fff;border:none}.bgrn:hover{opacity:.88}
.bblu{background:var(--blu);color:#fff;border:none}.bblu:hover{opacity:.88}
.bsm{padding:4px 9px;font-size:11px;border-radius:7px}
.wfull{width:100%;justify-content:center}
.ibtn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--bor);background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .18s;cursor:pointer}
.ibtn:hover{background:var(--bor)}
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.bc{background:var(--rdb);color:var(--red)}.bca{background:var(--gnb);color:var(--grn)}
.bu{background:var(--blb);color:var(--blu)}.bch{background:var(--ylb);color:var(--ylw)}
.bp{background:var(--gnb);color:var(--grn)}.bpu{background:var(--pub);color:var(--pur)}
.bcnt{background:var(--acc);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;margin-left:2px}
.tabs{display:flex;border-bottom:1.5px solid var(--bor);margin-bottom:18px;gap:1px;overflow-x:auto}
.tab{border:none;background:transparent;padding:8px 13px;font-size:12px;font-weight:500;color:var(--tx2);border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .18s;white-space:nowrap;cursor:pointer}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.twrap{overflow-x:auto;border-radius:9px;border:1.5px solid var(--bor)}
table{width:100%;border-collapse:collapse}
th{padding:8px 11px;text-align:left;font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;background:var(--surf2);border-bottom:1.5px solid var(--bor)}
td{padding:9px 11px;font-size:12px;border-bottom:1px solid var(--bor)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surf2)}
.sc{background:var(--surf);border:1.5px solid var(--bor);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.sl{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sv{font-family:var(--ffd);font-size:20px;color:var(--tx)}
.ss{font-size:11px;color:var(--tx2);margin-top:2px}
.trow{display:flex;gap:5px;flex-wrap:wrap}
.tag{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:500;border:1.5px solid var(--bor);background:var(--surf2);color:var(--tx2);transition:all .18s;cursor:pointer}
.tag.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.sh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.st{font-family:var(--ffd);font-size:23px;color:var(--tx)}
.sb{font-size:12px;color:var(--tx2);margin-top:3px}
hr{border:none;border-top:1.5px solid var(--bor);margin:14px 0}
.frow{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fbtn{padding:4px 11px;border-radius:20px;border:1.5px solid var(--bor);background:var(--surf2);color:var(--tx2);font-size:11px;font-weight:500;cursor:pointer;transition:all .18s}
.fbtn.on{background:var(--acc);color:#fff;border-color:var(--acc)}
/* Invoice item table */
.it{width:100%;border-collapse:collapse;min-width:680px}
.it th{font-size:9.5px;font-weight:700;color:var(--tx2);text-transform:uppercase;padding:7px 8px;border-bottom:2px solid var(--bor);background:var(--surf2);letter-spacing:.5px;white-space:nowrap}
.it th:first-child{border-radius:6px 0 0 0}
.it th:last-child{border-radius:0 6px 0 0}
.it td{padding:5px 5px;font-size:12px;border-bottom:1px solid var(--bor);vertical-align:middle}
.it tbody tr:last-child td{border-bottom:none}
.it tbody tr:hover td{background:var(--surf2)}
.iinput{width:100%;padding:6px 9px;border:1.5px solid var(--bor);border-radius:7px;background:var(--surf);color:var(--tx);font-size:12px;outline:none;font-family:var(--ff);transition:border .15s}
.iinput:focus{border-color:var(--acc);background:var(--surf)}
.iinput.ro{background:transparent;border-color:transparent;font-weight:600;color:var(--tx);padding-left:2px}
/* Form section headers */
.fsec{display:flex;align-items:center;gap:8px;margin:18px 0 12px;padding-bottom:8px;border-bottom:1.5px solid var(--bor)}
.fsec-icon{width:26px;height:26px;border-radius:7px;background:var(--rdb);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.fsec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx2)}
/* Invoice form layout */
.inv-form-body{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start}
.inv-form-main{min-width:0}
.inv-totals-sticky{position:sticky;top:72px}
@media(max-width:860px){.inv-form-body{grid-template-columns:1fr}.inv-totals-sticky{position:static}}
/* Modals */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:var(--surf);border-radius:18px;padding:24px;width:100%;max-width:520px;box-shadow:var(--shlg);margin:auto}
.mtit{font-family:var(--ffd);font-size:19px;margin-bottom:12px}
.rmtxt{background:var(--surf2);border:1.5px solid var(--bor);border-radius:9px;padding:13px;font-size:13px;line-height:1.75;color:var(--tx);white-space:pre-wrap;max-height:200px;overflow-y:auto}
.alert{padding:9px 13px;border-radius:9px;font-size:12px;margin-bottom:12px;line-height:1.5}
.aerr{background:var(--rdb);color:var(--red)}.aok{background:var(--gnb);color:var(--grn)}
.awrn{background:var(--ylb);color:var(--ylw)}.ainfo{background:var(--blb);color:var(--blu)}
/* Setup */
.cwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px;background:var(--bg)}
.ccard{background:var(--surf);border:1.5px solid var(--bor);border-radius:20px;padding:32px;width:100%;max-width:560px;box-shadow:var(--shlg)}
.biglogo{font-family:var(--ffd);font-size:30px;color:var(--acc);margin-bottom:4px}
.asub{font-size:13px;color:var(--tx2);margin-bottom:20px}
.sechead{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.7px;padding:10px 0 8px;border-bottom:1.5px solid var(--bor);margin-bottom:14px;margin-top:6px}
/* Misc */
.empty{text-align:center;padding:40px 20px;color:var(--tx2)}
.eico{font-size:38px;margin-bottom:8px}.etit{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:3px}
.row{display:flex;align-items:center;gap:8px}
.jbet{justify-content:space-between}
.mb8{margin-bottom:8px}.mb14{margin-bottom:14px}.mt8{margin-top:8px}.mt14{margin-top:14px}.mt18{margin-top:18px}
.tx2{color:var(--tx2)}.txacc{color:var(--acc)}.txgrn{color:var(--grn)}.txred{color:var(--red)}
.fw6{font-weight:600}.fs10{font-size:10px}.fs11{font-size:11px}.fs12{font-size:12px}.fs13{font-size:13px}
.lsnotice{background:var(--gnb);border:1.5px solid #b8dfc8;border-radius:10px;padding:10px 13px;font-size:12px;color:#1f5c39;margin-bottom:16px;line-height:1.6}
/* Partial payment bar */
.paybar-wrap{background:var(--surf2);border:1.5px solid var(--bor);border-radius:10px;padding:14px;margin-top:10px}
.paybar-track{height:8px;background:var(--bor);border-radius:99px;overflow:hidden;margin:8px 0}
.paybar-fill{height:100%;background:var(--grn);border-radius:99px;transition:width .3s}
/* GST month accordion */
.gst-month{background:var(--surf);border:1.5px solid var(--bor);border-radius:10px;margin-bottom:10px;overflow:hidden}
.gst-mhead{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.gst-mhead:hover{background:var(--surf2)}
.gst-mbody{padding:14px 16px;border-top:1.5px solid var(--bor)}
.gst-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid var(--bor)}
.gst-row:last-child{border-bottom:none}
/* Payment ledger */
.pay-ledger{border:1.5px solid var(--bor);border-radius:10px;overflow:hidden}
.pay-hdr{background:var(--surf2);padding:7px 12px;font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;display:grid;grid-template-columns:80px 1fr 70px 90px 80px 32px;gap:6px}
.pay-row{padding:8px 12px;font-size:12px;display:grid;grid-template-columns:80px 1fr 70px 90px 80px 32px;gap:6px;align-items:center;border-top:1px solid var(--bor)}
.pay-row:hover{background:var(--surf2)}
@media(max-width:600px){.pay-hdr,.pay-row{grid-template-columns:70px 1fr 70px 70px 32px}.pay-hdr span:nth-child(4),.pay-row span:nth-child(4){display:none}}
/* Thermal */
.thermal-preview{background:#fff;color:#000;font-family:'Courier New',monospace;font-size:11px;border:1.5px dashed var(--bor);border-radius:10px;padding:14px;max-width:290px;margin:0 auto}
.thr-center{text-align:center}.thr-line{border-top:1px dashed #888;margin:5px 0}
.thr-row{display:flex;justify-content:space-between;font-size:11px;margin:2px 0}
/* Inventory */
.inv-item{background:var(--surf);border:1.5px solid var(--bor);border-radius:10px;padding:13px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.stock-low{border-color:#e8c97a;background:var(--ylb)}
/* Toggle switch */
.tgl-wrap{display:flex;gap:8px}
.tgl{display:inline-flex;background:var(--surf2);border:1.5px solid var(--bor);border-radius:9px;padding:3px;gap:2px}
.tgl button{border:none;background:transparent;padding:5px 14px;border-radius:7px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .18s}
.tgl button.on{background:var(--acc);color:#fff}
@media print{.no-print{display:none!important}body{background:#fff}}

/* ── ANIMATIONS ─────────────────────────────────── */
/* Shake + error state for required fields */
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-7px)}30%{transform:translateX(7px)}45%{transform:translateX(-5px)}60%{transform:translateX(5px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
.field-error input,.field-error select,.field-error textarea{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(191,74,43,.18)!important;animation:shake .45s ease}
.field-error label{color:var(--red)!important}
.field-error-msg{font-size:10px;color:var(--red);margin-top:3px;font-weight:500}

/* Toast notifications */
#toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.18);pointer-events:all;min-width:220px;max-width:320px;animation:toastIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes toastIn{from{opacity:0;transform:translateY(16px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px) scale(.94)}}
.toast-out{animation:toastOut .25s ease forwards}
.toast-success{background:#1a5c38;color:#fff}
.toast-error{background:#a83226;color:#fff}
.toast-info{background:#1a3a6b;color:#fff}
.toast-warn{background:#7a5010;color:#fff}

/* Button ripple */
.btn{position:relative;overflow:hidden}
@keyframes ripple{to{transform:scale(3.5);opacity:0}}
.ripple-el{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);width:32px;height:32px;margin:-16px;animation:ripple .55s ease-out forwards;pointer-events:none}

/* Page / tab fade-in */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-fade{animation:fadeUp .22s ease}

/* Dashboard counter */
@keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sv{animation:countUp .35s ease}


/* Overdue pulse badge */
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(191,74,43,.5)}50%{box-shadow:0 0 0 6px rgba(191,74,43,0)}}
.pulse-badge{animation:pulse 1.8s infinite}

/* Invoice saved success banner */
@keyframes successPop{0%{transform:scale(.88);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
.inv-saved-banner{animation:successPop .35s cubic-bezier(.34,1.56,.64,1)}

/* Input focus lift */
.fld input:focus,.fld select:focus,.fld textarea:focus{transform:translateY(-1px);transition:border .18s,box-shadow .18s,transform .18s}

/* ── SEARCH BAR ──────────────────────────────── */
.srch-wrap{position:relative;margin-bottom:12px}
.srch-wrap input{padding:8px 12px 8px 34px;border:1.5px solid var(--bor);border-radius:9px;background:var(--surf2);color:var(--tx);font-size:13px;outline:none;transition:border .18s;width:100%}
.srch-wrap input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(191,74,43,.10)}
.srch-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}

/* ── CUSTOMER STATEMENT ──────────────────────── */
.stmt-row{display:grid;grid-template-columns:90px 1fr 80px 80px 90px;gap:6px;padding:7px 10px;font-size:12px;align-items:center;border-bottom:1px solid var(--bor)}
.stmt-hdr{background:var(--surf2);font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;border-radius:8px 8px 0 0}
.stmt-row:last-child{border-bottom:none}
.stmt-row:hover{background:var(--surf2)}
.stmt-bal-pos{color:var(--grn);font-weight:600}
.stmt-bal-neg{color:var(--red);font-weight:600}
@media(max-width:560px){.stmt-row{grid-template-columns:70px 1fr 70px 80px}}

/* ── ANALYTICS CHARTS ─────────────────────────── */
.chart-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.chart-wrap svg{min-width:320px}
.chart-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
.chart-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2)}
.chart-leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.period-note{font-size:11px;color:var(--tx2);margin-bottom:14px}

/* ── LOW STOCK ALERT ─────────────────────────── */
.low-stk-strip{background:var(--ylb);border:1.5px solid #d4a83a;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.low-stk-strip .lsi{font-size:12px;color:var(--ylw)}

/* ── COMMAND PALETTE ──────────────────────────── */
#cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding-top:14vh;backdrop-filter:blur(3px)}
#cmd-overlay.open{display:flex}
#cmd-box{background:var(--surf);border:1.5px solid var(--bor);border-radius:16px;width:100%;max-width:540px;box-shadow:0 24px 64px rgba(0,0,0,.22);overflow:hidden;animation:cmdIn .18s cubic-bezier(.34,1.56,.64,1)}
@keyframes cmdIn{from{opacity:0;transform:scale(.94) translateY(-12px)}to{opacity:1;transform:scale(1) translateY(0)}}
#cmd-input-wrap{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1.5px solid var(--bor)}
#cmd-input-wrap .cmd-ico{font-size:18px;color:var(--tx2);flex-shrink:0}
#cmd-q{border:none;background:transparent;font-size:15px;color:var(--tx);font-family:var(--ff);outline:none;flex:1;min-width:0}
#cmd-q::placeholder{color:var(--tx2)}
#cmd-hint{font-size:10px;color:var(--tx2);background:var(--surf2);border:1px solid var(--bor);border-radius:5px;padding:1px 6px;white-space:nowrap;flex-shrink:0}
#cmd-results{max-height:360px;overflow-y:auto}
.cmd-section{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx2);padding:10px 18px 4px}
.cmd-item{display:flex;align-items:center;gap:12px;padding:9px 18px;cursor:pointer;transition:background .12s;border-radius:0}
.cmd-item:hover,.cmd-item.cmd-sel{background:var(--rdb)}
.cmd-item .ci-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--surf2)}
.cmd-item.cmd-sel .ci-ico{background:var(--acc);color:#fff}
.cmd-item .ci-body{flex:1;min-width:0}
.cmd-item .ci-title{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmd-item .ci-sub{font-size:10.5px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmd-item .ci-tag{font-size:10px;background:var(--surf2);border:1px solid var(--bor);border-radius:5px;padding:1px 7px;color:var(--tx2);flex-shrink:0}
.cmd-empty{padding:28px;text-align:center;color:var(--tx2);font-size:13px}
#cmd-footer{border-top:1.5px solid var(--bor);padding:7px 18px;display:flex;gap:14px;font-size:10.5px;color:var(--tx2)}
#cmd-footer kbd{background:var(--surf2);border:1px solid var(--bor);border-radius:4px;padding:1px 5px;font-size:9.5px;color:var(--tx);font-family:monospace}

/* ── SMART CUSTOMER CARD ─────────────────────── */
#cust-card{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surf);border:1.5px solid var(--bor);border-radius:13px;box-shadow:var(--shlg);z-index:150;padding:14px 16px;display:none;animation:cmdIn .16s cubic-bezier(.34,1.56,.64,1)}
#cust-card.show{display:block}
.cc-name{font-family:var(--ffd);font-size:16px;color:var(--tx);margin-bottom:6px}
.cc-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.cc-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.cc-outstanding{background:var(--rdb);color:var(--red)}
.cc-settled{background:var(--gnb);color:var(--grn)}
.cc-pm{background:var(--surf2);color:var(--tx2);border:1px solid var(--bor)}
.cc-lastvisit{background:var(--blb);color:var(--blu)}
.cc-items-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);margin-bottom:6px}
.cc-items{display:flex;gap:6px;flex-wrap:wrap}
.cc-item-btn{padding:4px 12px;border-radius:20px;border:1.5px solid var(--bor);background:var(--surf2);color:var(--tx);font-size:11.5px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--ff)}
.cc-item-btn:hover{background:var(--acc);color:#fff;border-color:var(--acc);transform:translateY(-1px)}
.cc-item-btn:active{transform:scale(.96)}

/* ── SAVE BURST ───────────────────────────────── */
@keyframes burstScale{0%{transform:scale(0);opacity:1}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:0}}
.save-burst{position:fixed;pointer-events:none;z-index:2000;font-size:28px;animation:burstScale .55s cubic-bezier(.34,1.56,.64,1) forwards}

/* ── GREETING ─────────────────────────────────── */
.dash-greeting{font-family:var(--ffd);font-size:21px;color:var(--tx);margin-bottom:4px}
.dash-greeting span{color:var(--acc)}
.dash-sub{font-size:12px;color:var(--tx2);margin-bottom:14px}

/* ── P&L CARD ────────────────────────────────── */
.pl-bar{height:8px;border-radius:99px;overflow:hidden;background:var(--surf2);margin:6px 0}
.pl-fill{height:100%;border-radius:99px;transition:width .5s ease}

/* ── BACKUP/RESTORE ──────────────────────────── */
.backup-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:7px;border:1.5px solid var(--bor);background:var(--surf2);color:var(--tx2);font-size:11px;font-weight:500;transition:all .18s;cursor:pointer;white-space:nowrap}
.backup-btn:hover{background:var(--bor);color:var(--tx)}

/* ── AUTH PAGE ───────────────────────────────── */
.auth-root{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.auth-card{background:var(--surf);border:1.5px solid var(--bor);border-radius:20px;box-shadow:var(--shlg);padding:44px 40px;width:100%;max-width:400px;text-align:center}
@media(max-width:480px){.auth-card{padding:32px 22px;border-radius:16px}}
.auth-logo{font-family:var(--ffd);font-size:28px;color:var(--acc);margin-bottom:4px}
.auth-logo b{color:var(--tx)}
.auth-tagline{font-size:11.5px;color:var(--tx2);margin-bottom:32px;letter-spacing:.3px}
.auth-heading{font-size:21px;font-weight:600;color:var(--tx);margin-bottom:5px;font-family:var(--ffd)}
.auth-sub{font-size:12.5px;color:var(--tx2);margin-bottom:26px}
.auth-google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 18px;border-radius:11px;border:1.5px solid var(--bor);background:var(--surf);color:var(--tx);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:16px;font-family:var(--ff)}
.auth-google-btn:hover:not(:disabled){border-color:#4285F4;box-shadow:0 0 0 3px rgba(66,133,244,.13);background:var(--surf2)}
.auth-google-btn:disabled{opacity:.6;cursor:not-allowed}
.auth-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--tx2);font-size:11px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--bor)}
.auth-input{width:100%;padding:11px 14px;border:1.5px solid var(--bor);border-radius:10px;background:var(--surf2);color:var(--tx);font-size:13px;font-family:var(--ff);outline:none;transition:border .18s;margin-bottom:9px;display:block}
.auth-input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(191,74,43,.10)}
.auth-btn{width:100%;padding:12px;border-radius:11px;border:none;background:var(--acc);color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--ff);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.auth-btn:hover:not(:disabled){background:var(--acc2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(191,74,43,.28)}
.auth-btn:disabled{opacity:.55;transform:none;cursor:not-allowed}
.auth-switch{font-size:12px;color:var(--tx2);margin-top:18px}
.auth-switch span{color:var(--acc);font-weight:600;cursor:pointer}
.auth-switch span:hover{text-decoration:underline}
.auth-offline-btn{background:none;border:1.5px solid var(--bor);border-radius:9px;padding:9px 18px;font-size:12.5px;color:var(--tx2);cursor:pointer;font-family:var(--ff);transition:all .18s;width:100%}
.auth-offline-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--rdb)}
.auth-error{background:var(--rdb);border:1px solid var(--red);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--red);margin-bottom:12px;text-align:left;line-height:1.5}
.auth-loader{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spn .7s linear infinite;display:inline-block}
@keyframes spn{to{transform:rotate(360deg)}}

/* ── HAMBURGER BUTTON ────────────────────────── */
.hbg{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;padding:7px;border:1.5px solid var(--bor);border-radius:9px;background:var(--surf2);cursor:pointer;flex-shrink:0;transition:background .18s}
.hbg:hover{background:var(--bor)}
.hbg span{display:block;height:2px;border-radius:2px;background:var(--tx);transition:all .22s}
.hbg.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hbg.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hbg.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* ── SLIDE DRAWER ────────────────────────────── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:299;backdrop-filter:blur(3px)}
.drawer-overlay.open{display:block}
.drawer{position:fixed;left:0;top:0;bottom:0;width:272px;background:var(--surf);border-right:1.5px solid var(--bor);z-index:300;transform:translateX(-100%);transition:transform .27s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:6px 0 32px rgba(0,0,0,.15)}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:18px 16px 14px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between}
.drawer-logo{font-family:var(--ffd);font-size:20px;color:var(--acc)}
.drawer-logo b{color:var(--tx)}
.drawer-close{background:var(--surf2);border:1.5px solid var(--bor);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:all .16s}
.drawer-close:hover{color:var(--tx);background:var(--bor)}
.drawer-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:3px}
.d-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:11px;border:none;background:transparent;color:var(--tx2);font-size:14px;font-weight:500;font-family:var(--ff);cursor:pointer;transition:all .16s;text-align:left;width:100%}
.d-item:hover{background:var(--surf2);color:var(--tx)}
.d-item.on{background:var(--acc);color:#fff}
.d-item .di{font-size:20px;width:26px;text-align:center;flex-shrink:0}
.drawer-foot{padding:12px 10px 18px;border-top:1px solid var(--bor);display:flex;flex-direction:column;gap:6px}
.drawer-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;background:var(--surf2);border:1.5px solid var(--bor)}
.d-av{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--acc);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
.d-un{font-size:13px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-ue{font-size:10.5px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-signout{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:9px;border:1.5px solid var(--bor);background:var(--surf2);color:var(--tx2);font-size:12px;font-weight:500;cursor:pointer;transition:all .16s;font-family:var(--ff);width:100%;justify-content:center}
.d-signout:hover{background:var(--rdb);border-color:var(--red);color:var(--red)}

/* topbar user pill */
.usr-pill{display:flex;align-items:center;gap:6px;padding:3px 8px 3px 3px;border-radius:99px;border:1.5px solid var(--bor);background:var(--surf2);cursor:pointer;transition:all .18s;flex-shrink:0;max-width:140px}
.usr-pill:hover{border-color:var(--acc)}
.up-av{width:26px;height:26px;border-radius:50%;background:var(--acc);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.up-av img{width:26px;height:26px;border-radius:50%;object-fit:cover}
.up-nm{font-size:11px;font-weight:500;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* cloud sync badge */
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:3px}
.sync-dot.syncing{background:var(--ylw);animation:pulse .9s ease-in-out infinite}
.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* show hamburger on mobile, hide desktop toggle */
@media(max-width:640px){.mtog{display:none}.hbg{display:flex}}
@media(min-width:641px){.hbg,.drawer,.drawer-overlay{display:none!important}}

/* ── INVOICE LIST EXTRAS ─────────────────────── */
.inv-totals-bar{display:flex;gap:0;background:var(--surf2);border:1.5px solid var(--bor);border-radius:11px;overflow:hidden;margin-bottom:12px}
.itb-cell{flex:1;padding:9px 14px;text-align:center;border-right:1px solid var(--bor)}
.itb-cell:last-child{border-right:none}
.itb-val{font-size:14px;font-weight:700;color:var(--tx);font-family:var(--ffd)}
.itb-lbl{font-size:9.5px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
@media(max-width:500px){.itb-cell{padding:7px 8px}.itb-val{font-size:12px}}

.bulk-toolbar{display:flex;align-items:center;gap:8px;background:var(--blb);border:1.5px solid var(--blu);border-radius:10px;padding:8px 14px;margin-bottom:10px;flex-wrap:wrap}
.bulk-count{font-size:12px;font-weight:600;color:var(--blu);flex:1;min-width:80px}

.inv-cb{width:15px;height:15px;cursor:pointer;accent-color:var(--acc);flex-shrink:0}
.mark-paid-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;border:1.5px solid var(--grn);background:var(--gnb);color:var(--grn);font-size:10px;font-weight:600;cursor:pointer;transition:all .16s;white-space:nowrap;font-family:var(--ff)}
.mark-paid-btn:hover{background:var(--grn);color:#fff}

.outstanding-warn{display:flex;align-items:center;gap:8px;background:var(--ylb);border:1.5px solid #d4a83a;border-radius:9px;padding:8px 12px;font-size:12px;color:var(--ylw);margin-top:6px;line-height:1.5}
.new-cust-badge{display:inline-flex;align-items:center;gap:5px;background:var(--blb);border:1.5px solid var(--blu);border-radius:9px;padding:5px 10px;font-size:11.5px;color:var(--blu);margin-top:6px}
</style>
</head>
<body>
<div id="cmd-overlay" onclick="if(event.target===this)closeCmdPalette()">
  <div id="cmd-box" role="dialog" aria-label="Command palette">
    <div id="cmd-input-wrap">
      <span class="cmd-ico">⌘</span>
      <input id="cmd-q" placeholder="Search customers, invoices, items, actions…" autocomplete="off" spellcheck="false"
        oninput="renderCmdResults(this.value)"
        onkeydown="handleCmdKey(event)">
      <span id="cmd-hint">ESC to close</span>
    </div>
    <div id="cmd-results"></div>
    <div id="cmd-footer">
      <span><kbd>↑↓</kbd> navigate</span>
      <span><kbd>↵</kbd> select</span>
      <span><kbd>ESC</kbd> close</span>
      <span><kbd>Ctrl K</kbd> toggle</span>
    </div>
  </div>
</div>
<div id="app"></div>
<script>
/* ══════════════════════════════════════════════════
   RetailFlow v3
   Features: 19-item list fully implemented
   GST 2.0 slabs (Sept 2025): 0, 5, 18, 40%
══════════════════════════════════════════════════ */

/* ── SUPABASE CONFIG ─────────────────────────────
   Replace these two values with your Supabase project.
   Get them at: https://supabase.com → Project → Settings → API
   ─────────────────────────────────────────────── */
const SUPABASE_URL  = 'YOUR_SUPABASE_URL';   // e.g. https://xyzxyz.supabase.co
const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';
const SB_CONFIGURED = SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON !== 'YOUR_SUPABASE_ANON_KEY';

let _sb = null; // supabase client (null until configured)
if(SB_CONFIGURED){
  try { _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON); } catch(e){}
}

/* ── AUTH STATE ─────────────────────────────────── */
const AUTH = {
  user: null,      // supabase user object or null
  loading: true,   // true while checking session
  screen: 'login', // 'login' | 'signup'
  email: '', password: '', error: '', busy: false,
  offline: false,  // true if user chooses to skip login
  syncStatus: 'idle', // 'idle'|'syncing'|'ok'|'err'
};

/* ── AUTH HELPERS ───────────────────────────────── */
async function sbSignInGoogle(){
  if(!_sb) return;
  AUTH.busy=true; renderAuthScreen();
  const {error} = await _sb.auth.signInWithOAuth({
    provider:'google',
    options:{ redirectTo: window.location.href }
  });
  if(error){ AUTH.error=error.message; AUTH.busy=false; renderAuthScreen(); }
}

async function sbSignIn(){
  if(!_sb) return;
  AUTH.busy=true; AUTH.error=''; renderAuthScreen();
  const {error} = await _sb.auth.signInWithPassword({ email:AUTH.email, password:AUTH.password });
  AUTH.busy=false;
  if(error){ AUTH.error=error.message; renderAuthScreen(); }
}

async function sbSignUp(){
  if(!_sb) return;
  AUTH.busy=true; AUTH.error=''; renderAuthScreen();
  const {error} = await _sb.auth.signUp({ email:AUTH.email, password:AUTH.password });
  AUTH.busy=false;
  if(error){ AUTH.error=error.message; renderAuthScreen(); }
  else { AUTH.error=''; AUTH.screen='login'; toast('Account created! Check your email to confirm.','success'); renderAuthScreen(); }
}

async function sbSignOut(){
  closeDrawer();
  if(_sb) await _sb.auth.signOut();
  AUTH.user=null; AUTH.offline=false;
  render();
}

/* Push data to Supabase (non-blocking, best-effort) */
async function cloudSync(){
  if(!_sb || !AUTH.user) return;
  AUTH.syncStatus='syncing'; updateSyncBadge();
  try {
    const uid = AUTH.user.id;
    const payload = {
      user_id:uid, updated_at:new Date().toISOString(),
      firm:S.firm, customers:S.customers, invoices:S.invoices,
      purchases:S.purchases, sales:S.sales, expenses:S.expenses,
      payments:S.payments, inventory:S.inventory, inv_counters:S.inv_counters
    };
    const { error } = await _sb.from('retailflow_data').upsert(payload, { onConflict:'user_id' });
    AUTH.syncStatus = error ? 'err' : 'ok';
  } catch(e){ AUTH.syncStatus='err'; }
  updateSyncBadge();
}

function updateSyncBadge(){
  const dot = document.getElementById('sync-dot');
  if(!dot) return;
  dot.className = 'sync-dot' + (AUTH.syncStatus==='syncing'?' syncing':AUTH.syncStatus==='err'?' err':'');
  dot.title = {idle:'Cloud sync',syncing:'Syncing…',ok:'Synced ✓',err:'Sync failed'}[AUTH.syncStatus]||'';
}

/* Pull data from Supabase on login */
async function cloudPull(){
  if(!_sb || !AUTH.user) return;
  try {
    const {data,error} = await _sb.from('retailflow_data').select('*').eq('user_id',AUTH.user.id).single();
    if(error || !data) return;
    if(data.firm)          S.firm          = data.firm;
    if(data.customers)     S.customers     = data.customers;
    if(data.invoices)      S.invoices      = data.invoices;
    if(data.purchases)     S.purchases     = data.purchases;
    if(data.sales)         S.sales         = data.sales;
    if(data.expenses)      S.expenses      = data.expenses;
    if(data.payments)      S.payments      = data.payments;
    if(data.inventory)     S.inventory     = data.inventory;
    if(data.inv_counters)  S.inv_counters  = data.inv_counters;
    save(); render(); toast('Data loaded from cloud ☁️','info');
  } catch(e){}
}

/* ── AUTH SCREEN RENDERER ───────────────────────── */
function renderAuthScreen(){
  const app = document.getElementById('app'); if(!app) return;
  const sc = AUTH.screen;
  const googleSVG = `<svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.909-2.259c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.347 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>`;
  const isLogin = sc === 'login';
  const cfgNote = !SB_CONFIGURED ? `<div style="background:var(--ylb);border:1px solid #d4a83a;border-radius:9px;padding:10px 13px;font-size:11px;color:var(--ylw);text-align:left;margin-bottom:18px;line-height:1.65">⚙️ <b>Setup required:</b> Open the HTML file and set <code style="background:rgba(0,0,0,.06);padding:1px 4px;border-radius:4px">SUPABASE_URL</code> and <code style="background:rgba(0,0,0,.06);padding:1px 4px;border-radius:4px">SUPABASE_ANON</code> at the top of the script to enable cloud features.</div>` : '';
  app.innerHTML = `<div class="auth-root">
    <div class="auth-card">
      <div class="auth-logo">Retail<b>Flow</b></div>
      <div class="auth-tagline">Smart invoicing for Indian retail</div>
      ${cfgNote}
      <div class="auth-heading">${isLogin?'Welcome back':'Create account'}</div>
      <div class="auth-sub">${isLogin?'Sign in to sync your data across devices':'Get started — it\'s free'}</div>
      ${AUTH.error?`<div class="auth-error">⚠️ ${esc(AUTH.error)}</div>`:''}
      <button class="auth-google-btn" onclick="sbSignInGoogle()" ${!SB_CONFIGURED||AUTH.busy?'disabled':''}>
        ${AUTH.busy?'<span class="auth-loader"></span>':googleSVG}
        ${AUTH.busy?'Connecting…':'Continue with Google'}
      </button>
      <div class="auth-divider">or</div>
      <input class="auth-input" type="email" placeholder="Email address" value="${esc(AUTH.email)}"
        oninput="AUTH.email=this.value" autocomplete="email">

const r2 = v => Math.round((Number(v) + Number.EPSILON) * 100) / 100;

/* ── INVOICE DOCUMENT LABEL ─────────────────────── */
// TAX INVOICE  → any GST-registered business (legally required)
// BILL OF SUPPLY → unregistered Firm/Service (GST-exempt supply)
// INVOICE        → unregistered Retail/Shop (no GST compliance term applies)
function invDocLabel(isReg, isFirm, invType) {
  if(invType === 'proforma') return 'PROFORMA INVOICE';
  if(isReg) return 'TAX INVOICE';
  return isFirm ? 'BILL OF SUPPLY' : 'INVOICE';
}

function amountInWords(amount) {
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine',
    'Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function words(n) {
    if(n === 0) return '';
    if(n < 20) return ones[n] + ' ';
    if(n < 100) return tens[Math.floor(n/10)] + (n%10 ? ' ' + ones[n%10] : '') + ' ';
    if(n < 1000) return ones[Math.floor(n/100)] + ' Hundred ' + words(n%100);
    if(n < 100000) return words(Math.floor(n/1000)) + 'Thousand ' + words(n%1000);
    if(n < 10000000) return words(Math.floor(n/100000)) + 'Lakh ' + words(n%100000);
    return words(Math.floor(n/10000000)) + 'Crore ' + words(n%10000000);
  }
  const n = Math.round(Number(amount) * 100);
  const rupees = Math.floor(n / 100);
  const paise  = n % 100;
  let result = (rupees > 0 ? words(rupees).trim() + ' Rupees' : 'Zero Rupees');
  if(paise > 0) result += ' and ' + words(paise).trim() + ' Paise';
  return result + ' Only';
}

/* ── PER-ITEM GST CALC ──────────────────────────── */
function calcItem(item, isReg, isIGST) {
  const qty  = Number(item.qty)||0;
  const rate = Number(item.rate)||0;
  const disc = Math.min(100, Math.max(0, Number(item.discount)||0));
  const gst  = isReg ? (Number(item.gst_rate)||0) : 0;

  const gross   = r2(qty * rate);
  const discAmt = r2(gross * disc / 100);
  const taxable = r2(gross - discAmt);
  const gstAmt  = r2(taxable * gst / 100);

  // IGST: full rate as single tax; CGST+SGST: split equally
  let cgst = 0, sgst = 0, igst = 0;
  if(isIGST) {
    igst = gstAmt;
  } else {
    cgst = r2(taxable * gst / 200);
    sgst = r2(gstAmt - cgst);
  }
  const total = r2(taxable + gstAmt);
  return { gross, discAmt, taxable, gstAmt, cgst, sgst, igst, total };
}

function buildInvTotals(items, isReg, isIGST) {
  let subtotal=0, totalDisc=0, totalTaxable=0, totalGST=0, grandTotal=0;
  const gstSummary = {};
  items.forEach(item => {
    const c = calcItem(item, isReg, isIGST);
    subtotal     += c.gross;
    totalDisc    += c.discAmt;
    totalTaxable += c.taxable;
    totalGST     += c.gstAmt;
    grandTotal   += c.total;
    const rk = isReg ? (Number(item.gst_rate)||0) : 0;
    if(!gstSummary[rk]) gstSummary[rk]={taxable:0,gst:0,cgst:0,sgst:0,igst:0};
    gstSummary[rk].taxable += c.taxable;
    gstSummary[rk].gst     += c.gstAmt;
    gstSummary[rk].cgst    += c.cgst;
    gstSummary[rk].sgst    += c.sgst;
    gstSummary[rk].igst    += c.igst;
  });
  return {
    subtotal    : r2(subtotal),
    totalDisc   : r2(totalDisc),
    totalTaxable: r2(totalTaxable),
    totalGST    : r2(totalGST),
    grandTotal  : r2(grandTotal),
    gstSummary  : Object.fromEntries(Object.entries(gstSummary).map(([k,v])=>[k,{
      taxable: r2(v.taxable), gst: r2(v.gst), cgst: r2(v.cgst), sgst: r2(v.sgst), igst: r2(v.igst)
    }]))
  };
}

    inv_start: Math.max(1, Number($('sf-invstart')?.value)||1),
  };
  S.invForm = blankInv();
  save(); render();
};

function renderGSTSummaryPanel(t, isPrint) {
  const rates = Object.keys(t.gstSummary).map(Number).sort();
  const rowStyle = isPrint ? 'display:flex;justify-content:space-between;font-size:11px;padding:3px 0;' : '';
  let html = `<div class="row jbet fs12 mb8"><span class="tx2">Subtotal</span><span>${fmt(t.subtotal)}</span></div>`;
  if(t.totalDisc>0) html += `<div class="row jbet fs12 mb8"><span class="tx2">Total Discount</span><span class="txred">−${fmt(t.totalDisc)}</span></div>`;
  html += `<hr style="margin:8px 0">`;
  html += `<div class="fs11 fw6 tx2 mb8">GST BREAKUP</div>`;
  html += `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;min-width:340px">
    <thead><tr style="background:var(--surf2)"><th style="padding:4px 8px;text-align:left">Rate</th><th style="padding:4px 8px;text-align:right">Taxable</th><th style="padding:4px 8px;text-align:right">CGST</th><th style="padding:4px 8px;text-align:right">SGST</th><th style="padding:4px 8px;text-align:right">Total GST</th></tr></thead>
    <tbody>${rates.map(r=>`<tr><td style="padding:4px 8px">${r}%</td><td style="padding:4px 8px;text-align:right">${fmt(t.gstSummary[r].taxable)}</td><td style="padding:4px 8px;text-align:right">${fmt(t.gstSummary[r].cgst)}</td><td style="padding:4px 8px;text-align:right">${fmt(t.gstSummary[r].sgst)}</td><td style="padding:4px 8px;text-align:right;font-weight:600">${fmt(t.gstSummary[r].gst)}</td></tr>`).join('')}
    </tbody>
  </table></div>`;
  html += `<hr style="margin:8px 0">`;
  html += `<div class="row jbet fs12 mb4"><span class="tx2">Total Taxable</span><span>${fmt(t.totalTaxable)}</span></div>`;
  html += `<div class="row jbet fs12 mb8"><span class="tx2">Total GST (CGST+SGST)</span><span class="txred">${fmt(t.totalGST)}</span></div>`;
  html += `<div class="row jbet" style="font-family:var(--ffd);font-size:18px"><span>Grand Total</span><span class="txacc">${fmt(t.grandTotal)}</span></div>`;
  return html;
}

function renderItemRows() {
  const tbody = $('itbody'); if(!tbody||!S.invForm||!S.firm) return;
  const isReg = S.firm.gst_registered;
  tbody.innerHTML = S.invForm.items.map(it => {
    const c = calcItem(it, isReg);
    return `<tr>
      <td><input class="iinput" data-id="${it.id}" data-f="name" value="${esc(it.name)}" placeholder="Item / service name" list="inv-ac-${it.id}">
        <datalist id="inv-ac-${it.id}">${S.inventory.map(i=>`<option value="${esc(i.name)}">`).join('')}</datalist>
        ${S.firm.billing_type==='firm'?`<input class="iinput" data-id="${it.id}" data-f="description" value="${esc(it.description||'')}" placeholder="Details / sub-description (optional)" style="margin-top:3px;font-size:11px;color:var(--tx2)">`:''}</td>
      ${isReg?`<td><input class="iinput" data-id="${it.id}" data-f="hsn" value="${esc(it.hsn||'')}" placeholder="HSN" style="width:60px" title="HSN/SAC code (required for GST filing)"></td>`:''}
      <td><input class="iinput" data-id="${it.id}" data-f="qty" type="number" min="1" step="1" value="${it.qty}" style="width:52px"></td>
      <td><input class="iinput" data-id="${it.id}" data-f="rate" type="number" min="0" step="0.01" value="${it.rate}" style="width:76px"></td>
      <td><input class="iinput" data-id="${it.id}" data-f="discount" type="number" min="0" max="100" step="1" value="${it.discount||0}" style="width:55px"></td>
      ${isReg?`<td><select class="iinput" data-id="${it.id}" data-f="gst_rate" style="width:62px">${GST_SLABS.map(r=>`<option value="${r}"${Number(it.gst_rate)===r?' selected':''}>${r}%</option>`).join('')}</select></td>
        <td><input class="iinput ro" data-taxable="${it.id}" value="${fmt(c.taxable)}" readonly style="width:78px;font-size:11px"></td>
        <td><input class="iinput ro" data-gstamt="${it.id}" value="${fmt(c.gstAmt)}" readonly style="width:66px;font-size:11px;color:var(--red)"></td>` : ''}
      <td><input class="iinput ro" id="ia-${it.id}" value="${fmt(c.total)}" readonly style="width:86px;font-weight:600"></td>
      <td><button class="btn bdng bsm" style="padding:2px 6px" onclick="remIItem('${it.id}')">✕</button></td>
    </tr>`;
  }).join('');
  // Select-all on focus for numeric fields — no manual clearing needed
  tbody.querySelectorAll('.iinput[type="number"]').forEach(inp => {
    inp.addEventListener('focus', () => inp.select());
  });
  // Attach listeners — NO full re-render on input, only update computed cells in-place
  tbody.querySelectorAll('.iinput:not([readonly])').forEach(inp => {
    inp.addEventListener('input', e => {
      const id=e.target.dataset.id, f=e.target.dataset.f;
      const item=S.invForm.items.find(i=>i.id===id);
      if(!item) return;
      item[f] = e.target.value;
      // Auto-fill rate + gst from inventory when name matches exactly
      if(f==='name'){
        const invItem = S.inventory.find(i=>i.name.toLowerCase()===e.target.value.toLowerCase());
        if(invItem){
          item.rate     = invItem.rate;
          item.gst_rate = invItem.gst_rate;
          item.hsn      = invItem.hsn||'';
          const ri=tbody.querySelector(`[data-id="${id}"][data-f="rate"]`);
          const gi=tbody.querySelector(`[data-id="${id}"][data-f="gst_rate"]`);
          const hi=tbody.querySelector(`[data-id="${id}"][data-f="hsn"]`);
          if(ri) ri.value=invItem.rate;
          if(gi) gi.value=invItem.gst_rate;
          if(hi) hi.value=invItem.hsn||'';
        }
      }
      // Update only the computed readonly cells for this row — no full re-render
      const isReg = S.firm.gst_registered;
      const c = calcItem(item, isReg);
      const rowTot = tbody.querySelector(`#ia-${id}`);
      if(rowTot) rowTot.value = fmt(c.total);
      if(isReg){
        const taxEl = tbody.querySelector(`[data-taxable="${id}"]`);
        const gstEl = tbody.querySelector(`[data-gstamt="${id}"]`);
        if(taxEl) taxEl.value = fmt(c.taxable);
        if(gstEl) gstEl.value = fmt(c.gstAmt);
      }
      // Update totals panel only
      updateTotalsPanel();
    });
  });
}

function updateTotals() { updateTotalsPanel(); }

function updateTotalsPanel() {
  if(!S.invForm || !S.firm) return;
  const isReg = S.firm.gst_registered;
  const t = buildInvTotals(S.invForm.items, isReg);
  const panel = $('totals-panel');
  if(panel) {
    if(isReg) {
      panel.innerHTML = renderGSTSummaryPanel(t, false);
    } else {
      panel.innerHTML = `
        <div class="row jbet fs12 mb8"><span class="tx2">Subtotal</span><span>${fmt(t.subtotal)}</span></div>
        ${t.totalDisc>0?`<div class="row jbet fs12 mb8"><span class="tx2">Total Discount</span><span class="txred">−${fmt(t.totalDisc)}</span></div>`:''}
        <hr style="margin:8px 0">
        <div class="row jbet" style="font-family:var(--ffd);font-size:18px"><span>Total</span><span class="txacc">${fmt(t.grandTotal)}</span></div>`;
    }
  }
  // Update partial bar if visible
  const pam = Number($('ic-pam')?.value||0);
  const bar = $('par-bar'), pct = $('par-pct'), bal = $('par-bal');
  if(bar && t.grandTotal>0){
    const p = Math.min(100,(pam/t.grandTotal)*100);
    bar.style.width=p+'%';
    if(pct) pct.textContent=Math.round(p)+'% paid';
    if(bal) bal.textContent=fmt(Math.max(0,t.grandTotal-pam));
  }
}

function updatePartialBar() {
  updateTotals();
  if(!S.invForm) return;
  const isReg = S.firm.gst_registered;
  const t = buildInvTotals(S.invForm.items, isReg);
  const pam = Number($('ic-pam')?.value||0);
  S.invForm.partial_amount = pam;
  const pb=$('par-bar'),pp=$('par-pct'),bal=$('par-bal');
  if(pb&&t.grandTotal>0){const pct=Math.min(100,(pam/t.grandTotal)*100);pb.style.width=pct+'%';if(pp)pp.textContent=Math.round(pct)+'% paid';if(bal)bal.textContent=fmt(Math.max(0,t.grandTotal-pam));}
}

function attachCustAC() {
  const inp = $('ic-cn'); if(!inp) return;
  inp.addEventListener('change', () => {
    const m = S.customers.find(c=>c.name.toLowerCase()===inp.value.toLowerCase());
    if(m){ const ph=$('ic-cp'); if(ph&&!ph.value) ph.value=m.phone||''; showCustCard(m); }
  });
  document.addEventListener('mousedown', function _hideCCard(e){
    const card=$('cust-card'), inp2=$('ic-cn');
    if(card && inp2 && !card.contains(e.target) && e.target!==inp2){
      card.classList.remove('show'); card.innerHTML='';
      document.removeEventListener('mousedown',_hideCCard,true);
    }
  },{capture:true});
}

function showCustCard(cust) {
  const card=$('cust-card'); if(!card) return;
  const outstanding=Number(cust.outstanding||0);
  const outChip=outstanding>0
    ?`<span class="cc-chip cc-outstanding">&#x26A0;&#xFE0F; \u20B9${fmt(outstanding)} due</span>`
    :`<span class="cc-chip cc-settled">\u2713 Settled</span>`;
  const custInvs=S.invoices
    .filter(i=>(i.customer_phone&&cust.phone&&i.customer_phone===cust.phone)||i.customer_name===cust.name)
    .sort((a,b)=>b.date.localeCompare(a.date));
  const lastVisit=custInvs.length?custInvs[0].date:null;
  const lastChip=lastVisit?`<span class="cc-chip cc-lastvisit">\uD83D\uDD50 ${lastVisit}</span>`:'';
  const itemCount={};
  custInvs.forEach(inv=>(inv.items||[]).forEach(it=>{
    if(it.name) itemCount[it.name]=(itemCount[it.name]||0)+Number(it.qty||1);
  }));
  const topItems=Object.entries(itemCount).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n])=>n);
  const itemsHtml=topItems.length
    ?`<div class="cc-items-label">Quick add from history</div><div class="cc-items">${topItems.map(name=>`<button class="cc-item-btn" onclick='ccAddItem(${JSON.stringify(name)})'>${name}</button>`).join('')}</div>`
    :`<div style="font-size:11px;color:var(--tx2)">No invoice history yet.</div>`;
  card.innerHTML=`<div class="cc-name">${esc(cust.name)}</div><div class="cc-meta">${outChip}${lastChip}${cust.phone?`<span class="cc-chip cc-pm">\uD83D\uDCDE ${esc(cust.phone)}</span>`:''}</div>${itemsHtml}`;
  card.classList.add('show');
}

window.ccAddItem=function(name){
  const invItem=S.inventory.find(i=>i.name===name);
  const rate=invItem?Number(invItem.price||invItem.rate||0):0;
  const gst=invItem?Number(invItem.gst_rate||S.firm&&S.firm.default_gst_rate||0):Number(S.firm&&S.firm.default_gst_rate||0);
  if(!S.invForm) return;
  S.invForm.items.push({id:uid(),name,qty:1,unit:'pcs',rate,discount:0,gst_rate:gst,hsn:'',description:''});
  render();
  const card=$('cust-card'); if(card){card.classList.remove('show');card.innerHTML='';}
  toast('Added: '+name,'success');
};

function generateQR(text) {
  return new Promise(resolve => {
    if(!text || !window.QRCode){ resolve(''); return; }
    const div = document.createElement('div');
    div.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
    document.body.appendChild(div);
    try {
      new QRCode(div, { text, width:150, height:150, correctLevel:QRCode.CorrectLevel.M });
      // Poll for canvas instead of fixed timeout — more reliable on slow devices
      let attempts = 0;
      const check = () => {
        const canvas = div.querySelector('canvas');
        if(canvas && canvas.width > 0) {
          const url = canvas.toDataURL('image/png');
          document.body.removeChild(div);
          resolve(url);
        } else if(++attempts < 30) {
          setTimeout(check, 50);
        } else {
          if(document.body.contains(div)) document.body.removeChild(div);
          resolve('');
        }
      };
      setTimeout(check, 50);
    } catch(e){ if(document.body.contains(div)) document.body.removeChild(div); resolve(''); }
  });
}

window.doPrint = async function doPrint(id) {
  const inv = S.invoices.find(i=>i.id===id); if(!inv) return;
  const f = S.firm;
  const isReg = f.gst_registered;
  const isIGST = inv.is_igst||false;
  const t = buildInvTotals(inv.items||[], isReg, isIGST);
  // Open window synchronously (must happen before any await — browsers block popup otherwise)
  const w = window.open('','_blank');
  let qrURL = '';
  if(f.upi_id) {
    const upiStr = `upi://pay?pa=${encodeURIComponent(f.upi_id)}&pn=${encodeURIComponent(f.firm_name)}&am=${inv.total}&cu=INR&tn=${encodeURIComponent(inv.invoice_no)}`;
    qrURL = await generateQR(upiStr);
  }
  const html = printHTML(inv, f, t, isReg, qrURL);
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  if(!w || w.closed) {
    // Popup blocked — offer direct download fallback
    const a = document.createElement('a');
    a.href = url;
    a.download = (inv.invoice_no||'invoice').replace(/\//g,'-') + '.html';
    a.click();
    toast('Popup blocked — invoice downloaded as file. Open it in a browser to print.','warn',6000);
    setTimeout(()=>URL.revokeObjectURL(url), 10000);
    return;
  }
  w.location.href = url;
  setTimeout(()=>URL.revokeObjectURL(url), 60000);
}

function printHTML(inv, f, t, isReg, qrURL) {
  return (f.billing_type||'retail') === 'firm'
    ? printHTML_Firm(inv, f, t, isReg, qrURL)
    : printHTML_Retail(inv, f, t, isReg, qrURL);
}

  // ── Notes / Terms ────────────────────────────────
  if(inv.notes){
    h.push('<div class="notes-box"><b>Terms &amp; Conditions: </b>' + esc(inv.notes) + '</div>');
  }

  // ── Footer ───────────────────────────────────────
  h.push('<div class="footer-section">');
  // Bank details
  if(hasBank){
    h.push('<div class="bank-box"><div class="bhead">Payment / Bank Details</div>');
    h.push('Beneficiary: <b>' + esc(f.bank_name||f.firm_name) + '</b><br>');
    h.push('Account No: <b>' + esc(f.bank_acc) + '</b> &nbsp; IFSC: <b>' + esc(f.bank_ifsc) + '</b>');
    if(f.bank_branch) h.push('<br>Bank &amp; Branch: ' + esc(f.bank_branch));
    if(f.upi_id) h.push('<br>UPI: <b>' + esc(f.upi_id) + '</b>');
    h.push('</div>');
  } else if(f.upi_id){
    h.push('<div class="bank-box"><div class="bhead">Payment</div>UPI: <b>' + esc(f.upi_id) + '</b></div>');
  } else {
    h.push('<div></div>');
  }
  // QR code
  if(qrURL) h.push('<div class="qr-box"><img src="' + qrURL + '" alt="UPI QR"><div>Scan to Pay via UPI<br><b>' + esc(f.upi_id) + '</b></div></div>');
  // Signatory
  var sb = [];
  sb.push('<div class="sign-block">');
  if(f.digital_sign) sb.push('<img src="' + f.digital_sign + '">');
  else               sb.push('<div style="height:50px"></div>');
  sb.push('<div class="sign-line"><b>Authorised Signatory</b>' + esc(f.signatory||f.firm_name) + '</div>');
  sb.push('</div>');
  h.push(sb.join(''));
  h.push('</div>');

  // ── Bottom note ──────────────────────────────────
  h.push('<div class="fo">');
  h.push('Computer Generated Invoice — ' + esc(f.firm_name));
  if(f.gstin) h.push(' &nbsp;|&nbsp; GSTIN: ' + esc(f.gstin));
  h.push(' &nbsp;|&nbsp; E. &amp; O.E.');
  if(f.state) h.push(' &nbsp;|&nbsp; Subject to ' + esc(f.state) + ' Jurisdiction');
  h.push('</div>');

  h.push('</div></div>'); // inner, frame
  h.push('<script>window.onload=function(){window.print();}<\/script>');
  h.push('</body></html>');
  return h.join('\n');
}

    h.push('<div class="totals-row"><span>Sub-Total</span><span>₹' + fmt(itemSubtotal) + '</span></div>');
    h.push('<div class="totals-row"><span>Total Discount</span><span style="color:#BF4A2B">− ₹' + fmt(t.totalDisc) + '</span></div>');

  if(isReg){
    h.push('<div class="totals-row tax"><span>Taxable Amount</span><span>₹' + fmt(t.totalTaxable) + '</span></div>');
    if(isIGST){
      h.push('<div class="totals-row tax"><span>IGST</span><span>₹' + fmt(t.totalGST) + '</span></div>');
    } else {
      h.push('<div class="totals-row tax"><span>CGST</span><span>₹' + fmt(r2(t.totalGST/2)) + '</span></div>');
      h.push('<div class="totals-row tax"><span>SGST</span><span>₹' + fmt(r2(t.totalGST/2)) + '</span></div>');
    }
    h.push('<div class="totals-row tax"><span>Total Tax</span><span>₹' + fmt(t.totalGST) + '</span></div>');
  }
  h.push('</div>');
  h.push('<div class="grand-row"><span class="gl">Grand Total</span><span class="ga">₹' + fmt(inv.total) + '</span></div>');

  // ── Amount in Words ──────────────────────────────
  h.push('<div class="words-box"><div class="words-lbl">Amount in Words</div>' + words + '</div>');

  if(inv.is_partial){
    h.push('<div class="partial-notice">⚠️ Partial Payment — Amount Received: ₹' + fmt(inv.partial_amount) + ' &nbsp;|&nbsp; Balance Due: ₹' + fmt(r2(inv.total-(inv.partial_amount||0))) + '</div>');

  // ── Footer ───────────────────────────────────────

    h.push('<div class="bank-box"><div class="bhead">Payment / Bank Details</div>');

    h.push('<div></div>');
  }
  if(qrURL) h.push('<div class="qr-box"><img src="' + qrURL + '" alt="UPI QR"><div>Scan to Pay via UPI<br><b>' + esc(f.upi_id) + '</b></div></div>');
  // Signatory
  var sb = [];
  sb.push('<div class="sign-block">');
  if(f.digital_sign) sb.push('<img src="' + f.digital_sign + '">');
  else               sb.push('<div style="height:46px"></div>');
  sb.push('<div class="sign-line"><b>Authorised Signatory</b>' + esc(f.signatory||f.firm_name) + '</div>');
  sb.push('</div>');
  h.push(sb.join(''));
  h.push('</div>');

  // ── Footer note ──────────────────────────────────
  h.push('<div class="fo">');
  h.push('Computer Generated Invoice — ' + esc(f.firm_name));
  if(f.gstin) h.push(' &nbsp;|&nbsp; GSTIN: ' + esc(f.gstin));
  h.push(' &nbsp;|&nbsp; E. &amp; O.E.');
  if(f.state) h.push(' &nbsp;|&nbsp; Subject to ' + esc(f.state) + ' Jurisdiction');
  h.push('</div>');

  h.push('<script>window.onload=function(){window.print();}<\/script>');
  h.push('</body></html>');
  return h.join('\n');
}

window.openWAInv = id => { S.waInv = S.invoices.find(i=>i.id===id)||null; render(); };

function buildWAMsg(inv) {
  const f = S.firm; const isReg = f.gst_registered;
  const t = buildInvTotals(inv.items||[], isReg);
  const lines = inv.items.map(it=>{const c=calcItem(it,isReg);return`  • *${it.name}* — ${it.qty}×${fmt(it.rate)}${it.discount?` -${it.discount}%`:''}${isReg?` (+${it.gst_rate}% GST)`:''} = *${fmt(c.total)}*`;}).join('\n');
  return `*${f.firm_name}*\n`+
    `━━━━━━━━━━━━━━━━━\n`+
    `Namaste 🙏\n\n`+
    `Please find your *Invoice* details below:\n\n`+
    `Invoice No: *${inv.invoice_no}*\n`+
    `Date: *${fmtDate(inv.date)}*\n`+
    `${inv.customer_name?`Customer: *${inv.customer_name}*\n`:''}`+
    `${inv.due_date?`Due Date: *${fmtDate(inv.due_date)}*\n`:''}`+
    `━━━━━━━━━━━━━━━━━\n`+
    `*Items:*\n${lines}\n`+
    `━━━━━━━━━━━━━━━━━\n`+
    `${t.totalDisc>0?`Discount: −${fmt(t.totalDisc)}\n`:''}`+
    `${isReg?`Total GST: *${fmt(t.totalGST)}*\n`:''}`+
    `*${isReg?'Grand Total':'Total'}: ${fmt(inv.total)}*\n`+
    `${inv.is_partial?`Paid Now: *${fmt(inv.partial_amount)}* | Balance Due: *${fmt(inv.total-(inv.partial_amount||0))}*\n`:''}`+
    `Payment Mode: *${inv.payment_method.toUpperCase()}*\n`+
    `${f.upi_id?`UPI: *${f.upi_id}*\n`:''}`+
    `${f.phone?`Contact: *${f.phone}*\n`:''}`+
    `━━━━━━━━━━━━━━━━━\n`+
    `_We truly appreciate your business and trust. For any queries, please feel free to reach out. 🙏_\n\n`+
    `— *${f.firm_name}*`;
}

window.sendWAInv = id => {

/* ══════════════════════════════════════════════════
   BUSINESS MODE
══════════════════════════════════════════════════ */
function renderBusiness() {
  const invRevenue = S.invoices.reduce((a,i)=>a+Number(i.total),0);
  const tS = r2(invRevenue + S.sales.reduce((a,i)=>a+Number(i.amount),0));
  const tP = r2(S.purchases.reduce((a,i)=>a+Number(i.amount),0));
  const tE = r2(S.expenses.reduce((a,i)=>a+Number(i.amount),0));
  const cC = S.customers.filter(c=>Number(c.outstanding)>0);
  const tC = r2(cC.reduce((a,c)=>a+Number(c.outstanding),0));

  // Redirect old tab keys to new ones
  const tabMap = {purchases:'txn', sales:'reports', expenses:'txn', credit:'money', payments:'money', analytics:'reports'};
  if(tabMap[S.bizTab]) S.bizTab = tabMap[S.bizTab];

  const tabs = [
    ['dash','📊 Today'],
    ['txn','📦 Transactions'],
    ['money',`💰 Money${cC.length>0?' ('+cC.length+')':''}`],
    ['reports','📈 Reports'],
  ];
  return `<div class="sh">
    <div><div class="st">Business</div><div class="sb">Revenue ${fmt(tS)} · Profit ${fmt(r2(tS-tP-tE))}</div></div>
    <button class="btn bgho bsm" onclick="exportAll()">⬇️ Export CSV</button>
  </div>
  <div class="tabs">
    ${tabs.map(([k,v])=>`<button class="tab${S.bizTab===k?' on':''}" onclick="swBiz('${k}')">${v}</button>`).join('')}
  </div>
  ${{
    dash:   ()=>renderDash(tS,tP,tE),
    txn:    ()=>renderTransactions(tP,tE),
    money:  ()=>renderMoney(cC,tC),
    reports:()=>renderReports(tS,tP,tE),
  }[S.bizTab]?.() || renderDash(tS,tP,tE)}`;

function renderDash(tS,tP,tE){
  const profit = r2(tS-tP-tE);
  const margin = tS>0 ? r2((profit/tS)*100) : 0;
  const todayStr = today();
  const thisM = todayStr.slice(0,7);

  // Time-aware greeting
  const hr = new Date().getHours();
  const greetWord = hr<12 ? 'Good morning' : hr<17 ? 'Good afternoon' : 'Good evening';
  const greetEmoji = hr<12 ? '☀️' : hr<17 ? '🌤️' : '🌙';
  const ownerName = S.firm?.proprietor || S.firm?.firm_name || '';
  const firstName = ownerName.split(' ')[0];

  // Today
  const todayInvs = S.invoices.filter(i=>i.date===todayStr);
  const todayAmt  = r2(todayInvs.reduce((a,i)=>a+Number(i.total),0));
  const todayPaid = r2(todayInvs.filter(i=>i.status==='paid').reduce((a,i)=>a+Number(i.total),0)
    + todayInvs.filter(i=>i.status==='partial').reduce((a,i)=>a+Number(i.partial_amount||0),0));
  const todayCredit = r2(todayAmt - todayPaid);

  // This month
  const mInvs   = S.invoices.filter(i=>i.date&&i.date.startsWith(thisM));
  const mAmt    = r2(mInvs.reduce((a,i)=>a+Number(i.total),0));
  const mExp    = r2(S.expenses.filter(e=>e.date&&e.date.startsWith(thisM)).reduce((a,e)=>a+Number(e.amount),0));
  const mPurch  = r2(S.purchases.filter(p=>p.date&&p.date.startsWith(thisM)).reduce((a,p)=>a+Number(p.amount),0));
  const mProfit = r2(mAmt-mExp-mPurch);

  // Alerts
  const lowStock    = S.inventory.filter(i=>Number(i.stock)<=5);
  const unpaidCount = S.invoices.filter(i=>i.status==='unpaid').length;
  const unpaidAmt   = r2(S.invoices.filter(i=>i.status==='unpaid').reduce((a,i)=>a+Number(i.total),0));
  const overdueCount= S.customers.filter(c=>c.due_date&&c.due_date<todayStr&&Number(c.outstanding)>0).length;

  // 6 recent invoices
  const recentInvs  = S.invoices.slice(0,6);

  return `
  <div class="dash-greeting">${greetWord}, <span>${esc(firstName)}</span> ${greetEmoji}</div>
  <div class="dash-sub">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
  ${lowStock.length>0?`<div class="low-stk-strip"><span style="font-size:18px">⚠️</span><div><div class="fw6 fs12" style="color:var(--ylw)">${lowStock.length} item${lowStock.length>1?'s':''} low on stock</div><div class="lsi">${lowStock.map(i=>esc(i.name)+' ('+i.stock+' left)').join(' · ')}</div></div><button class="btn bgho bsm" style="margin-left:auto" onclick="swMode('inventory')">View →</button></div>`:''}
  ${overdueCount>0?`<div class="alert awrn" style="margin-bottom:10px">⚠️ <b>${overdueCount} overdue</b> customer${overdueCount>1?'s':''} — <button class="btn bdng bsm" onclick="swBiz('money')">Collect now →</button></div>`:''}

  <!-- Today snapshot -->
  <div class="card mb14" style="border-left:3px solid var(--acc)">
    <div class="fs11 fw6 tx2 mb10" style="text-transform:uppercase;letter-spacing:.5px">Today — ${fmtDate(todayStr)}</div>
    <div class="g4">
      <div><div class="fs11 tx2 mb2">Invoices</div><div style="font-family:var(--ffd);font-size:22px;color:var(--acc)">${todayInvs.length}</div></div>
      <div><div class="fs11 tx2 mb2">Billed</div><div style="font-family:var(--ffd);font-size:22px">${fmt(todayAmt)}</div></div>
      <div><div class="fs11 tx2 mb2">Collected</div><div style="font-family:var(--ffd);font-size:22px;color:var(--grn)">${fmt(todayPaid)}</div></div>
      <div><div class="fs11 tx2 mb2">On Credit</div><div style="font-family:var(--ffd);font-size:22px;color:${todayCredit>0?'var(--red)':'var(--tx)'}">${fmt(todayCredit)}</div></div>
    </div>
    ${todayInvs.length===0?`<div class="tx2 fs12 mt8">No invoices today yet — <button class="btn bpri bsm" onclick="swMode('invoice')">Create one →</button></div>`:''}
  </div>

  <!-- KPI row -->
  <div class="g4 mb14">
    <div class="sc" style="border-left:3px solid var(--acc)">
      <div class="sl">This Month</div>
      <div class="sv txacc">${fmt(mAmt)}</div>
      <div class="ss">${mInvs.length} invoices · ${monthLabel(thisM+'-01')}</div>
    </div>
    <div class="sc" style="border-left:3px solid ${mProfit>=0?'var(--grn)':'var(--red)'}">
      <div class="sl">Month Profit</div>
      <div class="sv" style="color:${mProfit>=0?'var(--grn)':'var(--red)'}">${fmt(mProfit)}</div>
      <div class="ss">${fmt(r2(mExp+mPurch))} costs</div>
    </div>
    <div class="sc" style="border-left:3px solid ${unpaidAmt>0?'var(--red)':'var(--grn)'}">
      <div class="sl">Pending Collection</div>
      <div class="sv ${unpaidAmt>0?'txred':''}">${fmt(unpaidAmt)}</div>
      <div class="ss">${unpaidCount} unpaid invoice${unpaidCount!==1?'s':''}</div>
    </div>
    <div class="sc" style="border-left:3px solid ${profit>=0?'var(--grn)':'var(--red)'}">
      <div class="sl">All-time Profit</div>
      <div class="sv" style="color:${profit>=0?'var(--grn)':'var(--red)'}">${fmt(profit)}</div>
      <div class="ss">${margin}% net margin</div>
    </div>
  </div>

  <!-- P&L bar -->
  <div class="card mb14">
    <div class="ctitle mb8">P&amp;L Overview</div>
    <div class="row jbet fs12 mb4"><span class="tx2">Revenue</span><span class="fw6 txacc">${fmt(tS)}</span></div>
    <div class="pl-bar"><div class="pl-fill" style="width:100%;background:var(--acc)"></div></div>
    <div class="row jbet fs12 mb4 mt8"><span class="tx2">Purchases</span><span class="fw6">${fmt(tP)}</span></div>
    <div class="pl-bar"><div class="pl-fill" style="width:${tS>0?Math.min(100,Math.round((tP/tS)*100)):0}%;background:var(--blu)"></div></div>
    <div class="row jbet fs12 mb4 mt8"><span class="tx2">Expenses</span><span class="fw6 txred">${fmt(tE)}</span></div>
    <div class="pl-bar"><div class="pl-fill" style="width:${tS>0?Math.min(100,Math.round((tE/tS)*100)):0}%;background:var(--red)"></div></div>
    <hr style="margin:10px 0">
    <div class="row jbet fs13"><span class="fw6">Net Profit</span><span class="fw6" style="color:${profit>=0?'var(--grn)':'var(--red)'}">${fmt(profit)} (${margin}%)</span></div>
  </div>

  <!-- Recent invoices -->
  ${recentInvs.length>0?`<div class="card">
    <div class="row jbet mb10">
      <div class="ctitle" style="margin-bottom:0">Recent Invoices</div>
      <button class="btn bgho bsm" onclick="swMode('invoice');swTab('list')">See all →</button>
    </div>
    ${recentInvs.map(inv=>`<div class="row jbet" style="padding:8px 0;border-bottom:1px solid var(--bor);gap:8px;flex-wrap:wrap">
      <div style="min-width:0">
        <div class="fw6 fs13">${esc(inv.customer_name||'Walk-in')} <span class="tx2 fw4 fs11">· ${esc(inv.invoice_no)}</span></div>
        <div class="tx2 fs11">${fmtDate(inv.date)}</div>
      </div>
      <div class="row" style="gap:6px;align-items:center;flex-shrink:0">
        <span class="bdg ${pb(inv.status||'paid')}">${(inv.status||'paid').toUpperCase()}</span>

  </div>`:''}`;
}
}

/* ══════════════════════════════════════════════════
   CHART ENGINE — Pure SVG, no dependencies
══════════════════════════════════════════════════ */
function fmtK(n) {
  var a = Math.abs(n);
  if(a >= 1e5) return (n/1e5).toFixed(1)+'L';
  if(a >= 1e3) return (n/1e3).toFixed(0)+'K';
  return Math.round(n).toString();
}

function svgGroupedBar(groups, labels, colors) {
  if(!groups || !groups.length) return '<div class="tx2 fs12" style="padding:30px 0;text-align:center">No data for this period</div>';
  var W=620, H=210, PL=54, PR=10, PT=14, PB=44;
  var cW=W-PL-PR, cH=H-PT-PB;
  var nS=labels.length, n=groups.length;
  var allV=groups.reduce(function(a,g){return a.concat(g.values);},[]);
  var maxV=Math.max(1,Math.max.apply(null,allV));
  var gW=cW/Math.max(n,1);
  var bW=Math.max(4, Math.floor(gW*0.72/nS)-2);
  var yL='',yT='',bars='',xT='';
  for(var i=0;i<=4;i++){
    var yv=PT+cH*(1-i/4);
    var val=maxV*i/4;
    yL+='<line x1="'+PL+'" y1="'+yv.toFixed(1)+'" x2="'+(W-PR)+'" y2="'+yv.toFixed(1)+'" stroke="var(--bor)" stroke-dasharray="2,3" opacity=".5"/>';
    yT+='<text x="'+(PL-4)+'" y="'+(yv+3.5).toFixed(1)+'" text-anchor="end" font-size="9" fill="var(--tx2)">'+fmtK(val)+'</text>';
  }
  groups.forEach(function(g,gi){
    var gcx=PL+(gi+0.5)*gW;
    var totalW=nS*(bW+2)-2;
    var sx=gcx-totalW/2;
    g.values.forEach(function(val,si){
      var bh=Math.max(1,Math.round((val/maxV)*cH));
      var bx=sx+si*(bW+2);
      var by=PT+cH-bh;
      bars+='<rect x="'+bx.toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+bW+'" height="'+bh+'" fill="'+colors[si]+'" rx="2" opacity=".88">'
           +'<title>'+labels[si]+': '+fmt(val)+'</title></rect>';
    });
    var lbl=g.label;
    xT+='<text x="'+gcx.toFixed(1)+'" y="'+(H-6)+'" text-anchor="middle" font-size="9" fill="var(--tx2)">'+lbl+'</text>';
  });
  var leg=''; labels.forEach(function(lbl,i){
    leg+='<div class="chart-leg-item"><div class="chart-leg-dot" style="background:'+colors[i]+'"></div>'+lbl+'</div>';
  });
  return '<div class="chart-wrap"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;min-width:300px;height:auto;display:block;overflow:visible">'
    +yL+yT+bars+xT+'</svg></div>'
    +'<div class="chart-legend">'+leg+'</div>';
}

function svgDonut(slices) {
  var sz=170, cx=sz/2, cy=sz/2, r=sz*0.39, ri=sz*0.25;
  var total=slices.reduce(function(a,s){return a+s.value;},0);
  if(total===0) return '<svg viewBox="0 0 '+sz+' '+sz+'" style="width:100%;max-width:'+sz+'px"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--bor)" stroke-width="'+(r-ri)+'"/><text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" font-size="11" fill="var(--tx2)">No data</text></svg>';
  var ang=-Math.PI/2, paths='';
  slices.forEach(function(s){
    var a=(s.value/total)*2*Math.PI;
    var ea=ang+a;
    var x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
    var x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
    var xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang);
    var xi2=cx+ri*Math.cos(ea),yi2=cy+ri*Math.sin(ea);
    var lg=a>Math.PI?1:0;
    var pct=Math.round((s.value/total)*100);
    paths+='<path d="M'+x1.toFixed(2)+','+y1.toFixed(2)+' A'+r+','+r+' 0 '+lg+',1 '+x2.toFixed(2)+','+y2.toFixed(2)
          +' L'+xi2.toFixed(2)+','+yi2.toFixed(2)+' A'+ri+','+ri+' 0 '+lg+',0 '+xi1.toFixed(2)+','+yi1.toFixed(2)+' Z"'
          +' fill="'+s.color+'" opacity=".9"><title>'+s.label+': '+fmt(s.value)+' ('+pct+'%)</title></path>';
    ang=ea;
  });
  return '<svg viewBox="0 0 '+sz+' '+sz+'" style="width:100%;max-width:'+sz+'px;height:auto;display:block">'+paths
    +'<text x="'+cx+'" y="'+(cy-3)+'" text-anchor="middle" font-size="9" fill="var(--tx2)">Total</text>'
    +'<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" font-size="11" font-weight="600" fill="var(--tx)">'+fmtK(total)+'</text>'
    +'</svg>';
}

function svgLine(points) {
  if(!points||points.length<2) return '<div class="tx2 fs12" style="padding:20px;text-align:center">Need more periods</div>';
  var W=620,H=140,PL=54,PR=10,PT=12,PB=28;
  var cW=W-PL-PR,cH=H-PT-PB;
  var vals=points.map(function(p){return p.v;});
  var maxV=Math.max(1,Math.max.apply(null,vals));
  var n=points.length;
  var pts=points.map(function(p,i){
    return [PL+i/(n-1)*cW, PT+cH*(1-p.v/maxV)];
  });
  var lp='M'+pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' L');
  var ap=lp+' L'+pts[n-1][0].toFixed(1)+','+(PT+cH)+' L'+PL+','+(PT+cH)+' Z';
  var yL='',yT='',xT='',dots='';
  for(var i=0;i<=3;i++){
    var yv=PT+cH*(1-i/3); var val=maxV*i/3;
    yL+='<line x1="'+PL+'" y1="'+yv.toFixed(1)+'" x2="'+(W-PR)+'" y2="'+yv.toFixed(1)+'" stroke="var(--bor)" stroke-dasharray="2,3" opacity=".5"/>';
    yT+='<text x="'+(PL-4)+'" y="'+(yv+3.5).toFixed(1)+'" text-anchor="end" font-size="9" fill="var(--tx2)">'+fmtK(val)+'</text>';
  }
  var step=Math.ceil(n/8);
  points.forEach(function(p,i){
    if(i%step===0||i===n-1)
      xT+='<text x="'+pts[i][0].toFixed(1)+'" y="'+(H-4)+'" text-anchor="middle" font-size="9" fill="var(--tx2)">'+p.l+'</text>';
  });
  pts.forEach(function(p,i){
    dots+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="var(--acc)" opacity=".85">'
         +'<title>'+points[i].l+': '+fmt(points[i].v)+'</title></circle>';
  });
  return '<div class="chart-wrap"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;min-width:280px;height:auto;display:block;overflow:visible">'
    +'<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--acc)" stop-opacity=".22"/><stop offset="100%" stop-color="var(--acc)" stop-opacity=".02"/></linearGradient></defs>'
    +yL+yT+'<path d="'+ap+'" fill="url(#ag)"/>'
    +'<path d="'+lp+'" fill="none" stroke="var(--acc)" stroke-width="2.5" stroke-linejoin="round"/>'
    +dots+xT+'</svg></div>';
}

/* ── DATA AGGREGATION ──────────────────────────── */
function getBucket(dateStr, period) {
  if(!dateStr) return null;
  var d=new Date(dateStr+'T00:00:00'), y=d.getFullYear(), mo=d.getMonth();
  if(period==='monthly') return y+'-'+String(mo+1).padStart(2,'0');
  if(period==='quarterly') {
    var fyY=mo>=3?y:y-1;
    var q=mo>=3?Math.floor((mo-3)/3)+1:4;
    return fyY+'-Q'+q;
  }
  if(period==='halfyearly') {
    var fyY2=mo>=3?y:y-1;
    return fyY2+'H'+(mo>=3&&mo<=8?1:2);
  }
  return getFY(dateStr); // annual
}

function bucketLabel(key, period) {
  if(period==='monthly') {
    var parts=key.split('-');
    if(parts.length<2) return key;
    return monthLabel(key+'-01').replace(' ','\'').slice(0,7);
  }
  if(period==='quarterly') return key.replace('-',' ');
  if(period==='halfyearly') {
    var idx=key.indexOf('H');
    if(idx<0) return key;
    return 'H'+key.slice(idx+1)+' '+key.slice(0,idx).slice(2);
  }
  return key; // annual
}

function getAggData(period) {
  var fy=S.fyFilter!=='all'?S.fyFilter:null;
  var bkts={};
  function add(bkts,key,field,amt) {
    if(!key) return;
    if(!bkts[key]) bkts[key]={rev:0,exp:0,purch:0};
    bkts[key][field]=r2(bkts[key][field]+amt);
  }
  S.invoices.filter(function(i){return !fy||i.fy===fy;}).forEach(function(i){
    add(bkts,getBucket(i.date,period),'rev',Number(i.total||0));
  });
  S.sales.filter(function(s){return !fy||s.fy===fy;}).forEach(function(s){
    add(bkts,getBucket(s.date,period),'rev',Number(s.amount||0));
  });
  S.expenses.filter(function(e){return !fy||e.fy===fy;}).forEach(function(e){
    add(bkts,getBucket(e.date,period),'exp',Number(e.amount||0));
  });
  S.purchases.filter(function(p){return !fy||p.fy===fy;}).forEach(function(p){
    add(bkts,getBucket(p.date,period),'purch',Number(p.amount||0));
  });
  return Object.entries(bkts).sort(function(a,b){return a[0]<b[0]?-1:1;}).map(function(e){
    var k=e[0], v=e[1];
    var cost=r2(v.exp+v.purch), profit=r2(v.rev-cost);
    return {key:k, label:bucketLabel(k,period), rev:v.rev, exp:v.exp, purch:v.purch, cost:cost, profit:profit};
  });
}
