/* ── Theme application ── */
function applyTheme() {
  const el = document.documentElement;
  const theme = S.theme || 'default';

  // BUG1 fix: use correct single attribute 'data-theme'
  // BUG2 fix: only dark/oled get data-dark; oled uses data-theme="oled" for true black
  //           oled does NOT need data-dark — its own CSS has darker values
  el.removeAttribute('data-dark');
  el.removeAttribute('data-theme');

  if(theme === 'dark') {
    el.setAttribute('data-dark', '');
    S.dark = true;
  } else if(theme === 'oled') {
    el.setAttribute('data-dark', '');   // base dark surfaces
    el.setAttribute('data-theme', 'oled'); // override to true black
    S.dark = true;
  } else {
    S.dark = false;
    if(theme !== 'default') {
      el.setAttribute('data-theme', theme);
    }
  }

  // Accent — BUG7 fix: skip custom accent in dark themes unless explicitly set
  const hasCustomAccent = S.accent && S.accent.match(/^#[0-9A-Fa-f]{6}$/);
  if(hasCustomAccent) {
    el.style.setProperty('--acc', S.accent);
    const r = parseInt(S.accent.slice(1,3),16);
    const g = parseInt(S.accent.slice(3,5),16);
    const b = parseInt(S.accent.slice(5,7),16);
    el.style.setProperty('--acb', `rgba(${r},${g},${b},0.12)`);
    el.style.setProperty('--red', S.accent);
  } else {
    el.style.removeProperty('--acc');
    el.style.removeProperty('--acb');
    el.style.removeProperty('--red');
  }

  // BUG5 fix: shape CSS uses var(--r) — but rc-card has hardcoded 12px, fixed in CSS
  el.removeAttribute('data-shape');
  if(S.shape && S.shape !== 'default') el.setAttribute('data-shape', S.shape);

  // BUG6 fix: font size — attribute on <html>, CSS selector is html[data-fsize]
  el.removeAttribute('data-fsize');
  if(S.fsize && S.fsize !== 'default') el.setAttribute('data-fsize', S.fsize);

  // Meta theme colour for PWA
  const mt = document.querySelector('meta[name="theme-color"]');
  if(mt) mt.content = S.accent || '#BF4A2B';

  // BUG8 fix: update topbar theme button icon live
  const tbtn = document.getElementById('theme-topbtn');
  if(tbtn) tbtn.textContent = theme === 'dark' || theme === 'oled' ? '☀️' : '🎨';

  LS.set(_DARK_KEY,  S.dark);
  LS.set(_THEME_KEY, theme);
}

window.setTheme = function(theme) {
  S.theme = theme;
  LS.set(_THEME_KEY, theme);
  applyTheme();
  render();
};
window.setAccent = function(hex) {
  if(!hex.match(/^#[0-9A-Fa-f]{6}$/)) return;
  S.accent = hex;
  LS.set(_ACCENT_KEY, hex);
  applyTheme();
  // BUG4 fix: sync inputs without full re-render (they'd lose focus)
  const pick = document.getElementById('theme-acc-pick');
  const hexIn = document.getElementById('theme-acc-hex');
  if(pick && pick !== document.activeElement) pick.value = hex;
  if(hexIn && hexIn !== document.activeElement) hexIn.value = hex;
  // Re-render just the swatch selection state
  document.querySelectorAll('[data-accent-swatch]').forEach(sw => {
    sw.style.borderColor = sw.dataset.accentSwatch === hex ? 'var(--tx)' : 'transparent';
  });
};
window.setShape = function(shape) {
  S.shape = shape;
  LS.set(_SHAPE_KEY, shape);
  applyTheme();
  render(); // BUG3 fix: update modal radio cards
};
window.setFSize = function(fsize) {
  S.fsize = fsize;
  LS.set(_FSIZE_KEY, fsize);
  applyTheme();
  render(); // BUG3 fix: update modal radio cards
};

window.saveEditFirm = () => {
  const g = id => document.getElementById(id)?.value?.trim() || '';
  const nm = g('efm-nm'), pr = g('efm-pr'), ad = document.getElementById('efm-ad')?.value?.trim() || '';
  if(!nm || !ad){ alert('Firm name and address are required.'); return; }
  const gst = S._editGST !== undefined ? S._editGST : S.firm.gst_registered;
  if(gst){
    const gstin = g('efm-gs'), st = g('efm-st');
    if(!gstin || !st){ alert('GSTIN and State are required for GST registered businesses.'); return; }
    if(!validateGSTIN(gstin)){ markFieldError('efm-gs','Invalid GSTIN format — expected: 22AAAAA0000A1Z5'); return; }
  }
  S.firm = {
    ...S.firm,
    firm_name: nm,
    proprietor: pr,
    address: ad,
    city: g('efm-city') || S.firm.city || '',
    pincode: g('efm-pin') || S.firm.pincode || '',
    logo: S._editLogo !== undefined ? S._editLogo : (S.firm.logo||''),
    phone: g('efm-ph'),
    email: g('efm-em'),
    pan: g('efm-pan'),
    signatory: g('efm-sig'),
    hide_signatory: S.firm.hide_signatory||false,
    billing_type: S._editBillingType !== undefined ? S._editBillingType : (S.firm.billing_type||'retail'),
    digital_sign: S._editDigitalSign !== undefined ? S._editDigitalSign : (S.firm.digital_sign||''),
    gst_registered: gst,
    gstin: gst ? g('efm-gs') : '',
    state: gst ? g('efm-st') : '',
    default_gst_rate: gst ? Number(g('efm-gr') || 18) : 0,
    payment_method: g('efm-pm') || 'cash',
    upi_id: g('efm-upi'),
    bank_name: g('efm-bn'),
    bank_acc: g('efm-bac'),
    bank_ifsc: g('efm-bif'),
    bank_branch: g('efm-bbr'),
    reg_type: g('efm-regtype') || 'Sole Proprietorship',
    industry: g('efm-industry') || 'Retail',
    msme: g('efm-msme'),
    website: g('efm-web'),
    default_notes: document.getElementById('efm-notes')?.value?.trim() || '',
    default_tnc: document.getElementById('efm-tnc')?.value?.trim() || S.firm.default_tnc || '',
    default_tds_rate: S.firm?.default_tds_rate||0,
    hide_powered: !!document.getElementById('efm-hidepowered')?.checked,
    // Preserve all print settings (managed separately via togglePS/setPSTemplate)
    ...Object.fromEntries(
      Object.keys(DEFAULT_PRINT_SETTINGS).map(k=>[k, S.firm[k] !== undefined ? S.firm[k] : DEFAULT_PRINT_SETTINGS[k]])
    ),
    inv_prefix: g('efm-invpfx') || 'INV',
    inv_start: S.firm.inv_start || 1,
  };
  S._editLogo = undefined;
  S._editFirmOpen = false;
  S._editGST = undefined;
  S._efmTemp = undefined;
  S._editBillingType = undefined;
  S._editDigitalSign = undefined;
  _syncProfileName();
  save(); render();
};
/* ── Print Settings handlers ── */
window.togglePS = function(key) {
  if(!S.firm) return;
  S.firm[key] = !ps(S.firm, key);
  save(); render();
};
window.setPSTemplate = function(tpl) {
  if(!S.firm) return;
  S.firm.ps_template = tpl;
  // Apply sensible color defaults per template
  if(tpl==='classic' && !S.firm.ps_accent) S.firm.ps_accent='#BF4A2B';
  if(tpl==='modern')  { if(!S.firm.ps_accent) S.firm.ps_accent='#BF4A2B'; }
  if(tpl==='minimal') { S.firm.ps_accent=S.firm.ps_accent||'#1C1915'; }
  save(); render();
};
window.setPSValue = function(key, val) {
  if(!S.firm) return;
  S.firm[key] = val;
  save(); render();
};
window.updatePSColor = function(key, val) {
  if(!S.firm || !val.match(/^#[0-9A-Fa-f]{6}$/)) return;
  S.firm[key] = val;
  // Sync hex input and color picker
  const hexId = key==='ps_accent' ? 'ps-accent-hex' : 'ps-hdrbg-hex';
  const picId = key==='ps_accent' ? 'ps-accent'     : 'ps-hdrbg';
  const hex = document.getElementById(hexId);
  const pic = document.getElementById(picId);
  if(hex && hex !== document.activeElement) hex.value = val;
  if(pic && pic !== document.activeElement) pic.value = val;
  save(); render();
};

/* ╔══════════════════════════════════════════════════╗
   ║  NUMERIC KEYPAD — WEEK 2                         ║
   ║  Triggered on qty/rate focus in quick mode.      ║
   ║  Floats up from bottom on mobile.                ║
   ╚══════════════════════════════════════════════════╝ */

let _npTarget  = null;  // the input element being edited
let _npField   = null;  // 'qty' | 'rate'
let _npItemId  = null;  // item id
let _npBuffer  = '';    // current input buffer

// Quick-value chips per field type
const NP_QTY_CHIPS   = [0.5, 1, 2, 3, 5, 10];
const NP_RATE_CHIPS  = [10, 20, 50, 100, 200, 500, 1000, 2000, 5000];

window.attachNumpad = function(inp, fieldType) {
  // Only show numpad on touch devices (mobile) in quick mode
  if(!S.invQuickMode) return;
  const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if(!isTouchDevice) return; // desktop uses native keyboard

  if(!inp || fieldType==='text') {
    // text field (name) — hide numpad and let keyboard show
    hideNumpad();
    return;
  }

  _npTarget = inp;
  _npField  = inp.dataset.f || fieldType;
  _npItemId = inp.dataset.id;
  _npBuffer = String(parseFloat(inp.value)||0);

  // Update display
  const label = _npField==='qty' ? 'Quantity' : 'Rate ₹';
  const el = document.getElementById('np-label');
  if(el) el.textContent = label;

  // Show item name for context
  const item = S.invForm?.items?.find(i=>i.id===_npItemId);
  const nameEl = document.getElementById('np-item-name');
  if(nameEl) nameEl.textContent = item?.name ? item.name.slice(0,28) : '';

  // Update value display
  _refreshNpDisplay();

  // Quick-value chips
  const chips = _npField==='qty' ? NP_QTY_CHIPS : NP_RATE_CHIPS;
  const qv = document.getElementById('np-quick-vals');
  if(qv) {
    qv.innerHTML = chips.map(v=>`
      <div class="np-qv" onclick="npQuickVal(${v})">${v>=1000?'₹'+(v/1000)+'k':'×'+v}</div>
    `).join('');
  }

  // Show overlay
  const overlay = document.getElementById('numpad-overlay');
  if(overlay) overlay.classList.add('visible');

  // Prevent native keyboard
  inp.blur();
  inp.setAttribute('inputmode','none');
};

window.hideNumpad = function() {
  const overlay = document.getElementById('numpad-overlay');
  if(overlay) overlay.classList.remove('visible');
  // Restore inputmode on target
  if(_npTarget) {
    _npTarget.removeAttribute('inputmode');
    _npTarget = null;
  }
  _npBuffer = '';
  _npField  = null;
  _npItemId = null;
};

window.npQuickVal = function(val) {
  _npBuffer = String(val);
  _refreshNpDisplay();
};

function _refreshNpDisplay() {
  const el = document.getElementById('np-value');
  if(el) el.textContent = _npBuffer || '0';
}

function _applyNpValue() {
  if(!_npItemId || !_npField) return;
  const val = parseFloat(_npBuffer) || 0;
  const item = S.invForm?.items?.find(i=>i.id===_npItemId);
  if(!item) return;
  item[_npField] = val;

  // Update the input visually
  if(_npTarget) _npTarget.value = val;

  // Recompute this row's totals in-place
  const isReg = S.firm.gst_registered;
  const calc  = calcItem(item, isReg);
  const tbody = document.getElementById('itbody');
  if(tbody) {
    const rowTot = tbody.querySelector(`#ia-${_npItemId}`);
    if(rowTot) rowTot.value = fmt(calc.total);
    if(isReg) {
      const taxEl = tbody.querySelector(`[data-taxable="${_npItemId}"]`);
      const gstEl = tbody.querySelector(`[data-gstamt="${_npItemId}"]`);
      if(taxEl) taxEl.value = fmt(calc.taxable);
      if(gstEl) gstEl.value = fmt(calc.gstAmt);
    }
  }
  updateTotalsPanel();
  saveDraft();
}

window.npKey = function(key) {
  switch(key) {
    case '0': case '1': case '2': case '3': case '4':
    case '5': case '6': case '7': case '8': case '9':
      if(_npBuffer==='0') _npBuffer = key;
      else if(_npBuffer.length < 10) _npBuffer += key;
      break;
    case '.':
      if(!_npBuffer.includes('.')) _npBuffer += '.';
      break;
    case 'del':
      _npBuffer = _npBuffer.slice(0,-1) || '0';
      break;
    case 'clear':
      _npBuffer = '0';
      break;
    case '+0.5':
      _npBuffer = String(r2((parseFloat(_npBuffer)||0) + 0.5));
      break;
    case 'ok':
      _applyNpValue();
      // Move to next logical field
      _advanceToNextField();
      hideNumpad();
      return;
    case 'cancel':
      hideNumpad();
      return;
  }
  _refreshNpDisplay();
};

function _advanceToNextField() {
  // After entering qty → jump to rate; after rate → add a new item row
  const tbody = document.getElementById('itbody');
  if(!tbody || !_npItemId) return;
  const rows = Array.from(tbody.querySelectorAll('tr'));
  const currentRow = rows.find(r=>r.querySelector(`[data-id="${_npItemId}"]`));
  if(!currentRow) return;

  if(_npField === 'qty') {
    // Jump to rate field of same row
    const rateInp = currentRow.querySelector('[data-f="rate"]');
    if(rateInp) {
      setTimeout(()=>attachNumpad(rateInp,'rate'), 80);
    }
  } else if(_npField === 'rate') {
    // Jump to first empty item or add new row
    const lastRow = rows[rows.length-1];
    if(currentRow === lastRow) {
      // On last row — add new item
      addIItem();
      setTimeout(()=>{
        const newRows = document.getElementById('itbody')?.querySelectorAll('tr');
        if(newRows?.length) {
          const nameInp = newRows[newRows.length-1].querySelector('[data-f="name"]');
          if(nameInp) { nameInp.focus(); hideNumpad(); }
        }
      }, 80);
    } else {
      // Move to qty of next row
      const nextRow = rows[rows.indexOf(currentRow)+1];
      if(nextRow) {
        const qtyInp = nextRow.querySelector('[data-f="qty"]');
        if(qtyInp) setTimeout(()=>attachNumpad(qtyInp,'qty'), 80);
      }
    }
  }
}

// Hardware keyboard support for numpad when overlay is open
document.addEventListener('keydown', function(e) {
  const overlay = document.getElementById('numpad-overlay');
  if(!overlay?.classList.contains('visible')) return;
  if(e.key>='0'&&e.key<='9')    { npKey(e.key); e.preventDefault(); }
  else if(e.key==='.')           { npKey('.'); e.preventDefault(); }
  else if(e.key==='Backspace')   { npKey('del'); e.preventDefault(); }
  else if(e.key==='Delete')      { npKey('clear'); e.preventDefault(); }
  else if(e.key==='Enter')       { npKey('ok'); e.preventDefault(); }
  else if(e.key==='Escape')      { npKey('cancel'); e.preventDefault(); }
}, true);

// Close numpad on outside tap
document.addEventListener('touchstart', function(e) {
  const overlay = document.getElementById('numpad-overlay');
  if(!overlay?.classList.contains('visible')) return;
  if(!overlay.contains(e.target)) {
    npKey('ok'); // commit value before closing
  }
}, {passive:true});

/* ── Quick-Add Parser ───────────────────────────────
   Accepts: "Rice 2 45"  → name=Rice, qty=2, rate=45
            "Biscuit 50" → name=Biscuit, qty=1, rate=50
            "Bread"      → name=Bread, qty=1, rate=from inventory
   ──────────────────────────────────────────────── */
function parseQuickAdd(raw) {
  const s = raw.trim();
  if(!s) return null;

  // Try to extract trailing numbers for qty/rate
  // Patterns: "Name qty rate", "Name rate", "Name"
  const parts = s.split(/\s+/);
  let name, qty=1, rate=0;

  if(parts.length >= 3) {
    // Last two parts might be qty + rate
    const maybeRate = parseFloat(parts[parts.length-1]);
    const maybeQty  = parseFloat(parts[parts.length-2]);
    if(!isNaN(maybeRate) && !isNaN(maybeQty)) {
      rate = maybeRate;
      qty  = maybeQty;
      name = parts.slice(0,-2).join(' ');
    } else if(!isNaN(maybeRate)) {
      rate = maybeRate;
      name = parts.slice(0,-1).join(' ');
    } else {
      name = s;
    }
  } else if(parts.length === 2) {
    const maybeNum = parseFloat(parts[1]);
    if(!isNaN(maybeNum)) {
      // Could be rate or qty — if > 0 and name found in inventory, treat as rate
      rate = maybeNum;
      name = parts[0];
    } else {
      name = s;
    }
  } else {
    name = s;
  }

  name = name.trim();
  if(!name) return null;

  // Try to fill from inventory if rate not specified
  const invItem = S.inventory.find(i=>i.name.toLowerCase()===name.toLowerCase());
  if(invItem) {
    if(!rate) rate = invItem.rate;
    return {
      id:uid(), name:invItem.name, qty:qty||1, rate:invItem.rate||rate,
      unit:invItem.unit||'pcs', gst_rate:invItem.gst_rate||S.firm?.default_gst_rate||18,
      hsn:invItem.hsn||'', discount:0, mrp:invItem.mrp||0,
      price_mode:'excl', item_type:'product', category:invItem.category||'',
      stock:invItem.stock||0, party_prices:[], custom_fields:[], online_store:false,
      description:''
    };
  }

  return {
    id:uid(), name, qty:qty||1, rate:rate||0,
    unit:'pcs', gst_rate:S.firm?.default_gst_rate||18,
    hsn:'', discount:0, mrp:0, price_mode:'excl', item_type:'product',
    category:'', stock:0, party_prices:[], custom_fields:[], online_store:false,
    description:''
  };
}

window.handleQuickAdd = function(e) {
  if(e.key !== 'Enter') return;
  e.preventDefault();
  const raw = e.target.value.trim();
  if(!raw) { addIItem(); return; } // blank → just add empty row
  const item = parseQuickAdd(raw);
  if(!item) return;
  if(!S.invForm) S.invForm = blankInv();
  if(!S.invForm.items) S.invForm.items = [];
  // Remove placeholder empty row if only one blank item
  if(S.invForm.items.length===1 && !S.invForm.items[0].name?.trim()) {
    S.invForm.items = [item];
  } else {
    S.invForm.items.push(item);
  }
  e.target.value = '';
  document.getElementById('quick-ac-drop') && (document.getElementById('quick-ac-drop').style.display='none');
  renderItemRows();
  updateTotalsPanel();
  saveDraft();
  // Refocus quick-add input for next item
  setTimeout(()=>{ document.getElementById('quick-add-input')?.focus(); }, 30);
  toast(`${item.name} × ${item.qty} @ ₹${item.rate} added`, 'success', 1200);
};

window.quickAddAutocomplete = function(val) {
  const drop = document.getElementById('quick-ac-drop');
  if(!drop) return;
  if(!val?.trim() || val.length < 1) { drop.innerHTML=''; drop.style.display='none'; return; }
  const q = val.trim().toLowerCase().split(/\s+/)[0]; // match first word
  const matches = S.inventory.filter(i=>i.name.toLowerCase().includes(q)).slice(0,7);
  if(!matches.length) { drop.innerHTML=''; drop.style.display='none'; return; }
  drop.style.display = 'flex'; drop.style.flexWrap = 'wrap'; drop.style.gap = '5px';
  window._qaMatches = matches;
  drop.innerHTML = matches.map((i,idx)=>`
    <div class="recent-chip" onclick="quickFillFromInventory(${idx})"
      style="cursor:pointer">
      ${esc(i.name.length>18?i.name.slice(0,17)+'\u2026':i.name)}
      <span class="rchip-price">₹${i.rate}</span>
      ${i.stock>0?`<span class="rchip-price">(${i.stock})</span>`:''}
    </div>`).join('');
};

window.quickFillFromInventory = function(idxOrJson) {
  const i = typeof idxOrJson === 'number' ? (window._qaMatches||[])[idxOrJson] : JSON.parse(idxOrJson); if(!i) return;
  const inp = document.getElementById('quick-add-input');
  if(inp) inp.value = i.name;
  // Auto-add with qty=1
  const item = {
    id:uid(), name:i.name, qty:1, rate:i.rate||0,
    unit:i.unit||'pcs', gst_rate:i.gst_rate||18, hsn:i.hsn||'',
    discount:0, mrp:i.mrp||0, price_mode:'excl', item_type:'product',
    category:i.category||'', stock:i.stock||0, party_prices:[], custom_fields:[], online_store:false, description:''
  };
  if(!S.invForm) S.invForm = blankInv();
  if(S.invForm.items.length===1 && !S.invForm.items[0].name?.trim()) S.invForm.items=[item];
  else S.invForm.items.push(item);
  if(inp) inp.value='';
  document.getElementById('quick-ac-drop') && (document.getElementById('quick-ac-drop').innerHTML='');
  renderItemRows(); updateTotalsPanel(); saveDraft();
  setTimeout(()=>{ document.getElementById('quick-add-input')?.focus(); }, 30);
};

/* ── Draft Auto-Save ─────────────────────────────── */
const DRAFT_KEY = 'rf_inv_draft';

function saveDraft() {
  if(!S.invForm) return;
  try { localStorage.setItem(DRAFT_KEY, JSON.stringify(S.invForm)); } catch(e){}
}

function loadDraft() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if(!raw) return false;
    const draft = JSON.parse(raw);
    if(draft && draft.items?.length) {
      S.invForm = draft;
      toast('📋 Draft restored — continue your invoice', 'info', 3000);
      return true;
    }
  } catch(e){}
  return false;
}

function clearDraft() {
  try { localStorage.removeItem(DRAFT_KEY); } catch(e){}
}

/* ── Keyboard Shortcuts ─────────────────────────────
   Ctrl+Enter → Save & New
   F2         → Focus customer field
   Enter on last item row → new item row (items table)
   Ctrl+D     → Duplicate last item
   Escape     → Clear quick-add input
   ──────────────────────────────────────────────── */
document.addEventListener('keydown', function(e) {
  // Only active when on invoice create tab
  if(S.mode!=='invoice' || S.tab!=='create') return;

  // Ctrl+Enter → Save & New
  if((e.ctrlKey||e.metaKey) && e.key==='Enter') {
    e.preventDefault();
    window.saveAndNew && window.saveAndNew();
    return;
  }

  // F2 → focus customer name field
  if(e.key==='F2') {
    e.preventDefault();
    const cn = document.getElementById('ic-cn');
    if(cn) { cn.focus(); cn.select(); }
    return;
  }

  // Ctrl+D → duplicate last item
  if((e.ctrlKey||e.metaKey) && e.key==='d') {
    const items = S.invForm?.items;
    if(items?.length) {
      const last = {...items[items.length-1], id:uid()};
      S.invForm.items.push(last);
      renderItemRows(); updateTotalsPanel(); saveDraft();
      toast('Item duplicated', 'info', 1000);
    }
    e.preventDefault();
    return;
  }

  // Escape in quick-add → clear input
  if(e.key==='Escape') {
    const qa = document.getElementById('quick-add-input');
    if(qa && qa === document.activeElement) {
      qa.value=''; quickAddAutocomplete('');
      e.stopPropagation();
    }
  }
}, true);

// Tab on last item row name field → add new row
document.addEventListener('keydown', function(e) {
  if(e.key!=='Tab' || S.mode!=='invoice' || S.tab!=='create') return;
  const active = document.activeElement;
  if(!active || !active.classList.contains('iinput')) return;
  const tbody = document.getElementById('itbody');
  if(!tbody) return;
  const rows = tbody.querySelectorAll('tr');
  const lastRow = rows[rows.length-1];
  if(lastRow && lastRow.contains(active)) {
    // Check if it's the last input in the last row
    const inputs = lastRow.querySelectorAll('input:not([readonly]),select');
    const lastInput = inputs[inputs.length-1];
    if(active === lastInput && !e.shiftKey) {
      e.preventDefault();
      addIItem();
      // Focus the name field of the new row
      setTimeout(()=>{
        const newRows = document.getElementById('itbody')?.querySelectorAll('tr');
        if(newRows?.length) {
          const nameInput = newRows[newRows.length-1].querySelector('.iinput[data-f="name"]');
          if(nameInput) nameInput.focus();
        }
      }, 50);
    }
  }
}, true);

// Auto-save draft on every item field change (patch renderItemRows listener)
const _origRenderItemRows = renderItemRows;
function renderItemRows() {
  _origRenderItemRows();
  // Patch save-draft onto all item inputs after render
  const tbody = document.getElementById('itbody');
  if(tbody) {
    tbody.querySelectorAll('.iinput:not([readonly])').forEach(inp => {
      inp.addEventListener('input', saveDraft, { passive:true });
    });
  }
}

// On app init: try to restore draft (only if current form is blank)
(function tryRestoreDraft() {
  setTimeout(()=>{
    try {
      if(S.mode==='invoice' && S.tab==='create') {
        const form = S.invForm;
        const isEmpty = !form || (!form.customer_name && (!form.items?.length || (form.items.length===1 && !form.items[0].name)));
        if(isEmpty) loadDraft();
      }
    } catch(e) { console.warn('[RF] Draft restore failed:', e); }
  }, 600);
})();

// Auto-generate an EAN-8 style code from item id
window.genBarcode = function() {
  const digits = uid().replace(/[^0-9]/g,'').slice(0,7).padEnd(7,'0');
  // EAN-8 check digit
  let sum = 0;
  for(let i=0;i<7;i++) sum += Number(digits[i]) * (i%2===0?3:1);
  const check = (10 - (sum%10)) % 10;
  const code = digits + check;
  if(S.invItemForm) S.invItemForm.barcode = code;
  const el = document.getElementById('ii-bc');
  if(el) el.value = code;
  toast('Barcode generated: ' + code, 'success', 2000);
};

/* ══════════════════════════════════════════════════
   2. BARCODE SCANNING (camera — BarcodeDetector API)
══════════════════════════════════════════════════ */
let _scanStream  = null;
let _scanActive  = false;

window.openBarcodeScanner = function(target) {
  // target: 'invoice' | 'inventory'
  if(_scanActive) { closeBarcodeScanner(); return; }
  if(!('BarcodeDetector' in window)) {
    toast('Barcode scanner not supported on this browser. Try Chrome on Android.', 'error', 5000);
    return;
  }
  _scanActive = true;
  _scanTarget = target;
  const overlay = document.createElement('div');
  overlay.id    = 'scan-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:9500;display:flex;flex-direction:column;align-items:center;justify-content:center';
  overlay.innerHTML = `
    <div style="color:#fff;font-size:14px;font-weight:600;margin-bottom:12px">📷 Point camera at barcode</div>
    <video id="scan-video" style="width:100%;max-width:480px;border-radius:12px;border:3px solid #0ea5e9" autoplay playsinline></video>
    <div id="scan-hint" style="color:#aaa;font-size:12px;margin-top:10px">Detecting…</div>
    <button onclick="closeBarcodeScanner()" style="margin-top:16px;padding:10px 24px;background:#ef4444;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer">✕ Close Scanner</button>`;
  document.body.appendChild(overlay);
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(stream=>{
    _scanStream = stream;
    const video = document.getElementById('scan-video');
    if(video) { video.srcObject = stream; video.play(); }
    _runScanLoop(video);
  }).catch(err=>{
    closeBarcodeScanner();
    toast('Camera access denied: ' + err.message, 'error');
  });
};

async function _runScanLoop(video) {
  const detector = new BarcodeDetector({formats:['ean_8','ean_13','code_128','code_39','upc_a','upc_e','qr_code']});
  while(_scanActive && video) {
    try {
      const codes = await detector.detect(video);
      if(codes.length) {
        const code = codes[0].rawValue;
        closeBarcodeScanner();
        _handleScannedCode(code);
        return;
      }
    } catch(e) {}
    await new Promise(r=>setTimeout(r,150));
  }
}

window.closeBarcodeScanner = function() {
  _scanActive = false;
  if(_scanStream) { _scanStream.getTracks().forEach(t=>t.stop()); _scanStream=null; }
  document.getElementById('scan-overlay')?.remove();
};

let _scanTarget = 'invoice';
function _handleScannedCode(code) {
  toast('Barcode scanned: ' + code, 'success', 2000);
  if(_scanTarget === 'invoice') {
    // Find item by barcode and add to invoice
    const item = S.inventory.find(i=>i.barcode===code);
    if(item) {
      const invItem = {
        id:uid(), name:item.name, qty:1, rate:item.rate,
        unit:item.unit||'pcs', gst_rate:item.gst_rate||18, hsn:item.hsn||'',
        discount:0, mrp:item.mrp||0, price_mode:item.price_mode||'excl',
        item_type:'product', category:item.category||'', stock:item.stock||0,
        party_prices:[], custom_fields:[], online_store:false, description:''
      };
      if(!S.invForm) S.invForm = blankInv();
      if(S.invForm.items.length===1 && !S.invForm.items[0].name?.trim()) S.invForm.items=[invItem];
      else S.invForm.items.push(invItem);
      renderItemRows(); updateTotalsPanel(); saveDraft();
      toast(item.name + ' added to invoice ✓', 'success');
    } else {
      // Prefill quick-add bar with scanned code
      const inp = document.getElementById('quick-add-input');
      if(inp) { inp.value=code; inp.focus(); }
      toast('No item found for barcode — add manually', 'info');
    }
  } else if(_scanTarget === 'inventory') {
    // Prefill barcode field in inventory form
    if(S.invItemForm) S.invItemForm.barcode = code;
    const el = document.getElementById('ii-bc');
    if(el) el.value = code;
    render();
  }
}

window.openBatchManager = function(itemId) {
  const item = S.inventory.find(i=>i.id===itemId);
  if(!item) return;
  S._batchItemId = itemId;
  S._batchForm   = { batch_no:'', mfg_date:'', exp_date:'', qty:0, purchase_rate:0 };
  render();
};
window.closeBatchManager = function() {
  S._batchItemId = null; S._batchForm = null; render();
};
window.saveBatch = function() {
  const bf = S._batchForm;
  const id = S._batchItemId;
  if(!bf || !id) return;
  if(!bf.batch_no?.trim()) { toast('Enter batch number', 'error'); return; }
  if(!bf.exp_date)         { toast('Expiry date required', 'error'); return; }
  if(Number(bf.qty)<=0)    { toast('Qty must be > 0', 'error'); return; }
  const batch = { id:uid(), ...bf, qty:Number(bf.qty), purchase_rate:Number(bf.purchase_rate||0), added_at:today() };
  S.inventory = S.inventory.map(i=>{
    if(i.id!==id) return i;
    const batches = [...(i.batches||[]), batch];
    const totalStock = r2(batches.reduce((a,b)=>a+Number(b.qty||0),0));
    return {...i, batches, stock:totalStock};
  });
  S._batchForm = { batch_no:'', mfg_date:'', exp_date:'', qty:0, purchase_rate:0 };
  save(); render(); toast('Batch saved ✓', 'success');
};
window.deleteBatch = function(itemId, batchId) {
  S.inventory = S.inventory.map(i=>{
    if(i.id!==itemId) return i;
    const batches = (i.batches||[]).filter(b=>b.id!==batchId);
    const totalStock = r2(batches.reduce((a,b)=>a+Number(b.qty||0),0));
    return {...i, batches, stock:totalStock};
  });
  save(); render(); toast('Batch removed', 'info');
};

window.addGodown = function() {
  const name = prompt('New godown / warehouse name:','');
  if(!name?.trim()) return;
  if(S.godowns.includes(name.trim())) { toast('Godown already exists','error'); return; }
  S.godowns = [...S.godowns, name.trim()];
  save(); render(); toast('Godown "'+name+'" added ✓','success');
};
window.deleteGodown = function(name) {
  if(S.inventory.some(i=>i.godown===name)) {
    toast('Move all items out of "'+name+'" before deleting','error'); return;
  }
  S.godowns = S.godowns.filter(g=>g!==name);
  save(); render(); toast('Godown "'+name+'" removed','info');
};
window.executeTransfer = function() {
  const iid  = document.getElementById('txfr-item')?.value;
  const qty  = Number(document.getElementById('txfr-qty')?.value||0);
  const from = document.getElementById('txfr-from')?.value;
  const to   = document.getElementById('txfr-to')?.value;
  if(!iid||!qty||!from||!to) { toast('Fill all fields','error'); return; }
  if(from===to) { toast('From and To must be different','error'); return; }
  const item = S.inventory.find(i=>i.id===iid);
  if(!item) { toast('Item not found','error'); return; }
  if(Number(item.stock)<qty) { toast('Insufficient stock','error'); return; }
  // Simple model: update godown on item if all stock moves, or split (for now move all)
  S.inventory = S.inventory.map(i=>i.id===iid ? {...i, godown:to} : i);
  auditLog('edit','inventory',iid,{name:item.name,action:'transfer',from,to,qty});
  save(); render(); toast(qty+' × '+item.name+' transferred to '+to,'success');
};

window.handleImportFile = function(input) {
  const file = input.files[0]; if(!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const rd  = new FileReader();
  rd.onload = e => {
    if(ext==='csv' || ext==='txt') {
      parseImportCSV(e.target.result);
    } else {
      toast('Please upload a CSV file. For Excel, save as CSV first.','error');
    }
  };
  rd.readAsText(file);
};

function parseImportCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if(lines.length < 2) { toast('CSV must have header row + data','error'); return; }
  // Normalise headers
  const headers = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,'_'));
  const col = k => {
    const alts = { name:['name','item','item_name','product','description'],
      rate:['rate','price','selling_price','sp','sale_rate'],
      stock:['stock','qty','quantity','opening_stock'],
      unit:['unit','uom','unit_of_measure'],
      gst_rate:['gst','gst_rate','gst%','tax_rate'],
      hsn:['hsn','hsn_code','sac'],
      category:['category','cat','group'],
      mrp:['mrp','maximum_retail_price'],
      barcode:['barcode','sku','ean','upc'],
      godown:['godown','location','warehouse'],
    };
    const candidates = alts[k]||[k];
    for(const a of candidates) { const i=headers.indexOf(a); if(i>=0) return i; }
    return -1;
  };

  const rows = [];
  for(let i=1;i<lines.length;i++) {
    const cells = lines[i].split(',').map(s=>s.trim().replace(/^"|"$/g,''));
    const name = cells[col('name')]?.trim();
    if(!name) continue;
    rows.push({
      name,
      rate:       Number(cells[col('rate')]||0),
      stock:      Number(cells[col('stock')]||0),
      unit:       cells[col('unit')]||'pcs',
      gst_rate:   Number(cells[col('gst_rate')]||18),
      hsn:        cells[col('hsn')]||'',
      category:   cells[col('category')]||'',
      mrp:        Number(cells[col('mrp')]||0),
      barcode:    cells[col('barcode')]||'',
      godown:     cells[col('godown')]||'Main',
      item_type:  'product',
      price_mode: 'excl',
      party_prices:[], custom_fields:[], online_store:false, batches:[],
      low_stock_alert: 5,
    });
  }
  S._importPreview = rows;
  render();
  toast(`${rows.length} rows parsed — review and confirm import`,'info');
}

window.confirmImport = function() {
  const rows = S._importPreview||[];
  let added=0, updated=0;
  rows.forEach(row=>{
    const existing = S.inventory.find(i=>i.name.toLowerCase()===row.name.toLowerCase());
    const item = {...row, id:existing?.id||uid()};
    if(existing) { S.inventory=S.inventory.map(i=>i.id===existing.id?item:i); updated++; }
    else { S.inventory=[...S.inventory,item]; added++; }
  });
  S._importOpen=false; S._importPreview=null;
  save(); render();
  toast(`Import complete: ${added} added, ${updated} updated`,'success');
};

/* Attendance: S.attendance = [{id, staff_id, staff_name, date, status, note}]
   status: 'present'|'absent'|'half'|'leave'
   Payroll:  S.payroll = [{id, staff_id, staff_name, month, salary, days_present, days_half,
                            deductions, bonuses, net, status:'pending'|'paid', paid_date}] */

window.renderPayrollTab = function() {
  S.mode='business'; S.bizTab='payroll'; render();
};

function renderPayrollView() {
  const month = S._payMonth || new Date().toISOString().slice(0,7);
  const tab   = S._payTab || 'summary';
  const staff = S.staff_roles||[];

  if(!staff.length) return `<div class="empty mt14"><div class="eico">👥</div>
    <div class="etit">No staff added yet</div>
    <div class="esub">Add staff members in Settings → Staff &amp; Roles first, then set their monthly salary.</div>
    <button class="btn bpri bsm mt10" onclick="editFirm('staff')">+ Add Staff</button></div>`;

  const monthAtt = (S.attendance||[]).filter(a=>a.date?.startsWith(month));
  const monthPay = (S.payroll||[]).filter(p=>p.month===month);

  // Days in month
  const [yr,mo] = month.split('-').map(Number);
  const daysInMonth = new Date(yr, mo, 0).getDate();

  // Auto-compute payroll for each staff
  const computed = staff.map(s=>{
    const att     = monthAtt.filter(a=>a.staff_id===s.id);
    const present = att.filter(a=>a.status==='present').length;
    const half    = att.filter(a=>a.status==='half').length;
    const leave   = att.filter(a=>a.status==='leave').length;
    const existing= monthPay.find(p=>p.staff_id===s.id);
    const salary  = Number(s.monthly_salary||0);
    const perDay  = salary / daysInMonth;
    const earned  = r2(perDay*(present + half*0.5));
    const deduct  = Number(existing?.deductions||0);
    const bonus   = Number(existing?.bonuses||0);
    const net     = r2(earned - deduct + bonus);
    return { s, att, present, half, leave, earned, deduct, bonus, net, salary,
             status:existing?.status||'pending', existingId:existing?.id,
             daysInMonth, perDay };
  });

  const totalPayable = r2(computed.reduce((a,r)=>a+r.net,0));
  const paid = computed.filter(r=>r.status==='paid').length;

  return `
  <div class="row jbet mb14" style="flex-wrap:wrap;gap:8px">
    <div><div class="st">Payroll — ${month}</div>
      <div class="fs11 tx2">${staff.length} staff · ₹${fmt(totalPayable)} payable · ${paid} paid</div></div>
    <div class="row" style="gap:6px">
      <input type="month" value="${month}" onchange="S._payMonth=this.value;render()"
        style="padding:6px 10px;border:1.5px solid var(--bor);border-radius:8px;background:var(--surf2);color:var(--tx);font-size:12px">
      <button class="btn bgho bsm" onclick="exportPayrollCSV('${month}')">⬇️ Export</button>
    </div>
  </div>

  <div class="tabs mb14">
    <button class="tab${tab==='summary'?' on':''}" onclick="S._payTab='summary';render()">📊 Summary</button>
    <button class="tab${tab==='attendance'?' on':''}" onclick="S._payTab='attendance';render()">📅 Attendance</button>
    <button class="tab${tab==='payslips'?' on':''}" onclick="S._payTab='payslips';render()">🧾 Payslips</button>
  </div>

  ${tab==='summary' ? renderPaySummary(computed, month) : ''}
  ${tab==='attendance' ? renderAttendanceSheet(staff, month, monthAtt, daysInMonth) : ''}
  ${tab==='payslips' ? renderPayslips(computed, month) : ''}`;
}

window.toggleAtt = function(staffId, date) {
  const att = S.attendance||[];
  const idx = att.findIndex(a=>a.staff_id===staffId && a.date===date);
  const cycle = [null,'present','half','leave','absent'];
  const cur   = idx>=0 ? att[idx].status : null;
  const next  = cycle[(cycle.indexOf(cur)+1) % cycle.length];
  if(idx>=0) {
    if(next===null) S.attendance = att.filter((_,i)=>i!==idx);
    else S.attendance = att.map((a,i)=>i===idx?{...a,status:next}:a);
  } else if(next) {
    const staff = (S.staff_roles||[]).find(s=>s.id===staffId);
    S.attendance = [...att,{id:uid(),staff_id:staffId,staff_name:staff?.name||'',date,status:next}];
  }
  save(); render();
};

window.updatePayEntry = function(staffId, month, field, val) {
  const pay = S.payroll||[];
  const idx = pay.findIndex(p=>p.staff_id===staffId&&p.month===month);
  const staff = (S.staff_roles||[]).find(s=>s.id===staffId);
  if(idx>=0) {
    S.payroll = pay.map((p,i)=>i===idx?{...p,[field]:Number(val)||0}:p);
  } else {
    S.payroll = [...pay,{id:uid(),staff_id:staffId,staff_name:staff?.name||'',month,[field]:Number(val)||0,status:'pending'}];
  }
  save();
};

window.markPayrollPaid = function(staffId, month) {
  const pay   = S.payroll||[];
  const idx   = pay.findIndex(p=>p.staff_id===staffId&&p.month===month);
  const staff = (S.staff_roles||[]).find(s=>s.id===staffId);
  if(idx>=0) {
    S.payroll = pay.map((p,i)=>i===idx?{...p,status:'paid',paid_date:today()}:p);
  } else {
    S.payroll = [...pay,{id:uid(),staff_id:staffId,staff_name:staff?.name||'',month,status:'paid',paid_date:today()}];
  }
  auditLog('edit','payroll',staffId+'-'+month,{staff:staff?.name,month,action:'marked_paid'});
  save(); render(); toast('Payroll marked paid ✓','success');
};

window.exportPayrollCSV = function(month) {
  const staff = S.staff_roles||[];
  const [yr,mo] = month.split('-').map(Number);
  const dim = new Date(yr, mo, 0).getDate();
  const rows = [['Staff','Role','Salary','Days Present','Half Days','Earned','Deductions','Bonus','Net Pay','Status']];
  staff.forEach(s=>{
    const att    = (S.attendance||[]).filter(a=>a.staff_id===s.id&&a.date?.startsWith(month));
    const present= att.filter(a=>a.status==='present').length;
    const half   = att.filter(a=>a.status==='half').length;
    const pay    = (S.payroll||[]).find(p=>p.staff_id===s.id&&p.month===month)||{};
    const salary = Number(s.monthly_salary||0);
    const earned = r2(salary/dim*(present+half*0.5));
    const deduct = Number(pay.deductions||0);
    const bonus  = Number(pay.bonuses||0);
    rows.push([s.name,s.role||'Staff',salary,present,half,earned,deduct,bonus,r2(earned-deduct+bonus),pay.status||'pending']);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a'); a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`Payroll_${month}.csv`; a.click();
  toast('Payroll CSV downloaded','success');
};

window.sendWhatsAppReminder = function(custId) {
  const c   = S.customers.find(cx=>cx.id===custId);
  const firm = S.firm;
  if(!c?.phone) { toast('No phone number for this customer','error'); return; }
  const overdue = c.due_date && c.due_date < today();
  const cl = Number(c.credit_limit||0);
  const overLimit = cl>0 && Number(c.outstanding)>cl;

  const msg = `Dear ${c.name},

This is a friendly reminder from *${firm.firm_name||'us'}*.

Your current outstanding balance is *₹${Number(c.outstanding).toLocaleString('en-IN')}*.
${overdue?`Your payment was due on *${fmtDate(c.due_date)}*. Please clear at the earliest.\n`:''}${overLimit?`*Note:* Your credit limit of ₹${cl.toLocaleString('en-IN')} has been exceeded.\n`:''}
Please make payment at your earliest convenience.
${firm.upi_id?`\n💳 UPI: *${firm.upi_id}*`:''}
${firm.bank_name?`🏦 Bank: ${firm.bank_name}${firm.account_no?' · A/c: '+firm.account_no:''}${firm.ifsc?' · IFSC: '+firm.ifsc:''}`:'' }

Thank you for your business! 🙏`;

  const phone = c.phone.replace(/[^0-9]/g,'');
  const intl  = phone.startsWith('91') ? phone : '91'+phone;
  const url   = `https://wa.me/${intl}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
  toast('Opening WhatsApp for '+c.name,'success');
};

window.sendBulkReminders = function() {
  const overdue = S.customers.filter(c=>Number(c.outstanding||0)>0&&c.phone);
  if(!overdue.length){ toast('No customers with outstanding + phone','info'); return; }
  let i=0;
  const sendNext = ()=>{
    if(i>=overdue.length) { toast('All reminders opened','success'); return; }
    sendWhatsAppReminder(overdue[i].id);
    i++;
    setTimeout(sendNext, 800);
  };
  if(!confirm(`Send WhatsApp reminders to ${overdue.length} customers with outstanding?`)) return;
  sendNext();
};

/* State: S._gstr2bData = parsed GSTR-2B entries | null */

window.load2BFile = function(input) {
  const f = input.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = e => {
    try {
      const raw = JSON.parse(e.target.result);
      // GSTN GSTR-2B JSON structure: data.docdata.b2b / b2ba / cdnr / cdnra
      const b2b  = (raw?.data?.docdata?.b2b  || raw?.b2b  || []);
      const cdnr = (raw?.data?.docdata?.cdnr || raw?.cdnr || []);
      // Flatten all B2B invoice entries
      const entries = [];
      b2b.forEach(sup => {
        const gstin = sup.ctin || sup.gstin || '';
        const name  = sup.trdnm || sup.tradeName || '';
        (sup.inv || sup.invoices || []).forEach(inv => {
          entries.push({
            gstin, name,
            invoice_no:   inv.inum || inv.inv_no || '',
            invoice_date: inv.idt  || inv.inv_date || '',
            taxable:      Number(inv.val   || inv.taxable_value || 0),
            igst:         Number(inv.igst  || inv.igst_amount   || 0),
            cgst:         Number(inv.cgst  || inv.cgst_amount   || 0),
            sgst:         Number(inv.sgst  || inv.sgst_amount   || 0),
            total:        r2(Number(inv.val||0) + Number(inv.igst||0) + Number(inv.cgst||0) + Number(inv.sgst||0)),
            type: 'b2b',
            itcEligible: inv.elg !== 'no',
            matched: null,   // null=unprocessed, true=matched, false=unmatched
          });
        });
      });
      // Also handle CDNR (credit/debit notes from suppliers)
      cdnr.forEach(sup => {
        const gstin = sup.ctin || '';
        (sup.nt || []).forEach(nt => {
          entries.push({
            gstin, name: sup.trdnm||'',
            invoice_no:   nt.ntnum || '',
            invoice_date: nt.dt    || '',
            taxable:      Number(nt.val||0),
            igst: Number(nt.igst||0), cgst: Number(nt.cgst||0), sgst: Number(nt.sgst||0),
            total: r2(Number(nt.val||0)+Number(nt.igst||0)+Number(nt.cgst||0)+Number(nt.sgst||0)),
            type: nt.typ==='D'?'debit_note':'credit_note',
            itcEligible: true, matched: null,
          });
        });
      });
      S._gstr2bData  = entries;
      S._gstr2bMonth = raw?.data?.rtnprd || raw?.rtnprd || '';
      S._gstr2bMatchResults = null;  // reset
      render();
      toast(`GSTR-2B loaded — ${entries.length} entries found`, 'success');
    } catch(err) {
      toast('Could not parse GSTR-2B JSON: ' + err.message, 'error');
      console.error(err);
    }
  };
  rd.readAsText(f);
};

window.run2BReconciliation = function() {
  const entries = S._gstr2bData;
  if(!entries?.length) return;
  const purchases = S.purchases || [];
  const results   = [];

  entries.forEach(e => {
    // Try to match against purchases by GSTIN + amount (±5% tolerance) or invoice number
    const matches = purchases.filter(p => {
      const gstinMatch = e.gstin && p.supplier_gstin &&
        p.supplier_gstin.toUpperCase() === e.gstin.toUpperCase();
      const amtP   = Number(p.amount||0);
      const amtE   = e.total;
      const amtMatch = amtE>0 && Math.abs(amtP - amtE)/amtE < 0.05;  // 5% tolerance
      const invMatch = e.invoice_no && p.invoice_ref &&
        p.invoice_ref.trim().toUpperCase() === e.invoice_no.trim().toUpperCase();
      return gstinMatch && (amtMatch || invMatch);
    });

    const gstAmt = r2(e.igst + e.cgst + e.sgst);
    results.push({
      ...e,
      gst_amount:   gstAmt,
      purchase_match: matches.length > 0 ? matches[0] : null,
      match_status:   matches.length > 0 ? 'matched' : 'unmatched',
      // ITC at risk if unmatched and ITC eligible
      itc_at_risk: matches.length === 0 && e.itcEligible && gstAmt > 0,
    });
  });

  S._gstr2bMatchResults = results;
  render();

  const matched   = results.filter(r=>r.match_status==='matched').length;
  const unmatched = results.filter(r=>r.match_status==='unmatched').length;
  const itcRisk   = r2(results.filter(r=>r.itc_at_risk).reduce((a,r)=>a+r.gst_amount,0));
  toast(`Reconciliation done: ${matched} matched, ${unmatched} unmatched, ITC at risk: ₹${fmt(itcRisk).slice(1)}`, 'info', 5000);
};

window.mark2BEntry = function(idx, status) {
  if(!S._gstr2bMatchResults) return;
  S._gstr2bMatchResults[idx].match_status = status;
  S._gstr2bMatchResults[idx].itc_at_risk  = status==='unmatched' && S._gstr2bMatchResults[idx].itcEligible;
  render();
};

  const data    = S._gstr2bData;

  const isReg   = S.firm.gst_registered;

  if(!isReg) return `<div class="alert awrn mt14">GSTR-2B reconciliation requires GST registration.</div>`;

      <b>How to download GSTR-2B from portal:</b><br>

  const filtered = filter==='all' ? display
    : filter==='matched'   ? display.filter(r=>r.match_status==='matched')
    : filter==='unmatched' ? display.filter(r=>r.match_status==='unmatched'||r.match_status==='pending')
    : display.filter(r=>r.itc_at_risk);

  const totITC     = r2(display.reduce((a,r)=>a+r.gst_amount,0));
  const matched    = display.filter(r=>r.match_status==='matched').length;
  const unmatched  = display.filter(r=>r.match_status!=='matched').length;
  const itcAtRisk  = r2(display.filter(r=>r.itc_at_risk).reduce((a,r)=>a+r.gst_amount,0));

  return `

    <div>

      <div class="fs11 tx2">${data.length} entries · Period: ${esc(S._gstr2bMonth||'—')}</div>
    </div>

    </div>

  <div class="g4 mb14">
    <div class="sc"><div class="sl">Total ITC in 2B</div><div class="sv txacc">${fmt(totITC)}</div><div class="ss">${display.length} supplier invoices</div></div>
    <div class="sc"><div class="sl">✓ Matched</div><div class="sv txgrn">${matched}</div><div class="ss">Found in your purchases</div></div>
    <div class="sc"><div class="sl">✗ Unmatched</div><div class="sv txred">${unmatched}</div><div class="ss">Not in your records</div></div>
    <div class="sc"><div class="sl">⚠ ITC at Risk</div><div class="sv txred">${fmt(itcAtRisk)}</div><div class="ss">May be disallowed</div></div>
  </div>

  ${itcAtRisk > 0 ? `<div class="alert awrn mb14" style="font-size:12px">
    ⚠️ <b>₹${fmt(itcAtRisk).slice(1)} ITC at risk</b> — these supplier invoices appear in GSTR-2B but are not matched in your purchase records.
    You cannot claim ITC on these unless the invoices are recorded in your books. Add the missing purchases or contact the supplier.
  </div>` : results ? `<div class="alert agrn mb14" style="font-size:12px">✓ All ITC entries are matched. You can claim the full ₹${fmt(totITC)} ITC this period.</div>` : ''}

  <div class="frow mb10">
    ${[['all','All'],['matched','✓ Matched'],['unmatched','✗ Unmatched'],['risk','⚠ At Risk']].map(([v,l])=>
      `<button class="fbtn${filter===v?' on':''}" onclick="S._2bFilter='${v}';render()">${l}</button>`
    ).join('')}

  </div>`;
}

window.openCreditNote = function(invId) {
  const inv = S.invoices.find(i=>i.id===invId);
  S._cnForm = blankCreditNote(inv);
  S._cnOpen = true;
  render();
};
window.closeCreditNote = function() {

};
window.updateCNItem = function(id, field, val) {
  if(!S._cnForm) return;
  S._cnForm.items = S._cnForm.items.map(it => it.id===id ? {...it,[field]:val} : it);
  render();
};
window.saveCreditNote = function() {
  const cn = S._cnForm;
  if(!cn) return;
  if(!cn.customer_name) { toast('Customer name required','error'); return; }
  const isReg = S.firm.gst_registered;
  // Recalculate totals from CN items
  const t = buildInvTotals(cn.items||[], isReg, cn.is_igst, {});
  cn.cn_no          = getNextCNNo();
  cn.total          = t.grandTotal;
  cn.total_taxable  = t.totalTaxable;
  cn.gst_amount     = t.totalGST;
  cn.gst_summary    = t.gstSummary;
  cn.fy             = getFY(cn.date);

  // Reverse outstanding for the customer
  S.customers = S.customers.map(cx => {
    if(cx.name.toLowerCase() !== (cn.customer_name||'').toLowerCase()) return cx;
    return { ...cx, outstanding: r2(Math.max(0, Number(cx.outstanding||0) - cn.total)) };
  });

  if(!S.credit_notes) S.credit_notes = [];
  S.credit_notes = [cn, ...S.credit_notes];

  auditLog('credit_note','credit_note',cn.id,{
    cn_no: cn.cn_no,
    customer_name: cn.customer_name,
    amount: cn.total,
    against: cn.original_invoice_no,
    reason: cn.reason
  });

  S._cnOpen = false; S._cnForm = null;
  save(); render();
  toast(`Credit Note ${cn.cn_no} issued ✓`, 'success');
};

window.delCN = id => confirmDelete('Delete this credit note?', () => {
  const cn = (S.credit_notes||[]).find(n=>n.id===id);
  if(cn) {
    // Restore outstanding
    S.customers = S.customers.map(cx => {
      if(cx.name.toLowerCase() !== (cn.customer_name||'').toLowerCase()) return cx;
      return { ...cx, outstanding: r2(Number(cx.outstanding||0) + cn.total) };
    });
    auditLog('delete','credit_note',id,{cn_no:cn.cn_no,customer_name:cn.customer_name,amount:cn.total});
  }
  S.credit_notes = (S.credit_notes||[]).filter(n=>n.id!==id);
  save(); render(); toast('Credit note deleted','info');
});

window.saveInvoice = () => {
  readInvInputs();
  const f = S.invForm;
  const docType = f.doc_type||'invoice';
  const filledItems = f.items.filter(i=>i.name?.trim() && (docType==='challan'||docType==='quotation'||Number(i.rate)>0));
  if(!f?.customer_name?.trim()){ alert('Please enter a customer name.'); return; }
  if(filledItems.length===0){ alert('Add at least one item with a name and rate.'); return; }
  // Only save items that have a name
  f.items = filledItems;
  const isReg = S.firm.gst_registered && f.inv_with_gst !== false;
  const isIGST = f.is_igst||false;
  const t = buildInvTotals(filledItems, isReg, isIGST, {inv_discount:f.inv_discount,inv_discount_type:f.inv_discount_type,extra_charges:f.extra_charges,tcs_rate:f.tcs_rate,round_off:f.round_off});
  const {no, key, n} = getNextInvNo(f.date);
  const fy = getFY(f.date);
  const pm = f.payment_method || 'cash';
  const payType = f.pay_type || (pm === 'credit' ? 'credit' : 'instant');
  const isPar = payType === 'credit' && f.is_partial === true;
  const isInstant = payType === 'instant';
  let partialAmt = isPar ? Number(f.partial_amount||0) : (isInstant ? t.grandTotal : 0);
  if(isPar){
    if(partialAmt <= 0){ toast('Enter the amount paid now for partial payment','error'); return; }
    if(partialAmt >= t.grandTotal){ toast('Partial amount must be less than invoice total. Use Full Credit instead.','error'); return; }
  }
  const balance = t.grandTotal - partialAmt;
  const status = isInstant ? 'paid' : isPar ? 'partial' : 'unpaid';
  const inv = {
    id:uid(), invoice_no:no, month_key:key, fy,
    customer_name:f.customer_name, customer_phone:f.customer_phone,
    customer_gstin: f.customer_gstin||'', customer_address: f.customer_address||'',
    ship_to: f.ship_to||'', place_of_supply: f.place_of_supply||'',
    inv_type: f.inv_type||'tax', is_igst: f.is_igst||false,
    doc_type: f.doc_type||'invoice',
    po_number: f.po_number||'', order_id: f.order_id||'',
    payment_terms: f.payment_terms||0,
    inv_discount: f.inv_discount||0, inv_discount_type: f.inv_discount_type||'pct',
    extra_charges: f.extra_charges||0, extra_charges_label: f.extra_charges_label||'',
    tcs_rate: f.tcs_rate||0, round_off: f.round_off||false,
    pay_type:payType, payment_method:pm, is_partial:isPar, partial_amount:partialAmt, due_date:f.due_date||'',
    status, date:f.date||today(), notes:f.notes||'',
    items:f.items.map(it=>({...it})),
    subtotal:t.subtotal, total_discount:t.totalDisc, total_taxable:t.totalTaxable,
    inv_disc_amt:t.invDiscAmt, extra_charges_amt:t.extraCharges, tcs_amt:t.tcsAmt,
    gst_summary:t.gstSummary, gst_amount:t.totalGST, total:t.grandTotal
  };
  commitInvNo(key, n);
  S.invoices = [inv, ...S.invoices];
  upsertCust(f.customer_name, f.customer_phone, pm, t.grandTotal, isPar ? balance : (pm==='credit'?t.grandTotal:0), f.due_date||'', {gstin:f.customer_gstin||'', address:f.customer_address||'', payment_terms:f.payment_terms||0});
  // Deduct inventory stock (name-based match, case-insensitive)
  const missedItems = [];
  f.items.forEach(it=>{
    if(!it.name) return;
    const si = S.inventory.find(i=>i.name.toLowerCase()===it.name.toLowerCase());
    if(si){ si.stock = r2(Math.max(0, Number(si.stock||0) - Number(it.qty||0))); }
    else { missedItems.push(it.name); }
  });
  if(missedItems.length>0){
    // silently skip — items not in stock master are simply not deducted
  }

  // Sales Return: RE-ADD stock and reverse outstanding
  if(docType==='return'){
    f.items.forEach(it=>{
      if(!it.name) return;
      const si = S.inventory.find(i=>i.name.toLowerCase()===it.name.toLowerCase());
      if(si){ si.stock = r2(Number(si.stock||0) + Number(it.qty||0)); } // re-add
    });
    // Reverse outstanding if customer exists
    const retCust = S.customers.find(cx=>cx.name.toLowerCase()===f.customer_name.toLowerCase());
    if(retCust && retCust.outstanding>0){
      retCust.outstanding = r2(Math.max(0, retCust.outstanding - t.grandTotal));
    }
    toast('Sales return recorded — stock restored','info');
  }

  // Audit trail
  auditLog('create','invoice',inv.id,{invoice_no:inv.invoice_no,customer_name:inv.customer_name,amount:inv.total,doc_type:inv.doc_type||'invoice'});
  // Post-save: show action sheet
  S.viewInv=inv; S.invForm=blankInv(); S.tab='list';
  save(); render();
  // Show action sheet after render
  setTimeout(()=>showPostSaveSheet(inv), 80);
};

window.voidInvoice = id => {
  const inv = S.invoices.find(i=>i.id===id); if(!inv) return;
  const reason = prompt('Reason for voiding this invoice (optional):','');
  if(reason === null) return; // cancelled
  S.invoices = S.invoices.map(i => i.id===id
    ? {...i, status:'void', void_reason:reason.trim(), void_date:today()}
    : i
  );
  // Reverse customer outstanding if it was credit/unpaid
  if(inv.status==='unpaid'){
    S.customers = S.customers.map(c => c.name.toLowerCase()===inv.customer_name.toLowerCase()
      ? {...c, outstanding:r2(Math.max(0,(c.outstanding||0)-Number(inv.total||0)))}
      : c);
  } else if(inv.status==='partial'){
    const bal = r2(Number(inv.total||0)-Number(inv.partial_amount||0));
    S.customers = S.customers.map(c => c.name.toLowerCase()===inv.customer_name.toLowerCase()
      ? {...c, outstanding:r2(Math.max(0,(c.outstanding||0)-bal))}
      : c);
  }
  toast('Invoice voided','warn');
  save(); render();
};

window.showSupplierAC = function(val) {
  const drop = document.getElementById('sup-ac-drop'); if(!drop) return;
  const suppliers = [...new Set(S.purchases.map(p=>p.supplier).filter(Boolean))];
  const q = val.toLowerCase();
  const matches = suppliers.filter(s=>s.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length || !val){ drop.style.display='none'; return; }
  drop.innerHTML = matches.map(s=>`
    <div onclick="selectSupplierAC(this.dataset.val)" data-val="${esc(s)}"
      style="padding:9px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bor)"
      onmouseover="this.style.background='var(--surf2)'" onmouseout="this.style.background=''">
      ${esc(s)}
      ${(()=>{const last=S.purchases.filter(p=>p.supplier===s).sort((a,b)=>b.date.localeCompare(a.date))[0];return last?`<span style="font-size:10px;color:var(--tx2);margin-left:8px">Last: ${fmt(last.amount)} · ${fmtDate(last.date)}</span>`:''})()}
    </div>`).join('');
  drop.style.display = 'block';
};

window.selectSupplierAC = function(nameOrEl) {
  // Can be called with name string or triggered from data-val onclick
  const name = typeof nameOrEl === 'string' ? nameOrEl : (nameOrEl?.dataset?.val || '');
  const inp = document.getElementById('p-sp');
  if(inp) inp.value = name;
  const drop = document.getElementById('sup-ac-drop');

  // Auto-fill last used item and GST rate for this supplier
  const last = S.purchases.filter(p=>p.supplier===name).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(last){
    const it = document.getElementById('p-it');

/* ── SAVE PAYMENT ───────────────────────────────── */
window.savePayment = custId => {
  const amt=Number($('pay-am')?.value);
  if(!amt){ alert('Enter amount.'); return; }
  const c=S.customers.find(x=>x.id===custId); if(!c) return;
  const dt=$('pay-dt')?.value||today();
  const invRef=$('pay-inv')?.value||'';
  const p={id:uid(),customer_id:custId,customer_name:c.name,amount:amt,date:dt,
    method:$('pay-mt')?.value||'cash',note:$('pay-note')?.value?.trim()||'',
    invoice_ref:invRef,fy:getFY(dt)};
  S.payments=[p,...S.payments];
  // Reduce customer outstanding
  S.customers=S.customers.map(x=>x.id===custId?{...x,outstanding:r2(Math.max(0,(x.outstanding||0)-amt))}:x);
  // Update linked invoice status if a specific invoice was selected
  if(invRef){
    const linkedInv = S.invoices.find(i=>i.invoice_no===invRef);
    if(linkedInv){
      const totalPaid = r2(S.payments.filter(py=>py.invoice_ref===invRef).reduce((a,py)=>a+Number(py.amount),0));
      const invTotal  = Number(linkedInv.total||0);
      S.invoices = S.invoices.map(i=> i.invoice_no===invRef ? {
        ...i,
        status: totalPaid >= invTotal ? 'paid' : 'partial',
        partial_amount: Math.min(totalPaid, invTotal)
      } : i);
    }
  }
  // If customer outstanding is now 0, mark all their unpaid invoices as paid
  const updatedCust = S.customers.find(x=>x.id===custId);
  if(updatedCust && updatedCust.outstanding <= 0){
    S.invoices = S.invoices.map(i=>
      i.customer_name?.toLowerCase()===c.name.toLowerCase() && i.status!=='paid'
        ? {...i, status:'paid'}
        : i
    );
  }
  S.payModal=null; save(); render();
};

/* ── CUSTOMER HELPERS ───────────────────────────── */
function upsertCust(name, phone, pay, amount, outstanding, dueDate, opts={}) {
  // opts: { gstin, address, payment_terms }
  const ex=S.customers.find(c=>c.name.toLowerCase()===name.toLowerCase());
  const outAmt = outstanding !== undefined ? outstanding : (pay==='credit'?amount:0);
  if(ex){
    const earliestDue = ex.due_date && dueDate
      ? (dueDate < ex.due_date ? dueDate : ex.due_date)
      : (dueDate || ex.due_date || '');
    S.customers=S.customers.map(c=>c.name.toLowerCase()===name.toLowerCase()?{
      ...c,
      total_business : r2((c.total_business||0)+amount),
      outstanding    : r2((c.outstanding||0)+outAmt),
      last_date: today(), payment_method: pay,
      phone    : phone||c.phone||'',
      due_date : earliestDue,
      // Persist extra fields if provided and not already set
      gstin    : opts.gstin    || c.gstin    || '',
      address  : opts.address  || c.address  || '',

function ensureToastWrap() {
  let w = document.getElementById('toast-wrap');
  if(!w){ w=document.createElement('div'); w.id='toast-wrap'; document.body.appendChild(w); }
  return w;
}
function toast(msg, type='success', duration=3000) {
  const w = ensureToastWrap();
  const icons = {success:'✅',error:'❌',info:'ℹ️',warn:'⚠️'};
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span style="font-size:16px">${icons[type]||'✅'}</span><span style="flex:1">${msg}</span><button onclick="this.parentElement.remove()" style="background:none;border:none;color:inherit;opacity:.7;cursor:pointer;font-size:16px;padding:0 0 0 4px">✕</button>`;
  w.appendChild(el);
  setTimeout(() => {
    el.classList.add('toast-out');
    setTimeout(() => el.remove(), 280);
  }, duration);
}
// Override window.alert to use toast for non-confirm messages

function markFieldError(inputId, msg) {
  const el = document.getElementById(inputId); if(!el) return;
  const fld = el.closest('.fld'); if(!fld) return;
  fld.classList.add('field-error');
  // Remove old msg
  fld.querySelectorAll('.field-error-msg').forEach(e=>e.remove());
  const m = document.createElement('div');
  m.className = 'field-error-msg'; m.textContent = msg||'This field is required';
  fld.appendChild(m);
  el.addEventListener('input', () => {
    fld.classList.remove('field-error');
    m.remove();
  }, {once:true});
  el.focus();
}

function clearFieldErrors() {
  document.querySelectorAll('.field-error').forEach(f=>{
    f.classList.remove('field-error');
    f.querySelectorAll('.field-error-msg').forEach(e=>e.remove());
  });
}

/* ══════════════════════════════════════════════════
   UX: BUTTON RIPPLE
══════════════════════════════════════════════════ */
document.addEventListener('click', e => {
  const btn = e.target.closest('.btn');
  if(!btn || btn.disabled) return;
  const rect = btn.getBoundingClientRect();
  const r = document.createElement('span');
  r.className = 'ripple-el';
  r.style.left = (e.clientX - rect.left) + 'px';
  r.style.top  = (e.clientY - rect.top)  + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 600);
});

/* ══════════════════════════════════════════════════
   UX: ANIMATED COUNTER on dashboard SVs
══════════════════════════════════════════════════ */
function animateCounters() {
  document.querySelectorAll('.sv').forEach(el => {
    const raw = el.textContent.replace(/[₹,]/g,'').trim();
    const num = parseFloat(raw);
    if(isNaN(num)||num===0) return;
    let start = 0, duration = 600, startTime = null;
    const formatted = el.textContent;
    function step(ts) {
      if(!startTime) startTime=ts;
      const p = Math.min((ts-startTime)/duration, 1);
      const ease = 1-Math.pow(1-p,3); // ease-out cubic
      const cur = start + (num-start)*ease;
      el.textContent = '₹'+cur.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
      if(p<1) requestAnimationFrame(step);
      else el.textContent = formatted;
    }
    requestAnimationFrame(step);
  });
}

window.openPartyLedger = function(custId) { S._ledgerCust = custId; render(); };

function renderPartyLedger() {
  const custId = S._ledgerCust;
  if(!custId) return '';
  const cust = S.customers.find(c=>c.id===custId);
  if(!cust) return '';

  // Gather all transactions for this customer sorted by date
  const txns = [];

  // Invoices
  S.invoices.filter(i=>(i.customer_name||'').toLowerCase()===cust.name.toLowerCase()).forEach(inv=>{
    txns.push({ date:inv.date, type:'Invoice', ref:inv.invoice_no, debit:inv.total, credit:0, note:inv.status });
    if(inv.partial_amount>0 && inv.status!=='paid'){
      txns.push({ date:inv.date, type:'Payment', ref:'Part pay — '+inv.invoice_no, debit:0, credit:inv.partial_amount, note:'partial' });
    }
    if(inv.status==='paid' && inv.pay_type!=='credit'){
      // Instant payment: invoice + payment same day
      txns.push({ date:inv.date, type:'Payment', ref:'Cash/UPI — '+inv.invoice_no, debit:0, credit:inv.total, note:'paid' });
    }
  });

  // Explicit payment records
  S.payments.filter(p=>p.customer_id===custId||(p.customer_name||'').toLowerCase()===cust.name.toLowerCase()).forEach(p=>{
    txns.push({ date:p.date, type:'Payment', ref:'Payment #'+p.id.slice(-4), debit:0, credit:p.amount, note:p.payment_method||'' });
  });

  // Credit notes
  (S.credit_notes||[]).filter(n=>(n.customer_name||'').toLowerCase()===cust.name.toLowerCase()).forEach(cn=>{
    txns.push({ date:cn.date, type:'Credit Note', ref:cn.cn_no, debit:0, credit:cn.total, note:cn.reason||'' });
  });

  // Sort by date ascending for running balance
  txns.sort((a,b)=>a.date.localeCompare(b.date));

  // Compute running balance
  let bal = 0;
  const rows = txns.map(t=>{
    bal = r2(bal + t.debit - t.credit);
    return {...t, balance: bal};
  });

  const totalDebit  = r2(rows.reduce((a,r)=>a+r.debit,0));
  const totalCredit = r2(rows.reduce((a,r)=>a+r.credit,0));
  const closing     = r2(totalDebit - totalCredit);

  return `<div class="mover" onclick="closePartyLedger()">
    <div class="modal" onclick="event.stopPropagation()" style="max-width:700px;max-height:92vh;overflow-y:auto">
      <div class="row jbet mb10">
        <div>
          <div class="mtit">📒 Party Ledger — ${esc(cust.name)}</div>
          <div class="fs11 tx2">${cust.gstin?`GSTIN: ${esc(cust.gstin)} · `:''} ${cust.phone?'📞 '+esc(cust.phone):''}</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn bgho bsm" onclick="window.print()">🖨️</button>
          <button class="ibtn" onclick="closePartyLedger()">✕</button>
        </div>
      </div>

      <!-- Summary chips -->
      <div class="g3 mb14">
        <div class="sc"><div class="sl">Total Invoiced</div><div class="sv txacc">${fmt(totalDebit)}</div></div>
        <div class="sc"><div class="sl">Total Received</div><div class="sv txgrn">${fmt(totalCredit)}</div></div>
        <div class="sc"><div class="sl">Closing Balance</div><div class="sv ${closing>0?'txred':'txgrn'}">${fmt(closing)}</div><div class="ss">${closing>0?'Receivable':'Settled'}</div></div>
      </div>

      ${rows.length===0?`<div class="empty"><div class="etit">No transactions yet</div></div>`:`
      <div class="twrap"><table style="font-size:11.5px">
        <thead><tr>
          <th>Date</th><th>Type</th><th>Reference</th><th>Note</th>
          <th style="text-align:right">Debit (Dr)</th>
          <th style="text-align:right">Credit (Cr)</th>
          <th style="text-align:right">Balance</th>
        </tr></thead>
        <tbody>
        ${rows.map(r=>`<tr>
          <td class="tx2">${fmtDate(r.date)}</td>
          <td><span class="bdg ${r.type==='Invoice'?'bc':r.type==='Payment'?'bg':r.type==='Credit Note'?'bu':'bch'}">${r.type}</span></td>
          <td class="txacc fw6">${esc(r.ref)}</td>
          <td class="tx2 fs10">${esc(r.note)}</td>
          <td style="text-align:right;color:${r.debit>0?'var(--red)':'var(--tx2)'};font-weight:${r.debit>0?600:400}">${r.debit>0?fmt(r.debit):'—'}</td>
          <td style="text-align:right;color:${r.credit>0?'var(--grn)':'var(--tx2)'};font-weight:${r.credit>0?600:400}">${r.credit>0?fmt(r.credit):'—'}</td>
          <td style="text-align:right;font-weight:600;color:${r.balance>0?'var(--red)':r.balance<0?'var(--grn)':'var(--tx2)'}">${fmt(Math.abs(r.balance))}${r.balance>0?' Dr':r.balance<0?' Cr':''}</td>
        </tr>`).join('')}
        </tbody>
        <tfoot><tr>
          <td colspan="4" style="font-weight:700;padding:8px 10px;background:var(--surf2)">Closing Balance</td>
          <td style="text-align:right;font-weight:700;color:var(--red);background:var(--surf2)">${fmt(totalDebit)}</td>
          <td style="text-align:right;font-weight:700;color:var(--grn);background:var(--surf2)">${fmt(totalCredit)}</td>
          <td style="text-align:right;font-weight:700;font-size:13px;color:${closing>0?'var(--red)':'var(--grn)'};background:var(--surf2)">${fmt(Math.abs(closing))}${closing>0?' Dr':closing<0?' Cr':' —'}</td>
        </tr></tfoot>
      </table></div>`}

      <div class="fs11 tx2 mt10" style="text-align:center">Dr = Amount owed by customer &nbsp;·&nbsp; Cr = Amount paid/credited</div>
    </div>
  </div>`;
}

window.restoreData = function(input) {
  var file = input.files && input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if(!data.firm || !data.invoices) {
        toast('Invalid backup file — missing required data', 'error'); return;
      }
      // Confirm before overwriting
      if(!confirm('⚠️ This will REPLACE all current data with the backup.\n\nBackup dated: ' + (data._exported || 'unknown') + '\n\nContinue?')) {
        input.value = ''; return;
      }
      S.firm         = data.firm         || null;
      S.customers    = data.customers    || [];
      S.invoices     = data.invoices     || [];
      S.purchases    = data.purchases    || [];
      S.sales        = data.sales        || [];
      S.expenses     = data.expenses     || [];
      S.payments     = data.payments     || [];
      S.inventory    = data.inventory    || [];
      S.inv_counters = data.inv_counters || {};
      save();
      render();
      toast('Backup restored successfully ✓', 'success');
    } catch(err) {
      toast('Could not parse backup file: ' + err.message, 'error');
    }
    input.value = '';
  };
  reader.readAsText(file);
};

window.bulkPrint = async function() {
  const ids = [...S.selectedInvs];
  if(!ids.length) return;
  const invs = ids.map(id => S.invoices.find(i=>i.id===id)).filter(Boolean);
  const f = S.firm;
  const isReg = f.gst_registered;

  // Generate QR once (shared UPI, amount will vary but QR is for payer reference)
  let qrURL = '';
  if(f.upi_id) {
    const upiStr = `upi://pay?pa=${encodeURIComponent(f.upi_id)}&pn=${encodeURIComponent(f.firm_name)}&cu=INR`;
    qrURL = await generateQR(upiStr);
  }

  // Build one HTML doc — each invoice on its own page via CSS page-break
  const pages = invs.map(inv => {
    const t = buildInvTotals(inv.items||[], isReg, inv.is_igst||false, {inv_discount:inv.inv_discount,inv_discount_type:inv.inv_discount_type,extra_charges:inv.extra_charges,tcs_rate:inv.tcs_rate,round_off:inv.round_off});
    // Use per-invoice QR with correct amount
    return printHTML(inv, f, t, isReg, qrURL);
  });

  // Combine: strip each page's html/head/body wrappers, wrap in a single doc with page breaks
  const combined = pages.map((pg, idx) => {
    // Extract only the body content
    const bodyMatch = pg.match(/<body[^>]*>([\s\S]*)<\/body>/i);
    const styleMatch = pg.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
    const body = bodyMatch ? bodyMatch[1].replace(/<script[\s\S]*?<\/script>/gi,'') : '';
    return `<div class="inv-page" style="${idx > 0 ? 'page-break-before:always' : ''}">${body}</div>`;
  }).join('\n');

  const combinedStyle = pages[0] ? (pages[0].match(/<style[^>]*>([\s\S]*?)<\/style>/i)||['',''])[1] : '';

  const fullHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Bulk Print — ${invs.length} Invoice${invs.length>1?'s':''}</title>
<style>
${combinedStyle}
.inv-page { break-inside:avoid; }
@media print { @page{margin:0} .inv-page{page-break-after:always} .inv-page:last-child{page-break-after:auto} }
.bulk-toolbar{background:#1a2744;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px;font-size:12px;font-family:sans-serif;margin-bottom:0}
.bulk-toolbar button{background:#BF4A2B;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
@media print{.bulk-toolbar{display:none}}
</style>
</head><body>
<div class="bulk-toolbar">
  <span style="font-weight:700;font-size:14px">📦 Bulk Print</span>
  <span>${invs.length} Invoice${invs.length>1?'s':''}</span>
  <button onclick="window.print()">🖨️ Print All</button>
</div>
${combined}
</body></html>`;

  const w = window.open('','_blank');
  const blob = new Blob([fullHtml], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  if(!w || w.closed) {
    const a = document.createElement('a');
    a.href = url; a.download = 'bulk-invoices.html'; a.click();
    toast('Popup blocked — bulk invoice file downloaded. Open in browser to print.','warn',6000);
    setTimeout(()=>URL.revokeObjectURL(url),10000); return;
  }
  w.location.href = url;
  setTimeout(()=>URL.revokeObjectURL(url), 120000);
};

window.markInvPaid = function(id) {
  const inv = S.invoices.find(i=>i.id===id);
  if(!inv) return;
  auditLog('payment','invoice',id,{invoice_no:inv.invoice_no,customer_name:inv.customer_name,amount:inv.total,note:'Marked as paid'});
  const balance = Number(inv.total||0) - Number(inv.partial_amount||0);
  const label = inv.status==='partial' ? `Mark remaining ${fmt(balance)} as paid?` : `Mark ${fmt(inv.total)} as paid?`;
  if(!confirm(label)) return;
  S.invoices = S.invoices.map(i => i.id===id
    ? {...i, status:'paid', partial_amount:Number(i.total||0), is_partial:false}
    : i
  );
  // Update customer outstanding
  S.customers = S.customers.map(c => {
    if(c.name.toLowerCase() !== (inv.customer_name||'').toLowerCase()) return c;
    return {...c, outstanding: r2(Math.max(0, Number(c.outstanding||0) - balance))};
  });
  save(); render();
  toast(`${esc(inv.invoice_no)} marked as paid ✓`, 'success');
};

let _cmdIdx = 0;
let _cmdItems = [];

window.openCmdPalette = function() {

window.renderCmdResults = function(q) {
  const box = document.getElementById('cmd-results');
  if(!box) return;
  q = (q||'').toLowerCase().trim();
  _cmdItems = [];

  const sections = [];

  // ── Quick Actions ──
  const actions = [
    {ico:'➕', title:'New Invoice', sub:'Create a fresh invoice', tag:'action', fn:()=>{S.mode='invoice';S.tab='create';S.page='main';S.viewInv=null;S.invForm=blankInv();render();}},
    {ico:'📊', title:'Dashboard', sub:'Go to Today overview', tag:'action', fn:()=>{S.mode='business';S.bizTab='dash';render();}},
    {ico:'📦', title:'Inventory / Stock', sub:'Manage stock levels', tag:'action', fn:()=>{swMode('inventory');}},
    {ico:'💰', title:'Outstanding Collections', sub:'Customers with pending dues', tag:'action', fn:()=>{S.mode='business';S.bizTab='money';render();}},
    {ico:'📈', title:'GST Reports', sub:'GSTR-1 and analytics', tag:'action', fn:()=>{swMode('gst');}},
    {ico:'🌙', title:'Toggle Dark Mode', sub:'Switch light / dark', tag:'action', fn:()=>{toggleDark();}},
  ].filter(a=>!q||a.title.toLowerCase().includes(q)||a.sub.toLowerCase().includes(q));

  if(actions.length){
    sections.push({label:'Actions', items:actions});
    actions.forEach(a=>_cmdItems.push(a));
  }

  // ── Customers ──
  if(S.customers){
    const custs = S.customers
      .filter(c=>!q||c.name.toLowerCase().includes(q)||(c.phone&&c.phone.includes(q)))
      .slice(0,5)
      .map(c=>({
        ico:'👤', title:c.name,
        sub:`${c.phone||''}${Number(c.outstanding)>0?' · ₹'+fmt(Number(c.outstanding))+' due':''}`,
        tag:'customer',
        fn:()=>{ S.mode='customers'; S.page='main'; render(); setTimeout(()=>{const f=document.getElementById('cust-search');if(f){f.value=c.name;filterCustRows(c.name);}},120); }
      }));
    if(custs.length){ sections.push({label:'Customers', items:custs}); custs.forEach(x=>_cmdItems.push(x)); }
  }

  // ── Invoices ──
  if(S.invoices){
    const invs = S.invoices
      .filter(i=>!q||(i.invoice_no&&i.invoice_no.toLowerCase().includes(q))||(i.customer_name&&i.customer_name.toLowerCase().includes(q)))
      .slice(0,4)
      .map(i=>({
        ico:'🧾', title:i.invoice_no,
        sub:`${i.customer_name||''} · ₹${fmt(i.total)} · ${i.status}`,
        tag:'invoice',
        fn:()=>{ S.mode='invoice'; S.tab='list'; S.viewInv=i; render(); }
      }));
    if(invs.length){ sections.push({label:'Invoices', items:invs}); invs.forEach(x=>_cmdItems.push(x)); }
  }

  // ── Inventory items ──
  if(S.inventory){
    const items = S.inventory
      .filter(i=>!q||i.name.toLowerCase().includes(q))
      .slice(0,4)
      .map(i=>({
        ico:'📦', title:i.name,
        sub:`Stock: ${i.stock} · ₹${fmt(i.price||i.rate||0)}`,
        tag:'item',
        fn:()=>{ swMode('inventory'); }
      }));
    if(items.length){ sections.push({label:'Items', items:items}); items.forEach(x=>_cmdItems.push(x)); }
  }

  if(!_cmdItems.length){
    box.innerHTML='<div class="cmd-empty">No results for <b>"'+q+'"</b></div>';
    return;
  }

  let html='';
  let globalIdx=0;
  sections.forEach(sec=>{
    html+=`<div class="cmd-section">${sec.label}</div>`;
    sec.items.forEach(item=>{
      const sel = globalIdx===_cmdIdx ? ' cmd-sel' : '';
      html+=`<div class="cmd-item${sel}" data-idx="${globalIdx}" onmouseenter="setCmdIdx(${globalIdx})" onclick="execCmd(${globalIdx})">
        <div class="ci-ico">${item.ico}</div>
        <div class="ci-body"><div class="ci-title">${esc(item.title)}</div><div class="ci-sub">${esc(item.sub)}</div></div>
        <div class="ci-tag">${item.tag}</div>
      </div>`;
      globalIdx++;
    });
  });
  box.innerHTML=html;
};

window.setCmdIdx = function(idx){
  _cmdIdx=idx;
  document.querySelectorAll('.cmd-item').forEach((el,i)=>el.classList.toggle('cmd-sel',i===idx));
};

window.execCmd = function(idx){
  const item=_cmdItems[idx];
  if(!item) return;
  closeCmdPalette();
  setTimeout(()=>item.fn(), 80);
};

window.handleCmdKey = function(e){
  if(e.key==='ArrowDown'){ e.preventDefault(); setCmdIdx(Math.min(_cmdIdx+1,_cmdItems.length-1)); scrollCmdSel(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); setCmdIdx(Math.max(_cmdIdx-1,0)); scrollCmdSel(); }
  else if(e.key==='Enter'){ e.preventDefault(); execCmd(_cmdIdx); }
  else if(e.key==='Escape'){ closeCmdPalette(); }
};
