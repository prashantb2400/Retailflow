window.switchProfile = async function(pid) {
  const m = document.getElementById('profile-menu');
  if(m) m.style.display='none';
  if(pid===(S._activeProfileId||'default')) return; // already active

  if(!confirm('Switch to this business?')) return;

  // Save current profile first
  save();

  // Migrate this profile's blob from localStorage to IDB if needed
  await IDB.migrateFromLocalStorage('rf_data_'+pid);

  // Switch active profile
  S._activeProfileId = pid;
  localStorage.setItem(_ACTIVE_KEY, pid);

  // Load new profile data from IDB
  const newRaw = await IDB.get('rf_data_'+pid);
  if(newRaw){
    try {
      const data = JSON.parse(newRaw);
      S.firm=data.firm||null; S.customers=data.customers||[];
      S.invoices=data.invoices||[]; S.purchases=data.purchases||[];
      S.sales=data.sales||[]; S.expenses=data.expenses||[];
      S.payments=data.payments||[]; S.inventory=data.inventory||[];
      S.inv_counters=data.inv_counters||{}; S.inv_categories=data.inv_categories||[];
    } catch(e){}
  } else {
    // New empty profile
    S.firm=null; S.customers=[]; S.invoices=[]; S.purchases=[];
    S.sales=[]; S.expenses=[]; S.payments=[]; S.inventory=[];
    S.inv_counters={}; S.inv_categories=[];
  }
  S.invForm=blankInv(); S.mode='invoice'; S.tab='create';
  render();
  toast('Switched to '+pid,'info');
};

window.addNewBusiness = async function() {
  const m = document.getElementById('profile-menu');
  if(m) m.style.display='none';

  const name = prompt('New business name:');
  if(!name||!name.trim()) return;

  // 1 — Register the new profile in the list
  const pid      = 'profile_'+uid();
  const profiles = _getProfiles();
  if(!profiles.find(p=>p.id==='default')){
    profiles.unshift({id:'default', name:S.firm?.firm_name||'My Business'});
  }
  profiles.push({id:pid, name:name.trim()});
  _saveProfiles(profiles);

  // 2 — Save current profile before switching
  save();

  // 3 — Switch active profile id
  S._activeProfileId = pid;
  localStorage.setItem(_ACTIVE_KEY, pid);

  // 4 — Reset state to blank (new business, no data yet)
  S.firm          = null;
  S.customers     = [];
  S.invoices      = [];
  S.purchases     = [];
  S.sales         = [];
  S.expenses      = [];
  S.payments      = [];
  S.inventory     = [];
  S.inv_counters  = {};
  S.inv_categories= [];
  S._profiles     = profiles;
  S._setupNature  = '';
  S._setupGST     = false;
  S._setupBillingType = 'retail';
  S.invForm       = null;

  // 5 — Key stays in memory (same PIN encrypts new profile)
  // Go straight to setup wizard — no PIN re-entry needed
  render();
  toast('New business created — complete setup below', 'info');
};

  if(!S.firm) return;
  const profiles = _getProfiles();

  S._profiles = profiles;
}

window.confirmPanicWipe = function() {
  const answer = prompt(
    'DANGER: This will permanently delete ALL your business data.\n\nType DELETE to confirm:'
  );
  if(answer !== 'DELETE') return;

  // 1 — Wipe localStorage (sync, always works)
  try {
    Object.keys(localStorage).forEach(k => {
      if(k.startsWith('rf_')) localStorage.removeItem(k);
    });
  } catch(e){}

  // 2 — Wipe IndexedDB by deleting the entire database
  //     This is more reliable than deleting keys one by one
  try {
    indexedDB.deleteDatabase('RetailFlowDB');
  } catch(e){}

  // 3 — Reload immediately, no waiting
  location.reload();
};

document.addEventListener('keydown', function(e) {
  const tag = document.activeElement?.tagName?.toLowerCase();
  const inInput = tag==='input'||tag==='textarea'||tag==='select';

  // Esc — close modals / command palette
  if(e.key==='Escape'){
    const ov=document.getElementById('cmd-overlay');
    if(ov&&ov.classList.contains('open')){ closeCmdPalette(); return; }
    if(document.querySelector('.mover')){ e.preventDefault(); const btn=document.querySelector('.mover .ibtn'); if(btn) btn.click(); return; }
    return;
  }
  // Ctrl shortcuts
  if(e.ctrlKey || e.metaKey){
    // Ctrl+K — command palette
    if(e.key==='k'||e.key==='K'){
      e.preventDefault();
      const ov=document.getElementById('cmd-overlay');
      if(ov&&ov.classList.contains('open')) closeCmdPalette();
      else openCmdPalette();
      return;
    }
    // Ctrl+N — new invoice
    if(e.key==='n'||e.key==='N'){
      if(!S.firm) return;
      e.preventDefault();
      S.mode='invoice'; S.tab='create'; S.page='main'; S.viewInv=null; S.invForm=blankInv(); render();
      setTimeout(function(){ const inp=document.getElementById('ic-cn'); if(inp) inp.focus(); },150);
      return;
    }
    // Ctrl+P — print current invoice
    if(e.key==='p'||e.key==='P'){
      if(S.viewInv){ e.preventDefault(); doPrint(S.viewInv.id); return; }
      if(S.thermalInv){ e.preventDefault(); printThermal(S.thermalInv.id); return; }
    }
    // Ctrl+S — save invoice (if on create tab)
    if(e.key==='s'||e.key==='S'){
      if(S.mode==='invoice' && S.tab==='create'){
        e.preventDefault(); saveInvoice(); return;
      }
    }
    // Ctrl+A — select all invoices on list tab
    if(e.key==='a'||e.key==='A'){
      if(S.mode==='invoice' && S.tab==='list' && !inInput){
        e.preventDefault();
        const tbl = document.getElementById('inv-table');
        if(tbl){
          const ids = JSON.parse(tbl.dataset.allids||'[]');
          ids.forEach(function(id){ S.selectedInvs.add(id); });
          render();
        }
        return;
      }
    }
  }
  // ? — show shortcut hints
  if(e.key==='?' && !inInput){
    const hint = document.getElementById('kb-hint');
    if(hint) hint.classList.toggle('show');
  }
});

/* ── PWA: Service Worker + Install Prompt ─────── */
(function initPWA(){
  // Register service worker for offline support
  if('serviceWorker' in navigator){
    // Cache version is derived from APP_BUILD_TS — a timestamp injected
    // at build time (or falls back to APP_URL hash for uniqueness).
    // When the HTML file changes and is redeployed, this value changes,
    // the old cache is purged, and users automatically get the new version.
    const CACHE_VER = typeof APP_BUILD_TS !== 'undefined'
      ? APP_BUILD_TS
      : APP_URL.split('').reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0, 0);

    const swCode = `
const CACHE = 'retailflow-' + ${CACHE_VER};
const CACHE_PREFIX = 'retailflow-';

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(cache =>
      cache.addAll([self.location.origin + '/', self.location.href])
        .catch(()=>{})
    )
  );
  self.skipWaiting();
});

self.addEventListener('activate', e => {
  // Delete ALL old retailflow caches — not just a specific version
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(
        keys
          .filter(k => k.startsWith(CACHE_PREFIX) && k !== CACHE)
          .map(k => {
            console.log('[SW] Deleting old cache:', k);
            return caches.delete(k);
          })
      )
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  if(e.request.method !== 'GET') return;
  // Network-first for HTML (ensures updates land immediately)
  // Cache-first for everything else (fonts, CDN scripts)
  const isHTML = e.request.destination === 'document'
    || e.request.url.endsWith('.html')
    || e.request.url === self.location.origin + '/';

  if(isHTML) {
    e.respondWith(
      fetch(e.request)
        .then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        })
        .catch(() => caches.match(e.request))
    );
  } else {
    e.respondWith(
      caches.match(e.request).then(cached => {
        if(cached) return cached;
        return fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        });
      })
    );
  }
});`;
    const blob = new Blob([swCode], {type:'application/javascript'});
    const swURL = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swURL)
      .then(reg => {
        // Check for updates every time the app loads
        reg.update().catch(()=>{});
      })
      .catch(()=>{});
  }

  // Intercept install prompt and surface it as a topbar button
  window._pwaInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    window._pwaInstallPrompt = e;
    // Show install button if topbar is rendered
    const btn = document.getElementById('pwa-install-btn');
    if(btn) btn.style.display = 'inline-flex';
  });
  window.addEventListener('appinstalled', () => {
    window._pwaInstallPrompt = null;
    const btn = document.getElementById('pwa-install-btn');
    if(btn) btn.style.display = 'none';
    toast('RetailFlow installed on your device!', 'success');
  });
})();

window.triggerPWAInstall = async function() {
  if(!window._pwaInstallPrompt) return;
  window._pwaInstallPrompt.prompt();
  const {outcome} = await window._pwaInstallPrompt.userChoice;
  if(outcome === 'accepted') window._pwaInstallPrompt = null;
};

/* ── INIT ───────────────────────────────────────── */
initApp();
</script>
