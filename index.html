window.applyPayTerms = function(days) {
  days = Number(days);
  if(!days) return;
  const dt = $('ic-dt');
  const base = (dt && dt.value) ? new Date(dt.value) : new Date();
  base.setDate(base.getDate() + days);
  const due = base.toISOString().split('T')[0];
  const dueEl = $('ic-due2');
  if(dueEl){ dueEl.value = due; if(S.invForm) S.invForm.due_date = due; }
  if(S.invForm) S.invForm.payment_terms = days;
};

window.selectCustAC = function(id) {
  const c = S.customers.find(x=>x.id===id); if(!c) return;

  // Fill all known fields from customer master
  const ni=$('ic-cn'), ph=$('ic-cp'), gs=$('ic-cg'), ca=$('ic-ca'), st=$('ic-st');
  if(ni) ni.value = c.name;
  if(ph) ph.value = c.phone||'';
  if(gs) gs.value = c.gstin||'';
  if(ca) ca.value = c.address||'';

  // Auto-derive Place of Supply from buyer GSTIN (first 2 digits = state code)
  const derivedState = stateFromGSTIN(c.gstin||'');
  const pos = $('ic-pos');
  if(pos && derivedState) pos.value = derivedState;

  // Auto-fill payment terms if customer has a saved preference
  if(S.invForm){
    S.invForm.customer_name    = c.name;
    S.invForm.customer_phone   = c.phone||'';
    S.invForm.customer_gstin   = c.gstin||'';
    S.invForm.customer_address = c.address||'';
    if(derivedState) S.invForm.place_of_supply = derivedState;
    if(c.payment_terms) {
      S.invForm.payment_terms  = c.payment_terms;
      // Set due date automatically from payment terms
      const due = new Date(); due.setDate(due.getDate()+c.payment_terms);
      S.invForm.due_date = due.toISOString().split('T')[0];
    }
    if(c.payment_method && c.payment_method!=='cash'){
      S.invForm.payment_method = c.payment_method;
    }
    applyPartyPrice(c.name);
  }

  const drop=$('cust-ac-drop'); if(drop) drop.style.display='none';
  showCustCard(c);
};

function showCustCard(cust) {
  const card=$('cust-card'); if(!card) return;
  const outstanding=Number(cust.outstanding||0);
  const outChip=outstanding>0
    ?`<span class="cc-chip cc-outstanding">&#x26A0;&#xFE0F; \u20B9${fmt(outstanding)} due</span>`
    :`<span class="cc-chip cc-settled">\u2713 Settled</span>`;
  const custInvs=S.invoices
    .filter(i=>(i.customer_phone&&cust.phone&&i.customer_phone===cust.phone)||i.customer_name===cust.name)
    .sort((a,b)=>b.date.localeCompare(a.date));
  const lastVisit=custInvs.length?custInvs[0].date:null;
  const lastChip=lastVisit?`<span class="cc-chip cc-lastvisit">\uD83D\uDD50 ${lastVisit}</span>`:'';
  const itemCount={};
  custInvs.forEach(inv=>(inv.items||[]).forEach(it=>{
    if(it.name) itemCount[it.name]=(itemCount[it.name]||0)+Number(it.qty||1);
  }));
  const topItems=Object.entries(itemCount).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n])=>n);
  const itemsHtml=topItems.length
    ?`<div class="cc-items-label">Quick add from history</div><div class="cc-items">${topItems.map(name=>`<button class="cc-item-btn" onclick='ccAddItem(${JSON.stringify(name)})'>${name}</button>`).join('')}</div>`
    :`<div style="font-size:11px;color:var(--tx2)">No invoice history yet.</div>`;
  card.innerHTML=`<div class="cc-name">${esc(cust.name)}</div><div class="cc-meta">${outChip}${lastChip}${cust.phone?`<span class="cc-chip cc-pm">\uD83D\uDCDE ${esc(cust.phone)}</span>`:''}</div>${itemsHtml}`;
  card.classList.add('show');
}

window.ccAddItem=function(name){
  const invItem=S.inventory.find(i=>i.name===name);
  const rate=invItem?Number(invItem.price||invItem.rate||0):0;

/* ══════════════════════════════════════════════════
   PRINT / PDF  (with UPI QR code)
══════════════════════════════════════════════════ */
function generateQR(text) {
  return new Promise(resolve => {
    if(!text || !window.QRCode){ resolve(''); return; }
    const div = document.createElement('div');
    div.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
    document.body.appendChild(div);
    try {
      new QRCode(div, { text, width:150, height:150, correctLevel:QRCode.CorrectLevel.M });
      // Poll for canvas instead of fixed timeout — more reliable on slow devices
      let attempts = 0;
      const check = () => {
        const canvas = div.querySelector('canvas');
        if(canvas && canvas.width > 0) {
          const url = canvas.toDataURL('image/png');
          document.body.removeChild(div);
          resolve(url);
        } else if(++attempts < 30) {
          setTimeout(check, 50);
        } else {
          if(document.body.contains(div)) document.body.removeChild(div);
          resolve('');
        }
      };
      setTimeout(check, 50);
    } catch(e){ if(document.body.contains(div)) document.body.removeChild(div); resolve(''); }
  });
}

window.doPrint = async function doPrint(id, _sampleInv=null) {
  const inv = _sampleInv || S.invoices.find(i=>i.id===id); if(!inv) return;
  const f = S.firm;
  const isReg = f.gst_registered;
  const isIGST = inv.is_igst||false;
  const t = buildInvTotals(inv.items||[], isReg, isIGST);
  // Open window synchronously (must happen before any await — browsers block popup otherwise)
  const w = window.open('','_blank');
  let qrURL = '';
  if(f.upi_id) {
    const upiStr = `upi://pay?pa=${encodeURIComponent(f.upi_id)}&pn=${encodeURIComponent(f.firm_name)}&am=${inv.total}&cu=INR&tn=${encodeURIComponent(inv.invoice_no)}`;
    qrURL = await generateQR(upiStr);
  }
  const html = printHTML(inv, f, t, isReg, qrURL);
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  if(!w || w.closed) {
    // Popup blocked — offer direct download fallback
    const a = document.createElement('a');
    a.href = url;
    a.download = (inv.invoice_no||'invoice').replace(/\//g,'-') + '.html';
    a.click();
    toast('Popup blocked — invoice downloaded as file. Open it in a browser to print.','warn',6000);
    setTimeout(()=>URL.revokeObjectURL(url), 10000);
    return;
  }
  w.location.href = url;
  setTimeout(()=>URL.revokeObjectURL(url), 60000);
}

function printHTML(inv, f, t, isReg, qrURL) {
  return (f.billing_type||'retail') === 'firm'
    ? printHTML_Firm(inv, f, t, isReg, qrURL)
    : printHTML_Retail(inv, f, t, isReg, qrURL);
}

  if(f.hide_signatory) return ''; // #30 hidden per firm setting
  var h = [];

    h.push('<img src="' + f.digital_sign + '" style="max-height:68px;max-width:150px;margin-bottom:4px;display:block;margin-left:auto">');
  } else {
    h.push('<div style="height:50px"></div>');
  }
  h.push('<div style="border-top:1px solid #1C1915;width:150px;margin-left:auto;padding-top:5px;font-size:10px;color:#7A746C">');
  h.push('<b style="font-size:11px;color:#1C1915">Authorised Signatory For</b><br>' + esc(f.signatory||f.firm_name));
  h.push('</div></div>');
  return h.join('\n');
}

        h.push('<td class="c">' + r + '%</td><td class="r">' + fmt(d.cgst) + '</td>');
        h.push('<td class="c">' + r + '%</td><td class="r">' + fmt(d.sgst) + '</td>');
      }
      h.push('<td class="r" style="font-weight:700">' + fmt(d.gst) + '</td>');
      h.push('</tr>');
    });
    h.push('<tfoot><tr>');
    h.push('<td>Total</td><td class="r">' + fmt(t.totalTaxable) + '</td>');
    if(isIGST){
      h.push('<td></td><td class="r">' + fmt(t.totalGST) + '</td>');
    } else {
      h.push('<td></td><td class="r">' + fmt(r2(t.totalGST/2)) + '</td>');
      h.push('<td></td><td class="r">' + fmt(r2(t.totalGST/2)) + '</td>');
    }
    h.push('<td class="r">' + fmt(t.totalGST) + '</td>');
    h.push('</tr></tfoot></table>');
  }

  // ── Bottom section ──────────────────────────────
  h.push('</div></div>'); // close items-table-wrap + items-section
  h.push('<div class="bottom-section">');

  // Row 1: T&C left | Totals right
  h.push('<div class="bottom-grid">');

  // Left: T&C / Notes
  h.push('<div style="border:1px solid #DDD8CF;border-right:none;padding:8px 10px;min-height:80px;font-size:8.5px;color:#7A746C;line-height:1.7">');
  if(inv.notes){
    h.push('<div style="font-size:7.5px;font-weight:700;color:#1C1915;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Terms &amp; Conditions</div>');
    h.push(esc(inv.notes).replace(/\n/g,'<br>'));
  } else {
    h.push('<div style="font-size:7.5px;font-weight:700;color:#1C1915;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Terms &amp; Conditions</div>');
    h.push('<span style="color:#CCC">—</span>');
  }
  h.push('</div>');

  // Right: Totals
  h.push('<div class="totals-wrap">');
  if(t.totalDisc>0){
    h.push('<div class="totals-row"><span>Sub-Total</span><span>' + fmt(itemSubtotal) + '</span></div>');
    h.push('<div class="totals-row"><span>Discount</span><span style="color:#BF4A2B">− ' + fmt(t.totalDisc) + '</span></div>');
  }
  if(isReg){
    h.push('<div class="totals-row tax"><span>Taxable</span><span>' + fmt(t.totalTaxable) + '</span></div>');
    if(isIGST){
      h.push('<div class="totals-row tax"><span>IGST</span><span>' + fmt(t.totalGST) + '</span></div>');
    } else {
      h.push('<div class="totals-row tax"><span>CGST</span><span>' + fmt(r2(t.totalGST/2)) + '</span></div>');
      h.push('<div class="totals-row tax"><span>SGST</span><span>' + fmt(r2(t.totalGST/2)) + '</span></div>');
    }
    h.push('<div class="totals-row tax"><span>Total GST</span><span>' + fmt(t.totalGST) + '</span></div>');
  } else {
    h.push('<div class="totals-row"><span>Sub-Total</span><span>' + fmt(itemSubtotal) + '</span></div>');
  }
  if(t.invDiscAmt>0) h.push('<div class="totals-row"><span>Inv. Discount</span><span style="color:#BF4A2B">− ' + fmt(t.invDiscAmt) + '</span></div>');
  if(t.extraCharges>0) h.push('<div class="totals-row"><span>' + esc(inv.extra_charges_label||'Extra Charges') + '</span><span>' + fmt(t.extraCharges) + '</span></div>');
  if(t.tcsAmt>0) h.push('<div class="totals-row"><span>TCS</span><span>' + fmt(t.tcsAmt) + '</span></div>');
  if(t.roundOff) h.push('<div class="totals-row"><span>Round Off</span><span>' + (t.roundOff>=0?'+':'') + fmt(t.roundOff) + '</span></div>');
  h.push('<div class="grand-row"><span class="gl">Grand Total</span><span class="ga">' + fmt(inv.total) + '</span></div>');
  h.push('</div>');

  h.push('</div>'); // close bottom-grid

  // Row 2: Amount in Words
  if(ps(f,'ps_show_words')) h.push('<div class="words-box"><div class="words-lbl">Amount in Words</div>' + words + '</div>');

  // Partial notice
  if(inv.is_partial){
    h.push('<div class="partial-notice">⚠️ Partial Payment — Received: ' + fmt(inv.partial_amount) + ' &nbsp;|&nbsp; Balance: ' + fmt(r2(inv.total-(inv.partial_amount||0))) + '</div>');
  }

  // Row 3: Bank | QR | Signature
  h.push('<div class="footer-section">');
  if(hasBank && ps(f,'ps_show_bank')){
    h.push('<div class="bank-box"><div class="bhead">Bank / Payment Details</div>');
    h.push('Beneficiary: <b>' + esc(f.bank_name||f.firm_name) + '</b><br>');
    h.push('A/c: <b>' + esc(f.bank_acc) + '</b> &nbsp;|&nbsp; IFSC: <b>' + esc(f.bank_ifsc) + '</b>');
    if(f.bank_branch) h.push('<br>Bank: ' + esc(f.bank_branch));
    if(f.upi_id) h.push('<br>UPI: <b>' + esc(f.upi_id) + '</b>');
    h.push('</div>');
  } else if(f.upi_id){
    h.push('<div class="bank-box"><div class="bhead">Payment</div>UPI: <b>' + esc(f.upi_id) + '</b></div>');
  } else {
    h.push('<div></div>');
  }
  if(qrURL && ps(f,'ps_show_qr')) h.push('<div class="qr-box"><img src="' + qrURL + '" alt="UPI QR"><div>Scan to Pay<br><b>' + esc(f.upi_id) + '</b></div></div>');
  // ── E-Invoice IRN + E-Way Bill on print ─────────
  if(inv.irn) {
    h.push('<div class="irn-block" style="border:1px solid #ccc;border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:9px;background:#f9f9f9">');
    h.push('<b style="color:#1a2744;font-size:9.5px">E-Invoice Details</b><br>');
    h.push('IRN: <span style="font-family:monospace;font-size:8.5px">' + esc(inv.irn) + '</span><br>');
    if(inv.ack_no)  h.push('Ack No.: ' + esc(inv.ack_no) + ' &nbsp;|&nbsp; Ack Date: ' + fmtDate(inv.ack_dt));
    h.push('</div>');
  }
  if(inv.ewb_no) {
    h.push('<div style="border:1px solid #ccc;border-radius:6px;padding:7px 12px;margin-bottom:10px;font-size:9px;background:#f9f9f9">');
    h.push('<b style="color:#1a2744;font-size:9.5px">E-Way Bill</b><br>');
    h.push('EWB No.: <b>' + esc(inv.ewb_no) + '</b> &nbsp;|&nbsp; Date: ' + fmtDate(inv.ewb_date));
    if(inv.ewb_valid_till) h.push(' &nbsp;|&nbsp; Valid till: ' + fmtDate(inv.ewb_valid_till));
    if(inv.ewb_transporter) h.push('<br>Transporter: ' + esc(inv.ewb_transporter));
    h.push('</div>');
  }
  if(ps(f,'ps_show_signatory')){
    var sb = [];
    sb.push('<div class="sign-block">');
    if(f.digital_sign && ps(f,'ps_show_digital_sign')) sb.push('<img src="' + f.digital_sign + '">');
    else sb.push('<div style="height:50px"></div>');
    sb.push('<div class="sign-line"><b>Authorised Signatory For</b><br>' + esc(f.signatory||f.firm_name) + '</div>');
    sb.push('</div>');
    h.push(sb.join(''));
  }
  h.push('</div>');

  // Row 4: Footer note
  h.push('<div class="fo">');
  h.push('Computer Generated Invoice &nbsp;|&nbsp; ' + esc(f.firm_name));
  if(f.gstin) h.push(' &nbsp;|&nbsp; GSTIN: ' + esc(f.gstin));
  h.push(' &nbsp;|&nbsp; E. &amp; O.E.');
  if(f.state) h.push(' &nbsp;|&nbsp; ' + esc(f.state) + ' Jurisdiction');
  h.push('</div>');
  if(ps(f,'ps_show_powered') && !f.hide_powered) h.push('<div style="font-size:6.5px;color:#bbb;text-align:center;margin-top:2px">Made with <b style="color:#BF4A2B">RetailFlow</b> &nbsp;·&nbsp; ' + APP_URL + '</div>');
  if(ps(f,'ps_show_page_no')) h.push('<div style="font-size:7px;color:#aaa;text-align:right;margin-top:2px">Page 1 / 1</div>');

  h.push('</div>'); // close bottom-section
  h.push('</div></div>'); // inner, frame
  h.push('<script>window.onload=function(){window.print();}<\/script>');
  h.push('</body></html>');
  return h.join('\n');
}

  h.push('</div>');

  h.push('</div>'); // close bottom-grid

  if(ps(f,'ps_show_words')) h.push('<div class="words-box"><div class="words-lbl">Amount in Words</div>' + words + '</div>');

  if(inv.is_partial){
    h.push('<div class="partial-notice">⚠️ Partial — Received: ' + fmt(inv.partial_amount) + ' &nbsp;|&nbsp; Balance: ' + fmt(r2(inv.total-(inv.partial_amount||0))) + '</div>');

  // Row 4: Footer note

  h.push('</div>'); // close page-body
  h.push('<script>window.onload=function(){window.print();}<\/script>');
  h.push('</body></html>');
  return h.join('\n');

function buildWAMsg(inv) {
  const f = S.firm; const isReg = f.gst_registered;
  const t = buildInvTotals(inv.items||[], isReg, inv.is_igst||false, {inv_discount:inv.inv_discount,inv_discount_type:inv.inv_discount_type,extra_charges:inv.extra_charges,tcs_rate:inv.tcs_rate,round_off:inv.round_off});
  const lines = inv.items.map(it=>{const c=calcItem(it,isReg);return`  • *${it.name}* — ${it.qty}×${fmt(it.rate)}${it.discount?` -${it.discount}%`:''}${isReg?` (+${it.gst_rate}% GST)`:''} = *${fmt(c.total)}*`;}).join('\n');
  return `*${f.firm_name}*\n`+
    `━━━━━━━━━━━━━━━━━\n`+
    `Namaste 🙏\n\n`+
    `Please find your *Invoice* details below:\n\n`+
    `Invoice No: *${inv.invoice_no}*\n`+
    `Date: *${fmtDate(inv.date)}*\n`+
    `${inv.customer_name?`Customer: *${inv.customer_name}*\n`:''}`+
    `${inv.due_date?`Due Date: *${fmtDate(inv.due_date)}*\n`:''}`+
    `━━━━━━━━━━━━━━━━━\n`+
    `*Items:*\n${lines}\n`+

window.sendWAInv = id => {
  const inv = S.invoices.find(i=>i.id===id); if(!inv) return;
  const ph = ($('wa-ph')?.value||inv.customer_phone||'').replace(/\D/g,'');
  if(!ph){ alert('Enter phone number'); return; }
  const num = ph.startsWith('91')?ph:'91'+ph;
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(buildWAMsg(inv))}`,'_blank');
};
window.copyWAMsg = id => {
  const inv = S.invoices.find(i=>i.id===id); if(!inv) return;
  navigator.clipboard.writeText(buildWAMsg(inv)).then(()=>alert('Copied!')).catch(()=>{});
};

function renderBusiness() {
  const invRevenue = S.invoices.reduce((a,i)=>a+Number(i.total),0);
  const tS = r2(invRevenue + S.sales.reduce((a,i)=>a+Number(i.amount),0));
  const tP = r2(S.purchases.reduce((a,i)=>a+Number(i.amount),0));
  const tE = r2(S.expenses.reduce((a,i)=>a+Number(i.amount),0));
  const cC = S.customers.filter(c=>Number(c.outstanding)>0);
  const tC = r2(cC.reduce((a,c)=>a+Number(c.outstanding),0));

  // Redirect old tab keys to new ones
  const tabMap = {purchases:'txn', sales:'reports', expenses:'txn', credit:'money', payments:'money', analytics:'reports'};
  if(tabMap[S.bizTab]) S.bizTab = tabMap[S.bizTab];

  const tabs = [
    ['dash','📊 Today'],
    ['txn','📦 Transactions'],
    ['po',`📋 PO (${(S.purchase_orders||[]).filter(p=>p.status==='open').length})`],
    ['money',`💰 Money${cC.length>0?' ('+cC.length+')':''}`],
    ['reports','📈 Reports'],
    ['ca','🧾 CA Reports'],
    ['ledger','📒 Ledger'],
    ['audit','🔍 Audit Log'],
    ['payroll','💰 Payroll'],
  ];
  return `<div class="sh">
    <div><div class="st">Business</div><div class="sb">Revenue ${fmt(tS)} · Profit ${fmt(r2(tS-tP-tE))}</div></div>
    <button class="btn bgho bsm" onclick="exportAll()">⬇️ Export CSV</button>
  </div>
  <div class="tabs">
    ${tabs.map(([k,v])=>`<button class="tab${S.bizTab===k?' on':''}" onclick="swBiz('${k}')">${v}</button>`).join('')}
  </div>
  ${{
    dash:   ()=>renderDash(tS,tP,tE),
    txn:    ()=>renderTransactions(tP,tE),
    money:  ()=>renderMoney(cC,tC),
    reports:()=>renderReports(tS,tP,tE),
    ca:     ()=>renderCAReports(),
    ledger: ()=>renderPartyLedger(),
    audit:  ()=>renderAuditLog(),
    po:     ()=>renderPOTab(),
    payroll:()=>renderPayrollView(),
  }[S.bizTab]?.() || renderDash(tS,tP,tE)}`;

function renderDash(tS,tP,tE){
  const profit = r2(tS-tP-tE);
  const margin = tS>0 ? r2((profit/tS)*100) : 0;
  const todayStr = today();
  const thisM = todayStr.slice(0,7);

  // Time-aware greeting
  const hr = new Date().getHours();
  const greetWord = hr<12 ? 'Good morning' : hr<17 ? 'Good afternoon' : 'Good evening';
  const greetEmoji = hr<12 ? '☀️' : hr<17 ? '🌤️' : '🌙';
  const ownerName = S.firm?.proprietor || S.firm?.firm_name || '';
  const firstName = ownerName.split(' ')[0];

  // Today
  const todayInvs = S.invoices.filter(i=>i.date===todayStr);
  const todayAmt  = r2(todayInvs.reduce((a,i)=>a+Number(i.total),0));
  const todayPaid = r2(todayInvs.filter(i=>i.status==='paid').reduce((a,i)=>a+Number(i.total),0)
    + todayInvs.filter(i=>i.status==='partial').reduce((a,i)=>a+Number(i.partial_amount||0),0));
  const todayCredit = r2(todayAmt - todayPaid);

  // This month
  const mInvs   = S.invoices.filter(i=>i.date&&i.date.startsWith(thisM));
  const mAmt    = r2(mInvs.reduce((a,i)=>a+Number(i.total),0));
  const mExp    = r2(S.expenses.filter(e=>e.date&&e.date.startsWith(thisM)).reduce((a,e)=>a+Number(e.amount),0));
  const mPurch  = r2(S.purchases.filter(p=>p.date&&p.date.startsWith(thisM)).reduce((a,p)=>a+Number(p.amount),0));
  const mProfit = r2(mAmt-mExp-mPurch);

  // Alerts
  const lowStock    = S.inventory.filter(i=>Number(i.stock)<=5);
  const unpaidCount = S.invoices.filter(i=>i.status==='unpaid').length;
  const unpaidAmt   = r2(S.invoices.filter(i=>i.status==='unpaid').reduce((a,i)=>a+Number(i.total),0));
  const overdueCount= S.customers.filter(c=>c.due_date&&c.due_date<todayStr&&Number(c.outstanding)>0).length;

  // 6 recent invoices
  const recentInvs  = S.invoices.slice(0,6);

  // First invoice hero — shown only until first invoice created
  const firstInvHero = S.invoices.length===0 ? `
  <div style="background:linear-gradient(135deg,var(--acc) 0%,#E07A5F 100%);border-radius:16px;padding:22px 20px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden">
    <div style="position:absolute;right:-10px;top:-10px;font-size:80px;opacity:.15;line-height:1">🧾</div>
    <div style="font-size:11px;font-weight:700;letter-spacing:1px;opacity:.8;text-transform:uppercase;margin-bottom:6px">Get started</div>
    <div style="font-family:var(--ffd);font-size:22px;font-weight:700;margin-bottom:6px">Create your first invoice</div>
    <div style="font-size:12px;opacity:.85;margin-bottom:16px;line-height:1.6">Your business is set up. Bill your first customer in under 60 seconds.</div>
    <button onclick="swMode('invoice')" style="background:#fff;color:var(--acc);border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--ff);display:inline-flex;align-items:center;gap:7px">
      🧾 Create Invoice →
    </button>
  </div>` : '';

  return `
  <div class="dash-greeting">${greetWord}, <span>${esc(firstName)}</span> ${greetEmoji}</div>
  <div class="dash-sub">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
  ${firstInvHero}
  ${lowStock.length>0?`<div class="low-stk-strip"><span style="font-size:18px">⚠️</span><div><div class="fw6 fs12" style="color:var(--ylw)">${lowStock.length} item${lowStock.length>1?'s':''} low on stock</div><div class="lsi">${lowStock.map(i=>esc(i.name)+' ('+i.stock+' left)').join(' · ')}</div></div><button class="btn bgho bsm" style="margin-left:auto" onclick="swMode('inventory')">View →</button></div>`:''}
  ${overdueCount>0?`<div class="alert awrn" style="margin-bottom:10px">⚠️ <b>${overdueCount} overdue</b> customer${overdueCount>1?'s':''} — <button class="btn bdng bsm" onclick="swBiz('money')">Collect now →</button></div>`:''}

  <!-- Today snapshot -->
  <div class="card mb14" style="border-left:3px solid var(--acc)">
    <div class="fs11 fw6 tx2 mb10" style="text-transform:uppercase;letter-spacing:.5px">Today — ${fmtDate(todayStr)}</div>
    <div class="g4">
      <div><div class="fs11 tx2 mb2">Invoices</div><div style="font-family:var(--ffd);font-size:22px;color:var(--acc)">${todayInvs.length}</div></div>
      <div><div class="fs11 tx2 mb2">Billed</div><div style="font-family:var(--ffd);font-size:22px">${fmt(todayAmt)}</div></div>
      <div><div class="fs11 tx2 mb2">Collected</div><div style="font-family:var(--ffd);font-size:22px;color:var(--grn)">${fmt(todayPaid)}</div></div>
      <div><div class="fs11 tx2 mb2">On Credit</div><div style="font-family:var(--ffd);font-size:22px;color:${todayCredit>0?'var(--red)':'var(--tx)'}">${fmt(todayCredit)}</div></div>
    </div>
    ${todayInvs.length===0?`<div class="tx2 fs12 mt8">No invoices today yet — <button class="btn bpri bsm" onclick="swMode('invoice')">Create one →</button></div>`:''}
  </div>

  <!-- KPI row -->
  <div class="g4 mb14">
    <div class="sc" style="border-left:3px solid var(--acc)">
      <div class="sl">This Month</div>
      <div class="sv txacc">${fmt(mAmt)}</div>
      <div class="ss">${mInvs.length} invoices · ${monthLabel(thisM+'-01')}</div>
    </div>
    <div class="sc" style="border-left:3px solid ${mProfit>=0?'var(--grn)':'var(--red)'}">
      <div class="sl">Month Profit</div>
      <div class="sv" style="color:${mProfit>=0?'var(--grn)':'var(--red)'}">${fmt(mProfit)}</div>
      <div class="ss">${fmt(r2(mExp+mPurch))} costs</div>
    </div>
    <div class="sc" style="border-left:3px solid ${unpaidAmt>0?'var(--red)':'var(--grn)'}">
      <div class="sl">Pending Collection</div>
      <div class="sv ${unpaidAmt>0?'txred':''}">${fmt(unpaidAmt)}</div>
      <div class="ss">${unpaidCount} unpaid invoice${unpaidCount!==1?'s':''}</div>
    </div>
    <div class="sc" style="border-left:3px solid ${profit>=0?'var(--grn)':'var(--red)'}">
      <div class="sl">All-time Profit</div>
      <div class="sv" style="color:${profit>=0?'var(--grn)':'var(--red)'}">${fmt(profit)}</div>
      <div class="ss">${margin}% net margin</div>
    </div>
  </div>

  <!-- P&L bar -->
  <div class="card mb14">
    <div class="ctitle mb8">P&amp;L Overview</div>
    <div class="row jbet fs12 mb4"><span class="tx2">Revenue</span><span class="fw6 txacc">${fmt(tS)}</span></div>
    <div class="pl-bar"><div class="pl-fill" style="width:100%;background:var(--acc)"></div></div>
    <div class="row jbet fs12 mb4 mt8"><span class="tx2">Purchases</span><span class="fw6">${fmt(tP)}</span></div>
    <div class="pl-bar"><div class="pl-fill" style="width:${tS>0?Math.min(100,Math.round((tP/tS)*100)):0}%;background:var(--blu)"></div></div>
    <div class="row jbet fs12 mb4 mt8"><span class="tx2">Expenses</span><span class="fw6 txred">${fmt(tE)}</span></div>
    <div class="pl-bar"><div class="pl-fill" style="width:${tS>0?Math.min(100,Math.round((tE/tS)*100)):0}%;background:var(--red)"></div></div>
    <hr style="margin:10px 0">
    <div class="row jbet fs13"><span class="fw6">Net Profit</span><span class="fw6" style="color:${profit>=0?'var(--grn)':'var(--red)'}">${fmt(profit)} (${margin}%)</span></div>
  </div>

  <!-- Recent invoices -->
  ${recentInvs.length>0?`<div class="card">
    <div class="row jbet mb10">
      <div class="ctitle" style="margin-bottom:0">Recent Invoices</div>
      <button class="btn bgho bsm" onclick="swMode('invoice');swTab('list')">See all →</button>
    </div>
    ${recentInvs.map(inv=>`<div class="row jbet" style="padding:8px 0;border-bottom:1px solid var(--bor);gap:8px;flex-wrap:wrap">
      <div style="min-width:0">
        <div class="fw6 fs13">${esc(inv.customer_name||'Walk-in')} <span class="tx2 fw4 fs11">· ${esc(inv.invoice_no)}</span></div>
        <div class="tx2 fs11">${fmtDate(inv.date)}</div>
      </div>
      <div class="row" style="gap:6px;align-items:center;flex-shrink:0">
        <span class="bdg ${pb(inv.status||'paid')}">${(inv.status||'paid').toUpperCase()}</span>
        <span class="fw6">${fmt(inv.total)}</span>
        <button class="btn bpri bsm" onclick="doPrint('${inv.id}')" title="Print">🖨️</button>
        ${inv.status==='unpaid'||inv.status==='partial'?`<button class="btn bgrn bsm" onclick="markInvPaid('${inv.id}')">✓ Collect</button>`:''}
      </div>
    </div>`).join('')}
  </div>`:''}`;
}
}

  const purchForm = `<div class="card mb14">

      <div class="fld"><label>Date</label><input id="p-dt" type="date" value="${pf.date}"></div>

      </div>
    </div>
    ${S.firm.gst_registered?`<div class="fld" style="max-width:180px"><label>GST Rate</label>

    <button class="btn bpri" onclick="savePurch()">Add Purchase</button>
  </div>`;

  const expForm = `<div class="card mb14">
    <div class="ctitle">💸 Add Expense</div>
    <div class="g2">
      <div class="fld"><label>Category</label>
        <select id="ef-cat">${EXP_CATS.map(c=>`<option value="${c}"${c===ef.category?' selected':''}>${c}</option>`).join('')}</select>
      </div>
      <div class="fld">

        <input id="ef-am" type="number" placeholder="0" value="${esc(ef.amount)}">
      </div>
    </div>
    <div class="g2">
      <div class="fld">
        <label>Description</label>
        <input id="ef-desc" placeholder="${(()=>{const last=S.expenses.filter(e=>e.category===ef.category).sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0];return last&&last.description?'e.g. '+esc(last.description):'e.g. August rent';})()}" value="${esc(ef.description)}" list="ef-desc-ac">
        <datalist id="ef-desc-ac">${[...new Set(S.expenses.filter(e=>e.category===ef.category).map(e=>e.description).filter(Boolean))].map(d=>`<option value="${esc(d)}">`).join('')}</datalist>
      </div>
      <div class="fld"><label>Date</label><input id="ef-dt" type="date" value="${ef.date}"></div>

      <tfoot><tr><td colspan="3" class="fw6 fs12">Total</td><td class="fw6 txred">${fmt(tExp)}</td><td></td></tr></tfoot>
      </table></div>`;

  return `<div class="g2">
    <div>${purchForm}${purchList}</div>
    <div>${expForm}${expList}</div>
  </div>
  <div class="row mt10" style="gap:8px;justify-content:flex-end">
    <button class="btn bgho bsm" onclick="exportCSV('purchases')">⬇️ Purchases CSV</button>
    <button class="btn bgho bsm" onclick="exportCSV('expenses')">⬇️ Expenses CSV</button>
  </div>`;
}

window.swSalesTab = function(t) {};

function renderSalesTab(){

  return renderTransactions(0,0);
  var tab = S._salesTab || 'analytics';

  // Build normalised list from invoices
  var fyF = S.fyFilter !== 'all' ? S.fyFilter : null;
  var invSales = S.invoices
    .filter(function(i){ return !fyF || i.fy === fyF; })
    .map(function(i){ return {
      source:'invoice', id:i.id, invoice_no:i.invoice_no||'—',
      customer:i.customer_name||'', date:i.date||'',
      fy:i.fy||'', payment_type:i.payment_method||'cash',
      amount:Number(i.total||0), status:i.status||'paid',
      is_partial:i.is_partial, partial_amount:Number(i.partial_amount||0)
    };});

  // Manual quick-entry sales
  var manSales = S.sales.filter(function(s){ return !fyF || s.fy === fyF; });

  // Combined for analytics
  var allSales = invSales.concat(manSales.map(function(s){ return {
    source:'manual', id:s.id, invoice_no:'—', customer:s.customer||'',
    date:s.date||'', fy:s.fy||'', payment_type:s.payment_type||'cash',
    amount:Number(s.amount||0), status:'paid', is_partial:false, partial_amount:0
  };}));

  var totalRev = r2(allSales.reduce(function(a,s){ return a+s.amount; }, 0));
  var invRev   = r2(invSales.reduce(function(a,s){ return a+s.amount; }, 0));
  var manRev   = r2(manSales.reduce(function(a,s){ return a+Number(s.amount||0); }, 0));

  // Tab bar — built with string concat, no nested template literals
  var tabDefs = [
    ['analytics','📊 Analytics'],
    ['invoiced','🧾 Invoice Sales ('+invSales.length+')'],
    ['manual','✏️ Quick Entry ('+S.sales.length+')']
  ];
  var tabBar = '<div class="tabs" style="margin-bottom:14px">' +
    tabDefs.map(function(td){
      var k=td[0], v=td[1];
      return '<button class="tab'+(tab===k?' on':'')+
             '" onclick="swSalesTab(\''+k+'\')">' + v + '</button>';
    }).join('') + '</div>';

  /* ── ANALYTICS TAB ─────────────────────────────── */
  if(tab === 'analytics'){
    var byMonth = {};
    allSales.forEach(function(s){
      var m = (s.date||'').slice(0,7)||'?';
      if(!byMonth[m]) byMonth[m]={total:0,count:0,cash:0,upi:0,credit:0,cheque:0,other:0};
      byMonth[m].total = r2(byMonth[m].total + s.amount);
      byMonth[m].count++;
      var pt = s.payment_type||'cash';
      byMonth[m][pt] = r2((byMonth[m][pt]||0) + s.amount);
    });
    var months = Object.keys(byMonth).sort().reverse();
    var maxAmt = Math.max.apply(null, [1].concat(months.map(function(m){ return byMonth[m].total; })));

    var pmSplit = {cash:0,upi:0,credit:0,cheque:0,other:0};
    allSales.forEach(function(s){ var pt=s.payment_type||'cash'; pmSplit[pt]=r2((pmSplit[pt]||0)+s.amount); });

    var pmBars = Object.entries(pmSplit).filter(function(x){ return x[1]>0; })

          +'<div class="row jbet fs12 mb3"><span>'+(pmLabels[pt]||pt.toUpperCase())+'</span>'

    var custBars = topCusts.length===0 ? '<div class="tx2 fs12">No customers yet</div>'

  /* ── INVOICE SALES TAB (auto-derived) ────────────── */

  return tabBar
    + '<div class="alert ainfo mb14">✏️ Use this for <b>counter sales that don\'t need a formal invoice</b>. Invoiced sales are tracked automatically in 🧾 Invoice Sales.</div>'

/* ══════════════════════════════════════════════════
   CHART ENGINE — Pure SVG, no dependencies
══════════════════════════════════════════════════ */
function fmtK(n) {
  var a = Math.abs(n);
  if(a >= 1e5) return (n/1e5).toFixed(1)+'L';
  if(a >= 1e3) return (n/1e3).toFixed(0)+'K';
  return Math.round(n).toString();
}

function svgGroupedBar(groups, labels, colors) {
  if(!groups || !groups.length) return '<div class="tx2 fs12" style="padding:30px 0;text-align:center">No data for this period</div>';
  var W=620, H=210, PL=54, PR=10, PT=14, PB=44;
  var cW=W-PL-PR, cH=H-PT-PB;
  var nS=labels.length, n=groups.length;
  var allV=groups.reduce(function(a,g){return a.concat(g.values);},[]);
  var maxV=Math.max(1,Math.max.apply(null,allV));
  var gW=cW/Math.max(n,1);
  var bW=Math.max(4, Math.floor(gW*0.72/nS)-2);
  var yL='',yT='',bars='',xT='';
  for(var i=0;i<=4;i++){
    var yv=PT+cH*(1-i/4);
    var val=maxV*i/4;
    yL+='<line x1="'+PL+'" y1="'+yv.toFixed(1)+'" x2="'+(W-PR)+'" y2="'+yv.toFixed(1)+'" stroke="var(--bor)" stroke-dasharray="2,3" opacity=".5"/>';
    yT+='<text x="'+(PL-4)+'" y="'+(yv+3.5).toFixed(1)+'" text-anchor="end" font-size="9" fill="var(--tx2)">'+fmtK(val)+'</text>';
  }
  groups.forEach(function(g,gi){
    var gcx=PL+(gi+0.5)*gW;
    var totalW=nS*(bW+2)-2;
    var sx=gcx-totalW/2;
    g.values.forEach(function(val,si){
      var bh=Math.max(1,Math.round((val/maxV)*cH));
      var bx=sx+si*(bW+2);
      var by=PT+cH-bh;
      bars+='<rect x="'+bx.toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+bW+'" height="'+bh+'" fill="'+colors[si]+'" rx="2" opacity=".88">'
           +'<title>'+labels[si]+': '+fmt(val)+'</title></rect>';
    });
    var lbl=g.label;
    xT+='<text x="'+gcx.toFixed(1)+'" y="'+(H-6)+'" text-anchor="middle" font-size="9" fill="var(--tx2)">'+lbl+'</text>';
  });
  var leg=''; labels.forEach(function(lbl,i){
    leg+='<div class="chart-leg-item"><div class="chart-leg-dot" style="background:'+colors[i]+'"></div>'+lbl+'</div>';
  });
  return '<div class="chart-wrap"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;min-width:300px;height:auto;display:block;overflow:visible">'
    +yL+yT+bars+xT+'</svg></div>'
    +'<div class="chart-legend">'+leg+'</div>';
}

function svgDonut(slices) {
  var sz=170, cx=sz/2, cy=sz/2, r=sz*0.39, ri=sz*0.25;
  var total=slices.reduce(function(a,s){return a+s.value;},0);
  if(total===0) return '<svg viewBox="0 0 '+sz+' '+sz+'" style="width:100%;max-width:'+sz+'px"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--bor)" stroke-width="'+(r-ri)+'"/><text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" font-size="11" fill="var(--tx2)">No data</text></svg>';
  var ang=-Math.PI/2, paths='';
  slices.forEach(function(s){
    var a=(s.value/total)*2*Math.PI;
    var ea=ang+a;
    var x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
    var x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
    var xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang);
    var xi2=cx+ri*Math.cos(ea),yi2=cy+ri*Math.sin(ea);
    var lg=a>Math.PI?1:0;
    var pct=Math.round((s.value/total)*100);
    paths+='<path d="M'+x1.toFixed(2)+','+y1.toFixed(2)+' A'+r+','+r+' 0 '+lg+',1 '+x2.toFixed(2)+','+y2.toFixed(2)
          +' L'+xi2.toFixed(2)+','+yi2.toFixed(2)+' A'+ri+','+ri+' 0 '+lg+',0 '+xi1.toFixed(2)+','+yi1.toFixed(2)+' Z"'
          +' fill="'+s.color+'" opacity=".9"><title>'+s.label+': '+fmt(s.value)+' ('+pct+'%)</title></path>';
    ang=ea;
  });
  return '<svg viewBox="0 0 '+sz+' '+sz+'" style="width:100%;max-width:'+sz+'px;height:auto;display:block">'+paths
    +'<text x="'+cx+'" y="'+(cy-3)+'" text-anchor="middle" font-size="9" fill="var(--tx2)">Total</text>'
    +'<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" font-size="11" font-weight="600" fill="var(--tx)">'+fmtK(total)+'</text>'
    +'</svg>';
}

function svgLine(points) {
  if(!points||points.length<2) return '<div class="tx2 fs12" style="padding:20px;text-align:center">Need more periods</div>';
  var W=620,H=140,PL=54,PR=10,PT=12,PB=28;
  var cW=W-PL-PR,cH=H-PT-PB;
  var vals=points.map(function(p){return p.v;});
  var maxV=Math.max(1,Math.max.apply(null,vals));
  var n=points.length;
  var pts=points.map(function(p,i){
    return [PL+i/(n-1)*cW, PT+cH*(1-p.v/maxV)];
  });
  var lp='M'+pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' L');
  var ap=lp+' L'+pts[n-1][0].toFixed(1)+','+(PT+cH)+' L'+PL+','+(PT+cH)+' Z';
  var yL='',yT='',xT='',dots='';
  for(var i=0;i<=3;i++){
    var yv=PT+cH*(1-i/3); var val=maxV*i/3;
    yL+='<line x1="'+PL+'" y1="'+yv.toFixed(1)+'" x2="'+(W-PR)+'" y2="'+yv.toFixed(1)+'" stroke="var(--bor)" stroke-dasharray="2,3" opacity=".5"/>';
    yT+='<text x="'+(PL-4)+'" y="'+(yv+3.5).toFixed(1)+'" text-anchor="end" font-size="9" fill="var(--tx2)">'+fmtK(val)+'</text>';
  }
  var step=Math.ceil(n/8);
  points.forEach(function(p,i){
    if(i%step===0||i===n-1)
      xT+='<text x="'+pts[i][0].toFixed(1)+'" y="'+(H-4)+'" text-anchor="middle" font-size="9" fill="var(--tx2)">'+p.l+'</text>';
  });
  pts.forEach(function(p,i){
    dots+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="var(--acc)" opacity=".85">'
         +'<title>'+points[i].l+': '+fmt(points[i].v)+'</title></circle>';
  });
  return '<div class="chart-wrap"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;min-width:280px;height:auto;display:block;overflow:visible">'
    +'<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--acc)" stop-opacity=".22"/><stop offset="100%" stop-color="var(--acc)" stop-opacity=".02"/></linearGradient></defs>'
    +yL+yT+'<path d="'+ap+'" fill="url(#ag)"/>'
    +'<path d="'+lp+'" fill="none" stroke="var(--acc)" stroke-width="2.5" stroke-linejoin="round"/>'
    +dots+xT+'</svg></div>';
}

/* ── DATA AGGREGATION ──────────────────────────── */
function getBucket(dateStr, period) {
  if(!dateStr) return null;
  var d=new Date(dateStr+'T00:00:00'), y=d.getFullYear(), mo=d.getMonth();
  if(period==='monthly') return y+'-'+String(mo+1).padStart(2,'0');
  if(period==='quarterly') {
    var fyY=mo>=3?y:y-1;
    var q=mo>=3?Math.floor((mo-3)/3)+1:4;
    return fyY+'-Q'+q;
  }
  if(period==='halfyearly') {
    var fyY2=mo>=3?y:y-1;
    return fyY2+'H'+(mo>=3&&mo<=8?1:2);
  }
  return getFY(dateStr); // annual
}

function bucketLabel(key, period) {
  if(period==='monthly') {
    var parts=key.split('-');
    if(parts.length<2) return key;
    return monthLabel(key+'-01').replace(' ','\'').slice(0,7);
  }
  if(period==='quarterly') return key.replace('-',' ');
  if(period==='halfyearly') {
    var idx=key.indexOf('H');
    if(idx<0) return key;
    return 'H'+key.slice(idx+1)+' '+key.slice(0,idx).slice(2);
  }
  return key; // annual
}

function getAggData(period) {
  var fy=S.fyFilter!=='all'?S.fyFilter:null;
  var bkts={};
  function add(bkts,key,field,amt) {
    if(!key) return;
    if(!bkts[key]) bkts[key]={rev:0,exp:0,purch:0};
    bkts[key][field]=r2(bkts[key][field]+amt);
  }
  S.invoices.filter(function(i){return !fy||i.fy===fy;}).forEach(function(i){
    add(bkts,getBucket(i.date,period),'rev',Number(i.total||0));
  });
  S.sales.filter(function(s){return !fy||s.fy===fy;}).forEach(function(s){
    add(bkts,getBucket(s.date,period),'rev',Number(s.amount||0));
  });
  S.expenses.filter(function(e){return !fy||e.fy===fy;}).forEach(function(e){
    add(bkts,getBucket(e.date,period),'exp',Number(e.amount||0));
  });
  S.purchases.filter(function(p){return !fy||p.fy===fy;}).forEach(function(p){
    add(bkts,getBucket(p.date,period),'purch',Number(p.amount||0));
  });
  return Object.entries(bkts).sort(function(a,b){return a[0]<b[0]?-1:1;}).map(function(e){
    var k=e[0], v=e[1];
    var cost=r2(v.exp+v.purch), profit=r2(v.rev-cost);
    return {key:k, label:bucketLabel(k,period), rev:v.rev, exp:v.exp, purch:v.purch, cost:cost, profit:profit};
  });
}

  var periodSel='<div class="frow mb14">'

      return '<button class="fbtn'+(period===e[0]?' on':'')+'" onclick="setAnalyticsPeriod(\''+e[0]+'\')">'
        +e[1]+'</button>';
    }).join('')
    +'</div>';

  var tabBar='<div class="tabs mb14">'
    +[['performance','📈 Performance'],['breakdown','🥧 Breakdown'],['customers','👥 Customers']].map(function(t){
      return '<button class="tab'+(aTab===t[0]?' on':'')+'" onclick="setAnalyticsTab(\''+t[0]+'\')">'

  var data=getAggData(period);

  var totCost=r2(data.reduce(function(a,d){return a+d.cost;},0));
  var totProfit=r2(totRev-totCost);
  var margin=totRev>0?r2((totProfit/totRev)*100):0;

  if(aTab==='performance') {
    var barGroups=data.map(function(d){return {label:d.label,values:[d.rev,d.cost,d.profit>=0?d.profit:0]};});
    var lossGroups=data.map(function(d){return {label:d.label,values:[Math.abs(d.profit<0?d.profit:0)]};});
    var chart=svgGroupedBar(barGroups,['Revenue','Total Cost','Profit'],['var(--acc)','var(--red)','var(--grn)']);
    var trendPts=data.map(function(d){return {l:d.label,v:d.rev};});
    var trend=svgLine(trendPts);
    var profitPts=data.map(function(d){return {l:d.label,v:d.profit};});

    // Period summary table
    var tblRows=data.map(function(d){
      return '<tr>'
        +'<td class="fw6 fs11">'+esc(d.label)+'</td>'
        +'<td class="txacc fw6">'+fmt(d.rev)+'</td>'
        +'<td class="tx2">'+fmt(d.purch)+'</td>'
        +'<td class="txred">'+fmt(d.exp)+'</td>'
        +'<td class="fw6" style="color:'+(d.profit>=0?'var(--grn)':'var(--red)')+'">'+fmt(d.profit)+'</td>'
        +'<td class="tx2 fs10">'+(d.rev>0?r2((d.profit/d.rev)*100):'—')+'%</td>'
        +'</tr>';
    }).join('');

    return '<div class="sh mb14"><div><div class="st fs13">📈 Business Analytics</div>'
      +(fy?'<div class="tx2 fs11">Showing FY '+fy+'</div>':'<div class="tx2 fs11">All-time data</div>')+'</div></div>'
      +periodSel+tabBar
      +'<div class="g4 mb14">'
      +'<div class="sc"><div class="sl">Total Revenue</div><div class="sv txacc">'+fmt(totRev)+'</div><div class="ss">'+data.length+' periods</div></div>'
      +'<div class="sc"><div class="sl">Total Cost</div><div class="sv txred">'+fmt(totCost)+'</div><div class="ss">Purchases + Expenses</div></div>'
      +'<div class="sc"><div class="sl">Net Profit</div><div class="sv" style="color:'+(totProfit>=0?'var(--grn)':'var(--red)')+'">'+fmt(totProfit)+'</div><div class="ss">'+margin+'% margin</div></div>'
      +'<div class="sc"><div class="sl">Best Period</div>'+(data.length?'<div class="sv txacc fs13">'+esc(data.reduce(function(a,d){return d.rev>a.rev?d:a;},data[0]).label)+'</div>':'<div class="sv tx2">—</div>')+'<div class="ss">Highest revenue</div></div>'
      +'</div>'
      +'<div class="card mb14"><div class="ctitle">📊 Revenue · Cost · Profit — '+pLabels[period]+'</div>'
        +(data.length===0?'<div class="tx2 fs12 mt8">No data. Add invoices or sales to see charts.</div>':chart)+'</div>'
      +'<div class="card mb14"><div class="ctitle">📈 Revenue Trend</div>'+trend+'</div>'
      +(data.length>0?'<div class="card mb14"><div class="ctitle">📋 Period Summary</div><div class="twrap"><table style="font-size:12px">'
        +'<thead><tr><th>Period</th><th>Revenue</th><th>Purchases</th><th>Expenses</th><th>Profit</th><th>Margin</th></tr></thead>'
        +'<tbody>'+tblRows+'</tbody>'
        +'<tfoot><tr style="border-top:2px solid var(--bor)"><td class="fw6">TOTAL</td>'
        +'<td class="txacc fw6">'+fmt(totRev)+'</td>'
        +'<td>'+fmt(r2(data.reduce(function(a,d){return a+d.purch;},0)))+'</td>'
        +'<td class="txred">'+fmt(r2(data.reduce(function(a,d){return a+d.exp;},0)))+'</td>'
        +'<td class="fw6" style="color:'+(totProfit>=0?'var(--grn)':'var(--red)')+'">'+fmt(totProfit)+'</td>'
        +'<td class="tx2">'+margin+'%</td>'
        +'</tr></tfoot></table></div></div>':'');
  }

  if(aTab==='breakdown') {
    var pmAmt={cash:0,upi:0,credit:0,cheque:0,other:0};
    var pmColors={cash:'#2B6E4A',upi:'#2655A0',credit:'#BF4A2B',cheque:'#9A6D1E',other:'#6B3FA0'};
    var pmLabels2={cash:'Cash',upi:'UPI',credit:'Credit',cheque:'Cheque',other:'Other'};
    S.invoices.filter(function(i){return !fy||i.fy===fy;}).forEach(function(i){
      var k=i.payment_method||'cash'; pmAmt[k]=r2((pmAmt[k]||0)+Number(i.total||0));
    });
    S.sales.filter(function(s){return !fy||s.fy===fy;}).forEach(function(s){
      var k=s.payment_type||'cash'; pmAmt[k]=r2((pmAmt[k]||0)+Number(s.amount||0));
    });
    var pmSlices=Object.entries(pmAmt).filter(function(e){return e[1]>0;}).map(function(e){
      return {label:pmLabels2[e[0]]||e[0],value:e[1],color:pmColors[e[0]]||'#888'};
    });

    var catColors=['#BF4A2B','#2655A0','#2B6E4A','#9A6D1E','#6B3FA0','#E07A5F','#3A7BBF','#4A9E6A','#C0722A','#8B4513'];
    var catAmt={};
    S.expenses.filter(function(e){return !fy||e.fy===fy;}).forEach(function(e){
      catAmt[e.category]=r2((catAmt[e.category]||0)+Number(e.amount||0));
    });
    var catSlices=Object.entries(catAmt).sort(function(a,b){return b[1]-a[1];}).map(function(e,i){
      return {label:e[0],value:e[1],color:catColors[i%catColors.length]};
    });

    var totalPurch=r2(S.purchases.filter(function(p){return !fy||p.fy===fy;}).reduce(function(a,p){return a+Number(p.amount||0);},0));
    var totalExpenses=r2(S.expenses.filter(function(e){return !fy||e.fy===fy;}).reduce(function(a,e){return a+Number(e.amount||0);},0));
    var costSlices=[{label:'Purchases',value:totalPurch,color:'#2655A0'},{label:'Expenses',value:totalExpenses,color:'#BF4A2B'}].filter(function(s){return s.value>0;});

    // Monthly expense trend
    var expByMonth={};
    S.expenses.filter(function(e){return !fy||e.fy===fy;}).forEach(function(e){
      var m=(e.date||'').slice(0,7)||'?';
      expByMonth[m]=r2((expByMonth[m]||0)+Number(e.amount||0));
    });
    var expTrend=Object.entries(expByMonth).sort(function(a,b){return a[0]<b[0]?-1:1;}).slice(-12).map(function(e){
      return {l:monthLabel(e[0]+'-01').slice(0,6),v:e[1]};
    });

    return '<div class="sh mb14"><div><div class="st fs13">📈 Business Analytics</div>'
      +(fy?'<div class="tx2 fs11">Showing FY '+fy+'</div>':'<div class="tx2 fs11">All-time data</div>')+'</div></div>'
      +periodSel+tabBar
      +'<div class="g3 mb14">'
        +'<div class="card">'
          +'<div class="ctitle mb8">💳 Revenue by Payment Method</div>'
          +svgDonut(pmSlices.length?pmSlices:[{label:'No data',value:1,color:'var(--bor)'}])
          +'<div class="mt8">'
          +pmSlices.map(function(s){
            return '<div class="row jbet fs11 mb5"><div class="row" style="gap:6px"><div style="width:9px;height:9px;border-radius:2px;background:'+s.color+'"></div>'+esc(s.label)+'</div><span class="fw6">'+fmt(s.value)+'</span></div>';
          }).join('')+'</div>'
        +'</div>'
        +'<div class="card">'
          +'<div class="ctitle mb8">💸 Expense Breakdown</div>'
          +svgDonut(catSlices.length?catSlices:[{label:'No data',value:1,color:'var(--bor)'}])
          +'<div class="mt8">'
          +catSlices.slice(0,6).map(function(s){
            return '<div class="row jbet fs11 mb5"><div class="row" style="gap:6px"><div style="width:9px;height:9px;border-radius:2px;background:'+s.color+'"></div>'+esc(s.label)+'</div><span class="fw6">'+fmt(s.value)+'</span></div>';
          }).join('')+'</div>'
        +'</div>'
        +'<div class="card">'
          +'<div class="ctitle mb8">⚖️ Cost Structure</div>'
          +svgDonut(costSlices.length?costSlices:[{label:'No data',value:1,color:'var(--bor)'}])
          +'<div class="mt8">'
          +costSlices.map(function(s){
            return '<div class="row jbet fs11 mb5"><div class="row" style="gap:6px"><div style="width:9px;height:9px;border-radius:2px;background:'+s.color+'"></div>'+s.label+'</div><span class="fw6">'+fmt(s.value)+'</span></div>';
          }).join('')+'</div>'
        +'</div>'
      +'</div>'
      +(expTrend.length>=2?'<div class="card"><div class="ctitle">📈 Expense Trend (Monthly)</div>'+svgLine(expTrend)+'</div>':'');
  }

  if(aTab==='customers') {
    var custRev={};
    S.invoices.filter(function(i){return !fy||i.fy===fy;}).forEach(function(i){
      if(i.customer_name) custRev[i.customer_name]=r2((custRev[i.customer_name]||0)+Number(i.total||0));
    });
    S.sales.filter(function(s){return !fy||s.fy===fy;}).forEach(function(s){
      if(s.customer) custRev[s.customer]=r2((custRev[s.customer]||0)+Number(s.amount||0));
    });
    var topC=Object.entries(custRev).sort(function(a,b){return b[1]-a[1];}).slice(0,12);
    var maxC=Math.max(1,topC.length?topC[0][1]:1);

    var custFreq={};
    S.invoices.filter(function(i){return !fy||i.fy===fy;}).forEach(function(i){
      if(i.customer_name) custFreq[i.customer_name]=(custFreq[i.customer_name]||0)+1;
    });
    var topFreq=Object.entries(custFreq).sort(function(a,b){return b[1]-a[1];}).slice(0,10);

    var revBars=topC.map(function(c,i){
      var pct=Math.round((c[1]/maxC)*100);
      return '<div style="margin-bottom:9px">'
        +'<div class="row jbet fs12 mb3"><span class="fw6">'+(i+1)+'. '+esc(c[0])+'</span><span class="fw6 txacc">'+fmt(c[1])+'</span></div>'
        +'<div style="background:var(--surf2);border-radius:3px;height:6px;overflow:hidden">'
        +'<div style="width:'+pct+'%;height:100%;background:var(--acc);border-radius:3px;opacity:'+(0.45+0.55*(pct/100)).toFixed(2)+'"></div></div>'
        +'</div>';
    }).join('');

    var freqBars=topFreq.map(function(c,i){
      var pct=Math.round((c[1]/topFreq[0][1])*100);
      return '<div style="margin-bottom:9px">'
        +'<div class="row jbet fs12 mb3"><span class="fw6">'+(i+1)+'. '+esc(c[0])+'</span><span class="fw6 txgrn">'+c[1]+' orders</span></div>'
        +'<div style="background:var(--surf2);border-radius:3px;height:6px;overflow:hidden">'
        +'<div style="width:'+pct+'%;height:100%;background:var(--grn);border-radius:3px"></div></div>'
        +'</div>';
    }).join('');

    // Customer monthly trend — top customer
    var cMonthly={};
    if(topC.length) {
      var topName=topC[0][0];
      S.invoices.filter(function(i){return (!fy||i.fy===fy)&&i.customer_name===topName;}).forEach(function(i){
        var m=(i.date||'').slice(0,7)||'?';
        cMonthly[m]=r2((cMonthly[m]||0)+Number(i.total||0));
      });
    }
    var cTrend=Object.entries(cMonthly).sort(function(a,b){return a[0]<b[0]?-1:1;}).slice(-12).map(function(e){
      return {l:monthLabel(e[0]+'-01').slice(0,6),v:e[1]};
    });

    return '<div class="sh mb14"><div><div class="st fs13">📈 Business Analytics</div>'
      +(fy?'<div class="tx2 fs11">Showing FY '+fy+'</div>':'<div class="tx2 fs11">All-time data</div>')+'</div></div>'
      +periodSel+tabBar
      +'<div class="g2 mb14">'
        +'<div class="card"><div class="ctitle">🏆 By Revenue</div>'+(topC.length?revBars:'<div class="tx2 fs12">No data yet</div>')+'</div>'
        +'<div class="card"><div class="ctitle">🔁 By Order Count</div>'+(topFreq.length?freqBars:'<div class="tx2 fs12">No data yet</div>')+'</div>'
      +'</div>'
      +(topC.length&&cTrend.length>=2?'<div class="card"><div class="ctitle">📈 Top Customer ('+esc(topC[0][0])+') Revenue Trend</div>'+svgLine(cTrend)+'</div>':'');
  }

  return periodSel+tabBar+'<div class="tx2 fs12">Select a tab above</div>';
}

/* ── CUSTOMER STATEMENT MODAL ──────────────────── */
function renderCustomerStatement() {
  var cid=S.custStatement; if(!cid) return '';
  var cust=S.customers.find(function(c){return c.id===cid;}); if(!cust) return '';

  var invs=S.invoices.filter(function(i){return (i.customer_name||'').toLowerCase()===cust.name.toLowerCase();})
    .sort(function(a,b){return (a.date||'')>(b.date||'')?1:-1;});
  var pays=S.payments.filter(function(p){return p.cust_id===cid;})
    .sort(function(a,b){return (a.date||'')>(b.date||'')?1:-1;});

  // Merge timeline entries
  var timeline=[];
  invs.forEach(function(i){ timeline.push({date:i.date||'',type:'INV',ref:i.invoice_no||'—',desc:(i.items||[]).map(function(x){return x.name;}).join(', ')||'Invoice',debit:Number(i.total||0),credit:0,status:i.status,id:i.id}); });
  pays.forEach(function(p){ timeline.push({date:p.date||'',type:'PAY',ref:'Payment',desc:p.notes||'Payment received',debit:0,credit:Number(p.amount||0),status:'paid',id:p.id}); });
  // Also add manual sales
  S.sales.filter(function(s){return (s.customer||'').toLowerCase()===cust.name.toLowerCase();}).forEach(function(s){
    timeline.push({date:s.date||'',type:'SALE',ref:'Quick Sale',desc:s.desc||s.item||'Sale',debit:Number(s.amount||0),credit:(s.payment_type!=='credit'?Number(s.amount||0):0),status:'paid',id:s.id});
  });
  timeline.sort(function(a,b){return a.date>b.date?1:a.date<b.date?-1:0;});

  var running=0;
  var tblRows=timeline.map(function(t){
    running=r2(running+t.debit-t.credit);
    return '<div class="stmt-row">'
      +'<div class="tx2 fs11">'+fmtDate(t.date)+'</div>'
      +'<div><div class="fw6 fs11">'+esc(t.ref)+'</div><div class="tx2 fs10">'+esc((t.desc||'').slice(0,50))+'</div></div>'
      +'<div class="txred fw6 fs11">'+(t.debit>0?fmt(t.debit):'—')+'</div>'
      +'<div class="txgrn fw6 fs11">'+(t.credit>0?fmt(t.credit):'—')+'</div>'
      +'<div class="fs11 fw6 '+(running>0?'stmt-bal-neg':'stmt-bal-pos')+'">'+fmt(running)+'</div>'
      +'</div>';
  }).join('');

  var totalDebit=r2(timeline.reduce(function(a,t){return a+t.debit;},0));
  var totalCredit=r2(timeline.reduce(function(a,t){return a+t.credit;},0));
  var balance=r2(totalDebit-totalCredit);

  return '<div class="mover" onclick="closeCustStatement()">'
    +'<div class="modal" onclick="event.stopPropagation()" style="max-width:660px;max-height:92vh;overflow-y:auto">'
      +'<div class="row jbet mb14">'
        +'<div>'
          +'<div class="mtit">📋 Account Statement — '+esc(cust.name)+'</div>'
          +(cust.phone?'<div class="tx2 fs11">📞 '+esc(cust.phone)+'</div>':'')
        +'</div>'
        +'<button class="ibtn" onclick="closeCustStatement()">✕</button>'
      +'</div>'
      +'<div class="g3 mb14">'
        +'<div class="sc"><div class="sl">Total Billed</div><div class="sv txacc">'+fmt(totalDebit)+'</div></div>'
        +'<div class="sc"><div class="sl">Total Received</div><div class="sv txgrn">'+fmt(totalCredit)+'</div></div>'
        +'<div class="sc" style="border-color:'+(balance>0?'var(--red)':'var(--grn)')+'">'
          +'<div class="sl">Balance Due</div>'
          +'<div class="sv '+(balance>0?'txred':'txgrn')+'">'+fmt(balance)+'</div>'
        +'</div>'
      +'</div>'
      +(timeline.length===0
        ?'<div class="empty" style="padding:30px 0"><div class="eico">📋</div><div class="etit">No transactions yet</div></div>'
        :'<div class="stmt-row stmt-hdr"><span>Date</span><span>Description</span><span style="color:var(--red)">Debit</span><span style="color:var(--grn)">Credit</span><span>Balance</span></div>'
        +'<div style="border:1.5px solid var(--bor);border-radius:0 0 9px 9px;overflow:hidden">'+tblRows+'</div>'
      )
      +'<div class="row mt14" style="gap:8px;justify-content:flex-end">'
        +(cust.phone?'<button class="btn bwa bsm" onclick="sendWA(\''+cid+'\')">💬 Send Reminder</button>':'')
        +'<button class="btn bgho bsm" onclick="closeCustStatement()">Close</button>'
      +'</div>'
    +'</div>'
  +'</div>';
}

/* ── MONEY (Credit + Payments combined) ─────────── */
function renderMoney(cC, tC) {
  if(!cC) { cC = S.customers.filter(c=>Number(c.outstanding)>0); tC = r2(cC.reduce((a,c)=>a+Number(c.outstanding),0)); }
  const mt = S._moneyTab || 'credit';
  const tabs = [['credit',`🔔 Outstanding (${cC.length})`],['payments',`💳 Payment History (${S.payments.length})`]];

  let body = '';
  if(mt === 'credit') {
    const overdueC = cC.filter(c=>c.due_date && c.due_date < today());
    body = (cC.length>0 ? `<div class="alert awrn mb10">⚠️ <b>${cC.length} customers</b> owe <b>${fmt(tC)}</b>${overdueC.length>0?` · <b style="color:var(--red)">${overdueC.length} overdue</b>`:''}</div>` : '')
      + (cC.length===0
        ? `<div class="empty"><div class="eico">✅</div><div class="etit">All dues settled!</div></div>`
        : `<div class="twrap"><table><thead><tr><th>Customer</th><th>Phone</th><th>Due Date</th><th>Outstanding</th><th>Actions</th></tr></thead>
          <tbody>${cC.map(c=>`<tr>
            <td class="fw6">${esc(c.name)}</td><td class="tx2">${esc(c.phone||'—')}</td>
            <td class="${c.due_date&&c.due_date<today()?'txred fw6':'tx2 fs11'}">${c.due_date?fmtDate(c.due_date):'—'}${c.due_date&&c.due_date<today()?' ⚠️':''}</td>
            <td class="fw6 txred">${fmt(c.outstanding)}</td>
            <td><div class="row" style="gap:4px">
              <button class="btn bgrn bsm" onclick="openPayModal('${c.id}')">💳 Collect</button>
              <button class="btn bgho bsm" onclick="openRem('${c.id}')">📩 Remind</button>
              ${c.phone?`<button class="btn bwa bsm" onclick="quickWA('${c.id}')">💬 WA</button>`:''}
            </div></td>
          </tr>`).join('')}</tbody></table></div>`);
  } else {
    const grouped={};
    S.payments.forEach(p=>{if(!grouped[p.customer_name])grouped[p.customer_name]=[];grouped[p.customer_name].push(p);});
    const custNames=Object.keys(grouped).sort();
    body = S.payments.length===0
      ? `<div class="empty"><div class="eico">💳</div><div class="etit">No payments recorded yet</div></div>`
      : custNames.map(name=>{
          const pays=grouped[name].sort((a,b)=>b.date>a.date?1:-1);
          const total=pays.reduce((a,p)=>a+Number(p.amount),0);
          const cust=S.customers.find(c=>c.name.toLowerCase()===name.toLowerCase());
          return `<div class="card mb14">
            <div class="row jbet mb10">
              <div><div class="fw6 fs13">${esc(name)}</div>
                <div class="tx2 fs11">Collected: <span class="txgrn fw6">${fmt(total)}</span>${cust?` · Outstanding: <span class="txred fw6">${fmt(cust.outstanding)}</span>`:''}</div>
              </div>
              ${cust&&Number(cust.outstanding)>0?`<button class="btn bgrn bsm" onclick="openPayModal('${cust.id}')">+ Collect</button>`:''}
            </div>
            <div class="pay-ledger">
              <div class="pay-hdr"><span>Date</span><span>Note</span><span>Method</span><span>Invoice</span><span>Amount</span><span></span></div>
              ${pays.map(p=>`<div class="pay-row">
                <span class="tx2 fs11">${fmtDate(p.date)}</span>
                <span class="fs12">${esc(p.note||'—')}</span>
                <span><span class="bdg ${pb(p.method)}">${(p.method||'cash').toUpperCase()}</span></span>
                <span class="tx2 fs11">${esc(p.invoice_ref||'—')}</span>
                <span class="fw6 txgrn">${fmt(p.amount)}</span>
                <span><button class="btn bdng bsm" style="padding:2px 5px" onclick="delPayment('${p.id}')">🗑️</button></span>
              </div>`).join('')}
            </div>
          </div>`;
        }).join('');
  }

  return `<div class="tabs" style="margin-bottom:14px">
    ${tabs.map(([k,v])=>`<button class="tab${mt===k?' on':''}" onclick="swMoneyTab('${k}')">${v}</button>`).join('')}
  </div>${body}`;
}
window.swMoneyTab = t => { S._moneyTab=t; render(); };

function renderPayModal(){

const ROLE_DEFS = {
  admin:   { label:'Admin',   emoji:'👑', desc:'Full access — all features, settings, delete', color:'var(--acc)' },
  billing: { label:'Billing', emoji:'🧾', desc:'Create invoices, add purchases & expenses, view reports', color:'var(--grn)' },
  viewer:  { label:'Viewer',  emoji:'👁️', desc:'View invoices, reports and customer list only. No edits.', color:'var(--blu)' },
};

function getRolePermissions(role) {
  return {
    admin:   { canCreate:true,  canEdit:true,  canDelete:true,  canSettings:true,  canReports:true  },
    billing: { canCreate:true,  canEdit:true,  canDelete:false, canSettings:false, canReports:true  },
    viewer:  { canCreate:false, canEdit:false, canDelete:false, canSettings:false, canReports:true  },
  }[role] || { canCreate:false, canEdit:false, canDelete:false, canSettings:false, canReports:false };
}

window._activeStaffRole = null;

window.switchToRole = function(staffId) {
  const staff = (S.staff_roles||[]).find(s=>s.id===staffId);
  if(!staff) return;
  if(!staff.pin) {
    window._activeStaffRole = staff;
    toast(`Switched to ${staff.name} (${ROLE_DEFS[staff.role]?.label||staff.role})`, 'info');
    S._staffOpen = false; render(); return;
  }
  const pin = prompt(`Enter PIN for ${staff.name}:`);
  if(!pin) return;
  // Check lockout
  const lockKey = 'rf_lock_' + staffId;
  const lockData = JSON.parse(localStorage.getItem(lockKey)||'{}');
  if(lockData.until && Date.now() < lockData.until) {
    const mins = Math.ceil((lockData.until-Date.now())/60000);
    toast(`Account locked — try again in ${mins} minute${mins>1?'s':''}`, 'error', 5000); return;
  }
  if(pin !== staff.pin) {
    const attempts = (lockData.attempts||0) + 1;
    if(attempts >= 3) {
      localStorage.setItem(lockKey, JSON.stringify({until:Date.now()+30*60*1000, attempts:0}));
      toast('3 wrong PINs — locked for 30 minutes', 'error', 6000);
    } else {
      localStorage.setItem(lockKey, JSON.stringify({attempts}));
      toast(`Wrong PIN — ${3-attempts} attempt${3-attempts>1?'s':''} remaining`, 'warn');
    }
    return;
  }
  localStorage.removeItem(lockKey);
  window._activeStaffRole = staff;
  toast(`Switched to ${staff.name} (${ROLE_DEFS[staff.role]?.label||staff.role})`, 'success');
  S._staffOpen = false; render();
};

window.addStaffMember = function() {
  const name = prompt('Staff member name:');

};

window.editStaff = function(id) {

  const role = prompt('Role (admin / billing / viewer):', s.role)?.toLowerCase().trim()||s.role;
  if(!['admin','billing','viewer'].includes(role)) { toast('Invalid role','error'); return; }

/* ══════════════════════════════════════════════════
   GSTR-3B MONTHLY SUMMARY (FEATURE B)
══════════════════════════════════════════════════ */
function renderGSTR3B() {
  const fy    = S.fyFilter === 'all' ? null : S.fyFilter;
  const invs  = S.invoices.filter(i=>S.firm.gst_registered && (!fy||i.fy===fy) && i.inv_with_gst!==false && i.doc_type!=='quotation' && i.doc_type!=='challan');
  const prchs = S.purchases.filter(p=>!fy||p.fy===fy);
  const cns   = (S.credit_notes||[]).filter(n=>!fy||n.fy===fy);

  // Group by month
  const months = {};
  const addM = m => { if(!months[m]) months[m]={ taxable:0, igst:0, cgst:0, sgst:0, total_output:0, itc:0, cn_gst:0, net:0 }; };

  invs.forEach(inv=>{
    const m = (inv.date||'').slice(0,7); addM(m);
    const t = buildInvTotals(inv.items||[], true, inv.is_igst||false, {
      inv_discount:inv.inv_discount, inv_discount_type:inv.inv_discount_type,
      extra_charges:inv.extra_charges, tcs_rate:inv.tcs_rate
    });
    months[m].taxable      = r2(months[m].taxable + t.totalTaxable);
    months[m].total_output = r2(months[m].total_output + t.totalGST);
    if(inv.is_igst){ months[m].igst = r2(months[m].igst + t.totalGST); }
    else           { months[m].cgst = r2(months[m].cgst + r2(t.totalGST/2)); months[m].sgst = r2(months[m].sgst + r2(t.totalGST/2)); }
  });

  prchs.forEach(p=>{
    const m = (p.date||'').slice(0,7); addM(m);
    months[m].itc = r2(months[m].itc + r2(Number(p.amount||0)*Number(p.gst_rate||18)/100));
  });

  cns.forEach(cn=>{
    const m = (cn.date||'').slice(0,7); addM(m);
    months[m].cn_gst = r2((months[m].cn_gst||0) + Number(cn.gst_amount||0));
  });

  const allMonths = Object.keys(months).sort().reverse();
  allMonths.forEach(m=>{ months[m].net = r2(Math.max(0, months[m].total_output - months[m].itc - months[m].cn_gst)); });

  const totals = allMonths.reduce((a,m)=>({
    taxable:     r2(a.taxable     + months[m].taxable),
    igst:        r2(a.igst        + months[m].igst),
    cgst:        r2(a.cgst        + months[m].cgst),
    sgst:        r2(a.sgst        + months[m].sgst),
    total_output:r2(a.total_output+ months[m].total_output),
    itc:         r2(a.itc         + months[m].itc),
    cn_gst:      r2(a.cn_gst      + months[m].cn_gst),
    net:         r2(a.net         + months[m].net),
  }), {taxable:0,igst:0,cgst:0,sgst:0,total_output:0,itc:0,cn_gst:0,net:0});

  return `
  <div class="alert ainfo mb14" style="font-size:12px">
    📋 <b>GSTR-3B</b> is a monthly self-declaration of output tax liability and input tax credit.
    File by <b>20th of each month</b> (or 22nd/24th for quarterly filers).
    Net GST Payable = Output GST − ITC − Credit Note GST.
    Always verify ITC from your <b>GSTR-2B</b> on the portal before filing.
  </div>

  <!-- Due date reminder -->
  <div class="card mb14" style="border-color:var(--ylw);background:var(--ylb)">
    <div class="row jbet" style="flex-wrap:wrap;gap:8px">
      <div>
        <div class="fw6 fs13">📅 Filing Deadlines</div>
        <div class="fs11 tx2 mt4">GSTR-1: 11th · GSTR-3B: 20th · GSTR-9: 31st Dec (Annual)</div>
      </div>
      <button class="btn bgho bsm" onclick="exportGSTR3BCSV()">⬇️ Export CSV</button>
    </div>
  </div>

  ${allMonths.length===0?`<div class="empty"><div class="eico">📋</div><div class="etit">No GST invoice data</div></div>`:`
  <div class="twrap">
    <table>
      <thead>
        <tr>
          <th>Month</th>
          <th style="text-align:right">Taxable ₹</th>
          <th style="text-align:right">IGST ₹</th>
          <th style="text-align:right">CGST ₹</th>
          <th style="text-align:right">SGST ₹</th>
          <th style="text-align:right">Output GST</th>

window.exportGSTR3BCSV = function() {
  const fy   = S.fyFilter === 'all' ? null : S.fyFilter;
  const invs = S.invoices.filter(i=>S.firm.gst_registered && (!fy||i.fy===fy) && i.inv_with_gst!==false);
  const prchs= S.purchases.filter(p=>!fy||p.fy===fy);
  const months = {};
  invs.forEach(inv=>{
    const m = (inv.date||'').slice(0,7);
    if(!months[m]) months[m]={month:monthLabel(m+'-01'),taxable:0,igst:0,cgst:0,sgst:0,output_gst:0,itc:0,net_payable:0};
    const t = buildInvTotals(inv.items||[],true,inv.is_igst||false,{});
    months[m].taxable    = r2(months[m].taxable    + t.totalTaxable);
    months[m].output_gst = r2(months[m].output_gst + t.totalGST);
    if(inv.is_igst){ months[m].igst=r2(months[m].igst+t.totalGST); }
    else           { months[m].cgst=r2(months[m].cgst+r2(t.totalGST/2)); months[m].sgst=r2(months[m].sgst+r2(t.totalGST/2)); }
  });
  prchs.forEach(p=>{
    const m=(p.date||'').slice(0,7);
    if(!months[m]) months[m]={month:monthLabel(m+'-01'),taxable:0,igst:0,cgst:0,sgst:0,output_gst:0,itc:0,net_payable:0};
    months[m].itc=r2(months[m].itc+r2(Number(p.amount)*Number(p.gst_rate||18)/100));
  });
  Object.values(months).forEach(d=>{ d.net_payable=r2(Math.max(0,d.output_gst-d.itc)); });
  const rows = Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0])).map(([,d])=>d);
  const csv  = toCSV(rows,['month','taxable','igst','cgst','sgst','output_gst','itc','net_payable']);
  downloadCSV(csv, 'GSTR3B_' + (fy||'all') + '.csv');
};

  const tot = (arr, fn) => r2(arr.reduce((a,i)=>a+(fn?fn(i):i),0));

  const grossTurnover  = tot(invs, i=>Number(i.total||0));

  const itcAvailed     = r2(prchs.reduce((a,p)=>a+r2(Number(p.amount)*Number(p.gst_rate||18)/100),0));
  const cnReduction    = r2(cns.reduce((a,cn)=>a+Number(cn.gst_amount||0),0));

function renderITCRegister() {
  const fy     = S.fyFilter === 'all' ? null : S.fyFilter;
  const invs   = S.invoices.filter(i=>(!fy||i.fy===fy) && S.firm.gst_registered && i.inv_with_gst!==false && i.doc_type!=='quotation' && i.doc_type!=='challan');
  const prchs  = S.purchases.filter(p=>!fy||p.fy===fy);
  const cns    = (S.credit_notes||[]).filter(n=>!fy||n.fy===fy);

  // Build monthly ITC table
  const months = {};
  const addMonth = m => { if(!months[m]) months[m]={output_taxable:0,output_gst:0,input_gst:0,cn_gst:0}; };

  invs.forEach(inv=>{
    const m = (inv.date||'').slice(0,7); addMonth(m);
    const t = buildInvTotals(inv.items||[],true,inv.is_igst||false,{inv_discount:inv.inv_discount,inv_discount_type:inv.inv_discount_type,extra_charges:inv.extra_charges,tcs_rate:inv.tcs_rate});
    months[m].output_taxable = r2(months[m].output_taxable + t.totalTaxable);
    months[m].output_gst     = r2(months[m].output_gst     + t.totalGST);
  });

  prchs.forEach(p=>{
    const m = (p.date||'').slice(0,7); addMonth(m);
    months[m].input_gst = r2(months[m].input_gst + r2(Number(p.amount||0)*Number(p.gst_rate||18)/100));
  });

  cns.forEach(cn=>{
    const m = (cn.date||'').slice(0,7); addMonth(m);
    months[m].cn_gst = r2((months[m].cn_gst||0) + Number(cn.gst_amount||0));

          return `<tr>

/* ╔══════════════════════════════════════════════════╗
   ║  ACCOUNTING & BOOKS MODULE — RetailFlow v3       ║
   ║  Phase A: Journal Engine + Chart of Accounts     ║
   ║  Phase B: Day Book + Cash Book                   ║
   ║  Phase C: Trial Balance                          ║
   ║  Phase D: Balance Sheet                          ║
   ║  Phase E: Bank Reconciliation                    ║
   ║  Phase F: Cash Flow Statement                    ║
   ╚══════════════════════════════════════════════════╝ */

/* ══════════════════════════════════════════════════
   PHASE A — CHART OF ACCOUNTS
══════════════════════════════════════════════════ */
const DEFAULT_CHART = {

  'Fixed Assets':       { group:'Fixed Assets',       type:'asset',     bs_side:'application', normal:'dr' },
  // LIABILITIES
  'Sundry Creditors':   { group:'Current Liabilities',type:'liability', bs_side:'sources',     normal:'cr' },
  'CGST Payable':       { group:'Current Liabilities',type:'liability', bs_side:'sources',     normal:'cr' },
  'SGST Payable':       { group:'Current Liabilities',type:'liability', bs_side:'sources',     normal:'cr' },
  'IGST Payable':       { group:'Current Liabilities',type:'liability', bs_side:'sources',     normal:'cr' },
  'CGST Input':         { group:'Current Assets',     type:'asset',     bs_side:'application', normal:'dr' },
  'SGST Input':         { group:'Current Assets',     type:'asset',     bs_side:'application', normal:'dr' },
  'Loans Payable':      { group:'Long-term Liabilities',type:'liability',bs_side:'sources',    normal:'cr' },
  // EQUITY
  'Capital Account':    { group:'Capital',            type:'equity',    bs_side:'sources',     normal:'cr' },
  'Retained Earnings':  { group:'Capital',            type:'equity',    bs_side:'sources',     normal:'cr' },
  'Opening Balance Equity':{ group:'Capital',         type:'equity',    bs_side:'sources',     normal:'cr' },
  // INCOME
  'Sales Account':      { group:'Direct Income',      type:'income',    bs_side:null,          normal:'cr' },
  'Other Income':       { group:'Indirect Income',    type:'income',    bs_side:null,          normal:'cr' },
  // EXPENSES
  'Purchases':          { group:'Direct Expenses',    type:'expense',   bs_side:null,          normal:'dr' },
  'Sales Returns':      { group:'Direct Expenses',    type:'expense',   bs_side:null,          normal:'dr' },
  'Rent':               { group:'Indirect Expenses',  type:'expense',   bs_side:null,          normal:'dr' },
  'Electricity':        { group:'Indirect Expenses',  type:'expense',   bs_side:null,          normal:'dr' },
  'Staff Salary':       { group:'Indirect Expenses',  type:'expense',   bs_side:null,          normal:'dr' },
  'Transport':          { group:'Indirect Expenses',  type:'expense',   bs_side:null,          normal:'dr' },

function getChart() {
  const chart = {...DEFAULT_CHART};
  // Merge user-added ledgers
  (S.accounts_chart||[]).forEach(l=>{ chart[l.name] = {group:l.group,type:l.type,bs_side:l.bs_side,normal:l.normal}; });
  return chart;
}

function getLedgerType(name) {
  return getChart()[name] || { group:'Miscellaneous', type:'expense', bs_side:null, normal:'dr' };
}

function expCategoryToLedger(cat) {
  // Map expense categories to ledger names
  const map = { Rent:'Rent', Electricity:'Electricity', 'Staff Salary':'Staff Salary',
    Transport:'Transport', Packaging:'Packaging', Maintenance:'Maintenance',
    Marketing:'Marketing', Miscellaneous:'Miscellaneous' };
  return map[cat] || cat;
}

/* ══════════════════════════════════════════════════
   PHASE A — JOURNAL ENGINE
   Pure function: state → journal entries
   Each journal: { id, date, ref, narration, entries:[{ledger,dr,cr}] }
══════════════════════════════════════════════════ */
function buildJournals() {
  const journals = [];
  const isReg = S.firm?.gst_registered;

  // ── Opening Balances ────────────────────────────
  const ob = S.opening_balances || {};
  if(ob.cash_in_hand > 0 || ob.bank_balance > 0 || ob.inventory_value > 0 || ob.fixed_assets > 0) {
    const entries = [];
    if(ob.cash_in_hand   > 0) entries.push({ledger:'Cash in Hand',  dr:ob.cash_in_hand,   cr:0});
    if(ob.bank_balance   > 0) entries.push({ledger:'Bank Account',  dr:ob.bank_balance,   cr:0});
    if(ob.inventory_value> 0) entries.push({ledger:'Closing Stock',  dr:ob.inventory_value,cr:0});
    if(ob.fixed_assets   > 0) entries.push({ledger:'Fixed Assets',  dr:ob.fixed_assets,   cr:0});
    const totalAssets = r2((ob.cash_in_hand||0)+(ob.bank_balance||0)+(ob.inventory_value||0)+(ob.fixed_assets||0));
    const totalLiab   = r2((ob.loans_payable||0));
    const capital     = r2(totalAssets - totalLiab);
    if(ob.loans_payable > 0) entries.push({ledger:'Loans Payable',  dr:0, cr:ob.loans_payable});
    if(capital         > 0) entries.push({ledger:'Capital Account', dr:0, cr:capital});
    else if(capital    < 0) entries.push({ledger:'Capital Account', dr:-capital, cr:0});
    journals.push({ id:'OB', date: (getFY(today()).split('-')[0]+'-04-01'), ref:'OB', narration:'Opening Balances', entries });
  }

  // ── Customer Opening Outstanding → Debtors ──────
  S.customers.forEach(c=>{
    const openOB = Number(c.opening_outstanding||0);
    if(openOB > 0) {
      journals.push({
        id:'OB-CUST-'+c.id, date:(getFY(today()).split('-')[0]+'-04-01'),
        ref:'OB', narration:`Opening balance — ${c.name}`,
        entries:[
          {ledger:'Sundry Debtors',        dr:openOB, cr:0},
          {ledger:'Opening Balance Equity', dr:0,      cr:openOB},
        ]
      });
    }
  });

  // ── Invoices → Sales + Debtors/Cash + GST ───────
  S.invoices.forEach(inv=>{
    if(inv.status==='void') return;
    const t = buildInvTotals(inv.items||[], isReg, inv.is_igst||false, {
      inv_discount:inv.inv_discount, inv_discount_type:inv.inv_discount_type,
      extra_charges:inv.extra_charges, tcs_rate:inv.tcs_rate
    });
    const isCredit  = inv.payment_method==='credit' || inv.status==='unpaid' || inv.status==='partial';
    const debitLedger = isCredit ? 'Sundry Debtors' : (inv.payment_method==='online'?'Bank Account':'Cash in Hand');
    const entries = [{ledger:debitLedger, dr:r2(inv.total), cr:0}];
    if(isReg && t.totalTaxable > 0) {
      entries.push({ledger:'Sales Account', dr:0, cr:r2(t.totalTaxable)});
      if(inv.is_igst) {
        if(t.totalGST>0) entries.push({ledger:'IGST Payable', dr:0, cr:r2(t.totalGST)});
      } else {
        if(t.totalGST>0) entries.push({ledger:'CGST Payable', dr:0, cr:r2(t.totalGST/2)});
        if(t.totalGST>0) entries.push({ledger:'SGST Payable', dr:0, cr:r2(t.totalGST/2)});
      }
    } else {
      entries.push({ledger:'Sales Account', dr:0, cr:r2(inv.total)});
    }
    journals.push({ id:'INV-'+inv.id, date:inv.date, ref:inv.invoice_no, narration:`Sales — ${inv.customer_name||'Walk-in'}`, entries });
  });

  // ── Payments Received → Debtors Dr/Cr ───────────
  S.payments.forEach(p=>{
    const cashLedger = p.method==='online'||p.method==='upi' ? 'Bank Account' : 'Cash in Hand';
    journals.push({
      id:'PMT-'+p.id, date:p.date, ref:p.invoice_ref||'PMT',
      narration:`Payment received — ${p.customer_name||''}`,
      entries:[
        {ledger:cashLedger,       dr:Number(p.amount), cr:0},
        {ledger:'Sundry Debtors', dr:0,                cr:Number(p.amount)},
      ]
    });
  });

  // ── Credit Notes → Sales Returns + Debtors ──────
  (S.credit_notes||[]).forEach(cn=>{
    const entries = [{ledger:'Sales Returns', dr:r2(cn.total), cr:0}];
    if(isReg && cn.gst_amount>0) {
      entries.push({ledger:'CGST Payable', dr:r2(cn.gst_amount/2), cr:0});
      entries.push({ledger:'SGST Payable', dr:r2(cn.gst_amount/2), cr:0});
      entries.push({ledger:'Sundry Debtors', dr:0, cr:r2(cn.total)});
    } else {
      entries.push({ledger:'Sundry Debtors', dr:0, cr:r2(cn.total)});
    }
    journals.push({ id:'CN-'+cn.id, date:cn.date, ref:cn.cn_no||'CN', narration:`Credit Note — ${cn.customer_name||''}`, entries });
  });

  // ── Purchases → Purchases + Creditors/Cash + GST ─
  S.purchases.forEach(p=>{
    const amt    = Number(p.amount||0);
    const gstPct = Number(p.gst_rate||0);
    const taxable= r2(amt / (1 + gstPct/100));
    const gstAmt = r2(amt - taxable);
    const isCredit = p.status==='pending'||p.status==='credit';
    const crLedger  = isCredit ? 'Sundry Creditors' : (p.method==='online'?'Bank Account':'Cash in Hand');
    const entries = [{ledger:crLedger, dr:0, cr:amt}];
    if(isReg && gstPct>0 && gstAmt>0) {
      entries.push({ledger:'Purchases',   dr:taxable,        cr:0});
      entries.push({ledger:'CGST Input',  dr:r2(gstAmt/2),  cr:0});
      entries.push({ledger:'SGST Input',  dr:r2(gstAmt/2),  cr:0});
    } else {
      entries.push({ledger:'Purchases',   dr:amt,            cr:0});
    }
    journals.push({ id:'PUR-'+p.id, date:p.date, ref:p.po_ref||'PUR', narration:`Purchase — ${p.supplier||''}`, entries });
  });

  // ── Expenses → Expense ledger + Cash/Bank ────────
  S.expenses.forEach(e=>{
    const ledger = expCategoryToLedger(e.category);
    const cash   = 'Cash in Hand';
    journals.push({
      id:'EXP-'+e.id, date:e.date, ref:'EXP',
      narration:`${e.category}${e.description?' — '+e.description:''}`,
      entries:[
        {ledger:ledger, dr:Number(e.amount), cr:0},
        {ledger:cash,   dr:0,               cr:Number(e.amount)},
      ]
    });
  });

  // ── Manual Vouchers ──────────────────────────────
  (S.manual_journals||[]).forEach(mj=>{
    journals.push({ id:'MJ-'+mj.id, date:mj.date, ref:mj.ref||'JV', narration:mj.narration, entries:mj.entries||[] });
  });

  return journals.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
}

/* Compute trial balance from journals */
function buildTrialBalance(journals) {
  const tb = {};
  journals.forEach(j=>{
    (j.entries||[]).forEach(e=>{
      if(!tb[e.ledger]) tb[e.ledger]={dr:0,cr:0};
      tb[e.ledger].dr = r2(tb[e.ledger].dr + (e.dr||0));
      tb[e.ledger].cr = r2(tb[e.ledger].cr + (e.cr||0));
    });
  });
  // Compute closing balance per ledger
  Object.keys(tb).forEach(k=>{
    const ltype = getLedgerType(k);
    const net = r2(tb[k].dr - tb[k].cr);
    tb[k].closing = net;
    tb[k].group   = ltype.group;
    tb[k].type    = ltype.type;
    tb[k].bs_side = ltype.bs_side;
    tb[k].normal  = ltype.normal;
  });
  // Add closing stock at current value
  const stockVal = r2(S.inventory.reduce((a,i)=>a+Number(i.rate||0)*Number(i.stock||0),0));
  if(!tb['Closing Stock']) tb['Closing Stock']={dr:0,cr:0,closing:0};
  tb['Closing Stock'].closing = stockVal;
  tb['Closing Stock'].group='Current Assets'; tb['Closing Stock'].type='asset'; tb['Closing Stock'].bs_side='application'; tb['Closing Stock'].normal='dr';
  return tb;
}
